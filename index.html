s of two stage tendering?\",\n  \"answer\": [\n   \"Early involvement of the contractor.\",\n   \"Encouragement of collaborative working.\",\n   \"Potential for an earlier start on site.\",\n   \"Greater client involvement in selecting the supply chain.\",\n   \"The contractor can help identify and manage risk.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 575,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages of two stage tendering?\",\n  \"answer\": [\n   \"Cost certainty may not be achieved before construction starts.\",\n   \"Additional pre-construction fees are incurred for the main contractor.\",\n   \"The contractor could take advantage of second stage negotiation and increase costs.\",\n   \"There is the potential for parties to not agree the contract sum with a risk of retendering.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 576,\n  \"level\": 1\n },\n {\n  \"question\": \"Why should you use 2 stage tendering?\",\n  \"answer\": [\n   \"With a complex building.\",\n   \"Where the magnitude of work is unknown at time of contractor selection.\",\n   \"If early completion is required.\",\n   \"Where the design team would like to make use of contractors expertise on buildability issues.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 577,\n  \"level\": 2\n },\n {\n  \"question\": \"What is negotiated tendering?\",\n  \"answer\": [\n   \"Where the client has an existing preference for appointing a particular firm and only negotiates with one contractor.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 578,\n  \"level\": 1\n },\n {\n  \"question\": \"When might this be used?\",\n  \"answer\": [\n   \"When the contractor has carried out work successfully for the client previously where they have an existing relationship.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 579,\n  \"level\": 1\n },\n {\n  \"question\": \"How does it work?\",\n  \"answer\": [\n   \"There is no competition and only one contractor is invited to tender.\",\n   \"The contract sum is arrived at by a process of negotiation.\",\n   \"Schedule of rates or prices from previous projects may be used as the basis of agreeing a price.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 580,\n  \"level\": 2\n },\n {\n  \"question\": \"What is serial tendering\",\n  \"answer\": [\n   \"Contractors are asked to bid for a project on the basis that if they complete the initial project satisfactorily, other projects of a similar type will follow and the same bill rates will be applied.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 581,\n  \"level\": 1\n },\n {\n  \"question\": \"What could selecting the wrong contractor lead to?\",\n  \"answer\": [\n   \"A bad client & contractor relationship.\",\n   \"A dissatisfied client.\",\n   \"An insolvent contractor.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 582,\n  \"level\": 2\n },\n {\n  \"question\": \"How would you put together a set of tender documents?\",\n  \"answer\": [\n   \"In accordance with JCT practice note 2017 I would include:-\",\n   \"– ITT (Invitation to tender letter)\",\n   \"– Instruction to tenderers with:- ▪ The date and time for return, to whom, site visits, programme, errors procedures, scoring matrix. ▪ Conditions of proposed contract. ▪ Pricing documentation. ▪ Specifications. ▪ Drawings. ▪ Employers requirements. ▪ Pre-construction H&S information. ▪ Form of tender.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 583,\n  \"level\": 3\n },\n {\n  \"question\": \"What is the form of tender?\",\n  \"answer\": [\n   \"A preprinted formal statement in which the tenderer fills in the blank spaces.\",\n   \"The tenderer provides their name, address and the sum of money for which they offer to carry out the works.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 584,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the employer’s requirements?\",\n  \"answer\": [\n   \"They set out the client’s requirements including the function, size, accommodation and quality requirements of the project.\",\n   \"Their level of detail depends on how much design development has been carried out prior to tender.\",\n   \"They normally includes the current state of planning permission.\",\n   \"It should also detail the level of design, structure and specification information to be provided by the tenderers.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 585,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the contractor’s proposals?\",\n  \"answer\": [\n   \"The contractor’s response to the Employers Requirements.\",\n   \"They are the key documentation for the client to consider at the tender review.\",\n   \"They often include plans, elevations, sections and typical details.\",\n   \"Layout drawings and specification for materials and workmanship are also provided.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 586,\n  \"level\": 1\n },\n {\n  \"question\": \"What would you include in the pre-qualification questionnaire?\",\n  \"answer\": [\n   \"Details of contract particulars.\",\n   \"Company turnover.\",\n   \"Previous relevant experience and references.\",\n   \"Company accounts.\",\n   \"Management and organisational structure.\",\n   \"Health and safety records.\",\n   \"Quality systems and environmental policy.\",\n   \"Provision of bonds, warranties & PCGs.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 587,\n  \"level\": 2\n },\n {\n  \"question\": \"How would you determine the duration of the tender period?\",\n  \"answer\": [\n   \"It depends on the procurement process and size of the project.\",\n   \"If a traditional procurement route with a BoQ is being adopted then I would usually allow around a month in order for the MC to obtain pricing information from their sub-contractors.\",\n   \"For large complex schemes the tender period would need to be longer.\",\n   \"If the tender is the first stage of a two stage tender then the tender period may be a shorter duration of 2-3 weeks.\",\n   \"It is better to ensure there is sufficient time so contractors can price the project correctly rather than rush and encourage contractors to price a high risk element into the tender.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 588,\n  \"level\": 3\n },\n {\n  \"question\": \"What is nomination?\",\n  \"answer\": [\n   \"Selection of a particular subcontractor to carry out works, manufacture or supply of materials.\",\n   \"This provides the architect and client with greater control of material choice and thereby quality.\",\n   \"It is often used when there are long lead-in times with the employer placing orders prior to the Main Contract award which reduces potential delays on site.\",\n   \"The Main Contractor is relieved of liability of design and compliance with the performance spec in addition to subcontractor delays in respect of the works that have been nominated.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 589,\n  \"level\": 1\n },\n {\n  \"question\": \"Do nominated subcontractors get paid separately?\",\n  \"answer\": [\n   \"Nominated Contractors are normally paid via the Main Contract with sums identified separately.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 590,\n  \"level\": 2\n },\n {\n  \"question\": \"Can the contractor object to a nominated subcontractor?\",\n  \"answer\": [\n   \"Any objections must be made during the tender period.\",\n   \"There are specific exclusions and grounds for an objection for example if they have found out the subcontractor is having financial difficulties and may be going insolvent. If there are problems with the design, after Novation of the architect, who would be responsible?\",\n   \"At the point of novation, the client would agree the level of design was satisfactory & would be signed off by all parties.\",\n   \"The contractor would then become responsible for the Architect & his design should any problems arise during construction.\",\n   \"Disputes may arise where it becomes unclear when problems have arisen, either prior to the transfer of services or afterwards.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 591,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the difference between Novation and Assignment?\",\n  \"answer\": [\n   \"Novation is a mechanism whereby one party can transfer all its obligations under a contract and all benefits arising from that contract to a third party.\",\n   \"Assignment is where contractual benefits are assigned however contractual burdens cannot be transferred under assignment.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 592,\n  \"level\": 1\n },\n {\n  \"question\": \"What is set-off?\",\n  \"answer\": [\n   \"Set off are any monies owed to the employer by the contractor which are deducted against any payments due to the contractor.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 593,\n  \"level\": 1\n },\n {\n  \"question\": \"Describe differences between Statutory Provisions and Contract Provisions?\",\n  \"answer\": [\n   \"Statutory provisions are set out by law & must be complied with.\",\n   \"Contract provisions relate to the contract in question & therefore only apply to a specific project.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 594,\n  \"level\": 2\n },\n {\n  \"question\": \"What are domestic subcontractors?\",\n  \"answer\": [\n   \"This is a standard appointment of a Subcontractor by the Main Contractor.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 595,\n  \"level\": 1\n },\n {\n  \"question\": \"What are named subcontractors?\",\n  \"answer\": [\n   \"Clients provide the Main Contractor with a choice of named Sub Contractors for a portion of the works.\",\n   \"Once appointed they become a domestic subcontractor in terms of the conditions of contract.\",\n   \"Additional names may be added if approved by all parties.\",\n   \"This allows the client a level of control over the quality of the works packages and in some cases cost. After valuation and certificate are issued, the client advised that they don’t have sufficient funding to make the payment.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 596,\n  \"level\": 1\n },\n {\n  \"question\": \"What would you do?\",\n  \"answer\": [\n   \"Once the certificate has been issued to the contractor, the client is contractually obliged to honour payment of the certificate and cannot withhold money without a valid reason.\",\n   \"If this were the case, I would contact the client and contractor ASAP to arrange some form of payment. It may be the case that the client has insufficient funds available in time for the final date for payment and it may be possible to defer payment by 1-2 days.\",\n   \"Failing this or if the contractor is unwilling to delay the payment, the client would need to find finance the payment through other funds to honour the certificate.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 597,\n  \"level\": 3\n },\n {\n  \"question\": \"What items do you include for on a valuation?\",\n  \"answer\": [\n   \"Items would include:\",\n   \"1) Prelims.\",\n   \"2) Measured Works.\",\n   \"3) Materials on / off site.\",\n   \"4) Variations.\",\n   \"5) Claims.\",\n   \"6) Retention.\",\n   \"7) Previous payments. If an instruction was issued during the contract which involved the fabrication of a substantial amount of materials off site would you pay for them as off site materials within the valuation?\",\n   \"There is no obligation on the client to pay for materials off site if this is not identified in the contract.\",\n   \"However in the scenario where the client wishes to pay for them, I would ultimately check with the client before paying or rejecting them.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 598,\n  \"level\": 2\n },\n {\n  \"question\": \"How would you deal with the urgent Verbal Instructions?\",\n  \"answer\": [\n   \"If the instruction affects the critical path or programme in general I would review the instruction with the contractor administrator, client & contractor.\",\n   \"If the instruction is valid under the contract I would ensure this is converted into a formal written instruction as soon as possible.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 599,\n  \"level\": 3\n },\n {\n  \"question\": \"What documents would be required in incorporating a Contractor Design Portion Supplement into a project?\",\n  \"answer\": [\n   \"Within a Design & Build project, the documentation to be included would be the Employers Requirements including the Scope, Specification, Drawings, Contractors Proposals along with any insurances.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 600,\n  \"level\": 2\n },\n {\n  \"question\": \"Could an e-mail constitute a contract document?\",\n  \"answer\": [\n   \"Yes providing there is offer, acceptance, intention to create legal relations and the responding email does not vary the conditions, a contract will be created.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 601,\n  \"level\": 2\n },\n {\n  \"question\": \"What is your opinion of Oral Contracts?\",\n  \"answer\": [\n   \"Whilst they are legally binding the difficulty lies in proving the specific terms and conditions of the agreement.\",\n   \"It is for this reason why the HGCRA only applies to written contracts.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 602,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between NEC and JCT?\",\n  \"answer\": [\n   \"The main difference between the 2 forms is its usage.\",\n   \"NEC can be used within the building & civil engineering projects whereas JCT is specifically for building projects.\",\n   \"NEC can be adopted to a number of bespoke contract strategies due to the various options available whereas JCT has a standard set of clauses.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 603,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between an information requirement schedule & an information release schedule?\",\n  \"answer\": [\n   \"The information required schedule asks the Contractor to provide dates when design information is required.\",\n   \"The information release schedule informs the Contractor when the design information will be available.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 604,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Frustration?\",\n  \"answer\": [\n   \"Frustration occurs when any event or circumstances beyond control of both parties changes the contractual obligations or makes it impossible or illegal to fulfil their contractual obligations. The happening of such events automatically discharges contract.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 605,\n  \"level\": 1\n },\n {\n  \"question\": \"How is a contract under hand different from a deed?\",\n  \"answer\": [\n   \"A Deed is signed by a witness & traditionally authenticated by a seal.\",\n   \"The limitation period of under hand is 6 years whereas a deed is 12 years.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 606,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the defects liability period?\",\n  \"answer\": [\n   \"The defects liability period is the duration at the end of the contract, usually 52 weeks after the Substantial Completion Certificate has been issued whereby the contractor undertakes to rectify any defects that arise within the structure at the contractors expense, providing they were due to materials & workmanship not being in accordance with the contract.\",\n   \"In the event that the contractor failed to rectify any defects the employer may employ another contractor to carry out the works & recover the cost of doing so from the Main Contractor.\",\n   \"The retention money retained may be used to cover the costs of making good.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 607,\n  \"level\": 1\n },\n {\n  \"question\": \"What is your understanding of latent defects and what contractual issues are associated with them?\",\n  \"answer\": [\n   \"Latent defects are defects which are not readily identifiable upon inspection & only come to fruition some time after building completion and may take many years to become identifiable.\",\n   \"A claim in contract can only be brought about within the limitation period of the contract, 6 or 12 years depending on whether the contract was executed as a deed or underhand.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 608,\n  \"level\": 1\n },\n {\n  \"question\": \"What should the architect do if they are discovered?\",\n  \"answer\": [\n   \"The Architect should issue an instruction as necessary to instruct the contractor what to do if they are identified.\",\n   \"This can include telling them to comply with a third party who is examining or opening up the works to identify the defect. If the works or materials are not in accordance with the Contract what options does the Architect have available to them?\",\n   \"The architect may:-\",\n   \"– Instruct the contractor to remove all defective work, materials and goods at their own expense and time.\",\n   \"– They can notify in writing that they can remain with an appropriate deduction being made from the contract sum.\",\n   \"– Issue instructions for variations that are necessary as a result of the work. If they are necessary there should be no additional costs or extension of time given.\",\n   \"– Instruct the contractor to open up and test further work to determine the extent of any non- compliance.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 609,\n  \"level\": 2\n },\n {\n  \"question\": \"When issuing instructions for further opening up and testing to determine the extent of non-compliance what sort of things should the architect consider?\",\n  \"answer\": [\n   \"The significance of the non-compliance.\",\n   \"Consequences of further non-compliance on building owners and users.\",\n   \"Consequences of further non-compliance on adjoining properties and the public.\",\n   \"Reason for the non-compliance.\",\n   \"Level of supervision and control employed by the contractor.\",\n   \"Currently recognised testing methods.\",\n   \"Time and consequential costs of further opening up.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 610,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a provisional sum?\",\n  \"answer\": [\n   \"A sum of money included in the contract for work that cannot be fully designed and costed at the time of tender or contract sum agreement.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 611,\n  \"level\": 1\n },\n {\n  \"question\": \"What types of provisional sum are there?\",\n  \"answer\": [\n   \"Defined and undefined\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 612,\n  \"level\": 2\n },\n {\n  \"question\": \"Where are these defined?\",\n  \"answer\": [\n   \"NRM\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 613,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a defined provisional sum?\",\n  \"answer\": [\n   \"A sum included in the contract for work that has not been completely designed at the time of contract sum agreement but for which certain specified information can be given about the extent of works, its quantity, duration of installation and how it is to be fixed to the building.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 614,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the contractor deemed to have allowed on the inclusion of a defined provisional sum?\",\n  \"answer\": [\n   \"They are deemed to have made proper allowances for carrying out the work in their programme and preliminaries.\",\n   \"This means that they are not entitled to an extension of time or extra prelims for carrying out the work, whatever the delay or cost of doing so to the contractor.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 615,\n  \"level\": 1\n },\n {\n  \"question\": \"What if the actual work does not closely resemble the provisional sum?\",\n  \"answer\": [\n   \"If the description is not accurate it has to be amended.\",\n   \"This will be treated as a variation.\",\n   \"This will entitle the contractor to an extension of time and extra preliminaries if appropriate.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 616,\n  \"level\": 2\n },\n {\n  \"question\": \"What is an undefined provisional sum?\",\n  \"answer\": [\n   \"A sum included for work for which there is minimal or no information at the time of contract sum agreement. The location, quantity and time associated for the installation of the works is not fully known.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 617,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the contractor deemed to have allowed?\",\n  \"answer\": [\n   \"They are not deemed to have allowed for anything.\",\n   \"Expenditure of the undefined provisional sum may carry additional costs for programme or preliminaries as a result of carrying out the works.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 618,\n  \"level\": 1\n },\n {\n  \"question\": \"How can a provisional sum be expended?\",\n  \"answer\": [\n   \"The architect has to issue an instruction for its expenditure.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 619,\n  \"level\": 2\n },\n {\n  \"question\": \"How are provisional sums dealt with in the final account?\",\n  \"answer\": [\n   \"The provisional sums included in the contract are deducted and the actual amount substituted.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 620,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the risks associated with provisional sums?\",\n  \"answer\": [\n   \"The actual cost and time exceeds that allowed for in the provisional sum because the nature of the item changes between tender and instruction.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 621,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main suites of construction contracts?\",\n  \"answer\": [\n   \"JCT.\",\n   \"NEC 3 & 4.\",\n   \"ECC.\",\n   \"ICE.\",\n   \"FIDIC.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 622,\n  \"level\": 1\n },\n {\n  \"question\": \"What does ‘JCT’ stand for?\",\n  \"answer\": [\n   \"Joint Contracts Tribunal.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 623,\n  \"level\": 2\n },\n {\n  \"question\": \"What does NEC stand for?\",\n  \"answer\": [\n   \"New Engineering Contract.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 624,\n  \"level\": 2\n },\n {\n  \"question\": \"What does ECC stand for?\",\n  \"answer\": [\n   \"Engineering and Construction Contract.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 625,\n  \"level\": 2\n },\n {\n  \"question\": \"What does FIDIC stand for?\",\n  \"answer\": [\n   \"Federation internationale des ingenieurs civils.\",\n   \"International Engineers Federation.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 626,\n  \"level\": 2\n },\n {\n  \"question\": \"What does ICE stand for?\",\n  \"answer\": [\n   \"Institution of Civil Engineers\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 627,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the main parts of the JCT contracts?\",\n  \"answer\": [\n   \"Recitals.\",\n   \"Articles.\",\n   \"Contract Particulars.\",\n   \"Attestation.\",\n   \"Conditions divided into 9 sections (7 for minor works).\",\n   \"Schedules.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 628,\n  \"level\": 1\n },\n {\n  \"question\": \"Name the 9 sections\",\n  \"answer\": [\n   \"Definition and interpretation.\",\n   \"Carrying out the works.\",\n   \"Control of the works.\",\n   \"Payment.\",\n   \"Variations.\",\n   \"Injury, damage and insurance.\",\n   \"Assignment, Third Party Rights and collateral Warranties.\",\n   \"Termination.\",\n   \"Settlement of disputes.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 629,\n  \"level\": 1\n },\n {\n  \"question\": \"Name the main types of JCT contract\",\n  \"answer\": [\n   \"Minor works.\",\n   \"Intermediate.\",\n   \"Standard building contract.\",\n   \"Major Projects.\",\n   \"Design and Build.\",\n   \"Prime cost contract.\",\n   \"Measured Term contract.\",\n   \"Construction Management Agreement.\",\n   \"Management Contract.\",\n   \"Framework Agreement.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 630,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use JCT Minor Works?\",\n  \"answer\": [\n   \"Projects that are short in duration on a small scape with a straight forward construction.\",\n   \"JCT guidance is for a value up to £200,000 but it has to be simple in nature.\",\n   \"It is a lump sum form where design should be completed prior to execution.\",\n   \"The Employer or their team is to provide specifications, drawings and a schedule of works.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 631,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use JCT Intermediate Contract?\",\n  \"answer\": [\n   \"The Intermediate form is recommended for projects that do not exceed a one year duration.\",\n   \"The project should be simple in content and require only basic skills and trades where services are not complex and where the works are already designed.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 632,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use a JCT Standard contract with quantities?\",\n  \"answer\": [\n   \"A JCT Standard Building Contract would be used where the work has already been designed at execution.\",\n   \"It is suitable for use with a bill of quantities and is a lump sum form.\",\n   \"The contractor’s risk is limited to price only.\",\n   \"The employer takes the risk of errors in the bill.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 633,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use JCT Standard without quantities?\",\n  \"answer\": [\n   \"This is suitable where work has been designed prior to contract however there is no bill of quantities.\",\n   \"The contract documents will include drawings, specification and a schedule of rates.\",\n   \"It is a lump sum form of contract.\",\n   \"The contractor’s risk includes both price and quantity.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 634,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use JCT Standard with approximate quantities?\",\n  \"answer\": [\n   \"This is a remeasurement form of contract.\",\n   \"There is no fixed contract sum.\",\n   \"It is used where the design is not completed at the time of execution.\",\n   \"An approximate bill of quantities will have been prepared.\",\n   \"Construction is aimed to commence prior to the design being completed.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 635,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use JCT DB?\",\n  \"answer\": [\n   \"When the contractor is responsible for design and construction.\",\n   \"The project should be similar in complexity to that of standard building contracts.\",\n   \"The contactor’s proposals form the basis of the contract.\",\n   \"There is no mention of an architect or QS instead this role is replaced by the title of Employers Agent.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 636,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the key differences between JCT Minor Works, Intermediate and D&B Contracts?\",\n  \"answer\": [\n   \"The minor works only has 7 sections of conditions instead of 9. Variations are included within the Control of the Works section and there is no ‘assignment and collateral warranties provision’.\",\n   \"There is no mention of the QS in minor works and D&B however there is in the Intermediate Form.\",\n   \"In Minor Works there is no provision for named sub-contractors, no provision for bonds and collateral warranties and no advance payment provision.\",\n   \"Minor works also has no provision for sectional completion or partial possession.\",\n   \"In Minor Works there are no relevant events listed for extension of time, instead it is referred to as ‘anything outside the contractor’s control’.\",\n   \"The standard rectification period is 3 months for minor works and 6 months for D&B and Intermediate.\",\n   \"The standard retention is 5% for Minor Works and Intermediate and 3% for D&B.\",\n   \"D&B is administered by an Employer’s Agent rather than a Contract Administrator.\",\n   \"In Minor Works and the Intermediate Form, the Contractor may be responsible for completing discrete part of the design whereas in D&B, he is responsible for completing the overall design.\",\n   \"In D&B, the EA may request a quotation prior to instructing a change.\",\n   \"There is no fluctuation mechanism for labour and materials costs in Minor Works and Intermediate Forms.\",\n   \"Payments are made at regular intervals in Minor Works and Intermediate Forms whereas D&B gives the option of stage payments.\",\n   \"In Minor Works, there is no option for the employer to take out a joint name all risk policy, only options A and C.\",\n   \"There is no provision for third party rights in Minor Works or Intermediate Forms.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 637,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a bespoke contract?\",\n  \"answer\": [\n   \"Contract conditions that are drafted specifically for a particular project.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 638,\n  \"level\": 1\n },\n {\n  \"question\": \"What the advantages of standard forms over bespoke contracts?\",\n  \"answer\": [\n   \"They are written by legal experts.\",\n   \"Rights and obligations of each party are clearly set out to the required level of detail.\",\n   \"Risks should have been allocated appropriately between the parties.\",\n   \"Parties should be familiar with the provisions in the form providing greater consistency in application and fewer unforeseen anomalies.\",\n   \"The time and expense of preparing a fresh document for each occasion is avoided.\",\n   \"Case law is built up over time and provides a good source of knowledge and clarity of the terms.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 639,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"Apportionment of risks is rarely questioned and therefore becomes implicit meaning it is not reviewed on whether it is appropriate.\",\n   \"They may not be appropriate to the needs of a particular project or client.\",\n   \"Using an inappropriate standard form for the project will cancel out any advantages.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 640,\n  \"level\": 1\n },\n {\n  \"question\": \"When would use a bespoke contract rather than a standard form?\",\n  \"answer\": [\n   \"They should generally be used for major projects with novel obligations.\",\n   \"When specialist advisors can undertake the amendments as this requires great skill and knowledge.\",\n   \"Drafting from first principles is too daunting for most in the industry.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 641,\n  \"level\": 1\n },\n {\n  \"question\": \"Can you have an EOT without an L&E claim?\",\n  \"answer\": [\n   \"Yes an EOT does not automatically mean entitlement to L&E.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 642,\n  \"level\": 2\n },\n {\n  \"question\": \"When pricing an EOT what would you include for and what rates?\",\n  \"answer\": [\n   \"When pricing an EOT I would include costs for prolongation of site cabins, site utilities, welfare facilities, management staff, security, cleaners, inefficient use of labour & plant resources, subcontractor mobilisation costs, head office, finance charges & loss of profit. If a project was due to finish before Christmas, but an extension of time was given which meant the contractor finished after Christmas, is the contractor entitled to costs over the Christmas break, which is normally 2 weeks?\",\n   \"It would depend on why the EOT had been issued.\",\n   \"The contractor would be entitled to costs over the Christmas period for prelims / site cabins if the reason for the EOT allows the contractor to claim L&E.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 643,\n  \"level\": 1\n },\n {\n  \"question\": \"Would you get involved in helping the Architect assess the Extension of Time?\",\n  \"answer\": [\n   \"Yes the QS would become involved in assessing the financial implications of the EOT, if applicable.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 644,\n  \"level\": 3\n },\n {\n  \"question\": \"Explain the relative advantages & disadvantages of the NEC and JCT?\",\n  \"answer\": [\n   \"Advantages of the JCT Suite of Contracts:-\",\n   \"– They are considered by many as the “industry standard,” therefore they offer familiarity.\",\n   \"– They cover most forms of procurement and building types through the various impressive ancillary documents to support the main forms.\",\n   \"– They are comprehensive in detail and considered by many to be fair and reasonable and not loaded in favour of either party. Advantages of the NEC Contract\",\n   \"They are applicable to a variety of procurement strategies,\",\n   \"They offer clarity and simplicity by using:-\",\n   \"– Ordinary language (minimal legal jargon).\",\n   \"– They include flow charts to support their users.\",\n   \"They act as a stimulus to good management through maintaining:-\",\n   \"– Up-to-date programmes which are required to be clear and precise.\",\n   \"– Provision of early warning procedures and risk registers.\",\n   \"– They Embody key features of project partnering.\",\n   \"– Assessment of Compensation events by applying a “rolling Final Account.” Disadvantages of the JCT Suite of Contracts\",\n   \"They are sometimes though to “compromise conditions,” in which they try to satisfy the interests of all parties.\",\n   \"They can be considered as unnecessarily long and unnecessarily complex. Disadvantages of the NEC Contract\",\n   \"They are often only considered to be used for civil engineering projects and partnerships.\",\n   \"They have limited exposure to the market so they are therefore not fully tried and tested with supporting case law.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 645,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the key differences between NEC and JCT?\",\n  \"answer\": [\n   \"The NEC is concise and written in plain English.\",\n   \"There are a number of optional clauses reducing the need to amend contracts compared to the JCT.\",\n   \"The Project Manager is presented with options to deal with problems as soon as they become apparent.\",\n   \"Provision of early warning procedure and risk register encourage a proactive approach to the management of the project whereas JCT is more reactive.\",\n   \"Compensation events deal with issues affecting both cost and money under NEC whereas under JCT, variations deals with money and loss and expenses deal with time.\",\n   \"Changes are based on quotations prior to commitment whenever possible under a rolling final account under NEC whereas under JCT agreement of costs can be left to the very end of the project.\",\n   \"Cost of compensation events are calculated using schedules of actual costs rather than bill rates under JCT.\",\n   \"There is no QS or Employers Agent mentioned in NEC only a Project Manager who takes on both roles.\",\n   \"The Programme is a contract document under NEC with 25% of money being deducted on interim payments if the contractor does not submit an accepted programme at contract stage.\",\n   \"The NEC has no provision for nomination of sub-contractors but preferred sub-contractors can be listed within the Works Information.\",\n   \"The Defects correction period has different periods specified depending on the impact of the defect under NEC where the contractor must “make good” in these time periods. This approach is much better at dealing with defects when compared to JCT.\",\n   \"Short periods of reply are adopted under NEC which incentivise the parties to respond to each other however is reality the NEC maybe considered as very administration heavy.\",\n   \"Retention and delay damages are optional clauses under NEC.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 646,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the role of the parties in the NEC?\",\n  \"answer\": [\n   \"The Project Manager can be from the employer’s organisation or an external consultant.\",\n   \"The Project Manager represents the client and has full authority to make decisions, unless the employer has restricted his authority. The PM has the duty to be impartial and to apply the contract.\",\n   \"Designers prepare the work information and are not named in the NEC.\",\n   \"The supervisor is either from the employer’s organisation or an external consultant.\",\n   \"The supervisors role is to check that the works are carried out as described in the contract.\",\n   \"They have a similar role to the clerk of works with authority such as instructing searches or issuing defect certificates.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 647,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the role of the quantity surveyor under the NEC?\",\n  \"answer\": [\n   \"The role of the QS is not mentioned in the contract.\",\n   \"The QS can adopt a supporting role to contractor and PM to agree cost of compensation events despite not being formally referenced.\",\n   \"Options B and D involve quantities and measurement.\",\n   \"Target costs under options C and D require an audit role in open book accounting in target contracts which the QS may be responsible for.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 648,\n  \"level\": 1\n },\n {\n  \"question\": \"How is risk management dealt with in the NEC?\",\n  \"answer\": [\n   \"A risk register should be produced as soon as possible and regularly updated this is defined in clause 11.2(14).\",\n   \"It should include the description of the risk and the mitigation measure, not the value or the owner.\",\n   \"Employer’s risks are listed in the compensation events (clause 60) and in the contract data (additional employer’s risks). Everything else is deemed to be a contractor’s risk.\",\n   \"Caution: If ownership is stated in the risk register, it must match the contract conditions or it will create conflict. Compensation events can be added or deleted in Z clauses. Additional employer’s risks are listed in the contract data.\",\n   \"In case of discrepancy between the risk register and terms of the contract, it will be read in the favour of the party who didn’t prepare the risk register, i.e. the contractor.\",\n   \"If a sum is stated in the risk register neither party can claim for savings or compensation if the cost of the risk turns out to be less or more.\",\n   \"Risks can only be transferred against a lump of money by modifying the contract conditions. The risk register is not contractual.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 649,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a compensation event?\",\n  \"answer\": [\n   \"Events which, if they do not arise from the fault of the Contractor’s, entitle the Contractor to be compensated for effect on the Prices, Key Dates and Completion Date.\",\n   \"There are 19Nr compensation events listed in clause 60.1\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 650,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Early Warning Notices under an NEC contract and what are their purpose?\",\n  \"answer\": [\n   \"They are notices given by the PM or the contractor of any matter which could potentially have an impact on cost, completion date, key dates or performance of the works in use.\",\n   \"Their purpose is to give the parties sufficient time to consider the options available to prevent or mitigate the issue and collaboratively find the best solution to meet the employer’s interests.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 651,\n  \"level\": 1\n },\n {\n  \"question\": \"How are early warnings dealt with?\",\n  \"answer\": [\n   \"The PM and contractor have duties to give each other early warnings for inclusion in the risk register as soon as they become aware of an event that may:-\",\n   \"– Increase the total of the prices.\",\n   \"– Delay Completion.\",\n   \"– Delay meeting a Key Date or impair the performance of the works in use.\",\n   \"The PM is to record all the early warnings in the risk register, even if some may not be worth mentioning.\",\n   \"Any party can call for a risk reduction meeting to review the early warning notices and collaboratively find the best solutions to meet the employer’s interests.\",\n   \"As early warnings are resolved, they are removed from the risk register.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 652,\n  \"level\": 2\n },\n {\n  \"question\": \"What input have you given into EWN’s on the projects you have worked on?\",\n  \"answer\": [\n   \"I have checked the contractor’s estimated cost of EWN’s.\",\n   \"I have notified Early Warning when I became aware of them.\",\n   \"I have attended risk reduction meetings. Those were informal for ‘Project X’ but very formal and involving many parties for ‘Project Y’.\",\n   \"I have suggested options for dealing with early warnings, for example, in ‘Project X’, when the contractor notified us of a series of events that compromised the completion date, I discussed with the parties the practicalities of a different sequence of works and traffic management measures to permit partial taking-over by the employer, who already had a thousand cars booked for the planned completion date.\",\n   \"Because this issue was dealt with early enough, we managed to work together to put in place a workable solution that suited the employer’s interests.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 653,\n  \"level\": 2\n },\n {\n  \"question\": \"How are ambiguities and inconsistencies dealt with under the NEC?\",\n  \"answer\": [\n   \"Under clause 17 they are awarded in favour of the party who did not provide the works information.\",\n   \"The PM issues an instruction to vary the works information which is a compensation event.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 654,\n  \"level\": 2\n },\n {\n  \"question\": \"How is the contractor’s design dealt with?\",\n  \"answer\": [\n   \"Clause 21 - The contractor must obtain acceptance from the supervisor and PM but remains liable for any failure in the design.\",\n   \"There is no provision for novation as the NEC considers it is against good management.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 655,\n  \"level\": 2\n },\n {\n  \"question\": \"How does the NEC deal with time and programme?\",\n  \"answer\": [\n   \"The employer sets the access dates for areas of the works if applicable with the starting date, the key dates or milestones and completion date.\",\n   \"The contract duration is not stated, the contractor must complete the works on or before the stated date.\",\n   \"If the contractor fails to meet the completion date, delay damages apply if option X7 was selected.\",\n   \"The PM must issue the ‘notice of completion’ within a week of completion.\",\n   \"The programme is a contractual document.\",\n   \"Clause 31.2 details the requirements of the programme:-\",\n   \"– Dates stated in the contract data and work information.\",\n   \"– Dates when the contractor intends to meet these requirements.\",\n   \"– Method statements.\",\n   \"– Order and timings.\",\n   \"– Float, and separate time risk allowances.\",\n   \"– Health and safety requirements.\",\n   \"– Dates when site access, information, plant and materials are to be provided by the employer will be required to meet the programme.\",\n   \"The programme must be regularly updated and show the effects of early warnings.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 656,\n  \"level\": 2\n },\n {\n  \"question\": \"How is completion defined under the NEC?\",\n  \"answer\": [\n   \"All the works have been completed as described in the works information (drawings and specifications).\",\n   \"The contractor has done all the works required for the employer to use the works and for others to do their work.\",\n   \"All notified defects that may prevent the employer or others to use the works have been rectified.\",\n   \"The PM has one week to certify completion.\",\n   \"Clause 35 specifies that the employer should take over the works within 2 weeks of completion. If he takes over part of the works, this is a compensation event.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 657,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the difference between acceleration (clause 36) and early completion bonus (clause X6)?\",\n  \"answer\": [\n   \"Acceleration is where the completion date and key dates are advanced for an agreed price. Delays and damages apply from the revised date.\",\n   \"An early completion bonus is where the contractor receives a bonus proportional to the number of days they completed the works in advance of the completion date with the original completion date being unchanged.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 658,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the payment mechanisms under the NEC?\",\n  \"answer\": [\n   \"In option A, the contractor is paid when an activity is complete; there is no mechanism for part payment of an activity or materials on site.\",\n   \"In option B, the Price for Work Done to Date (PWDD) is calculated via bill rates and lump sums.\",\n   \"The assessment interval cannot be more than 5 weeks\",\n   \"The final assessment is to be made within 4 weeks of the defect certificate.\",\n   \"The PM has the duty to assess payments due even if the contractor does not submit an application.\",\n   \"The amount due is the PWDD plus any other amounts due to the contractor + / - the amount to be paid or retained by the contractor.\",\n   \"The PM must certify the assessment within one week of the planned assessment date.\",\n   \"Payment is due within 3 weeks of the assessment date unless stated otherwise in the contract data.\",\n   \"If payment is late or the certified assessment is later corrected for error or dispute resolution, interest is payable to the contractor at no less than 2% above the base rate of the bank specified in the contract data.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 659,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the difficulties of assessing interim valuations with an activity schedule? (Option A)\",\n  \"answer\": [\n   \"The activity schedule does not describe the works to be done; this is included in the works information. Therefore there is a need to cross reference to understand what works are required for the activity to be fully completed.\",\n   \"If the contractor re-sequences the works to meet the completion date, he needs to revise the activity schedule so that the works and methods of working included in each activity are compatible with the programme.\",\n   \"He may take advantage of this to disproportionally load some activities.\",\n   \"The PM can reject the revised SoA in this case.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 660,\n  \"level\": 1\n },\n {\n  \"question\": \"Under which conditions can the activity schedule be adjusted?\",\n  \"answer\": [\n   \"There are only 3:-\",\n   \"– Compensation events.\",\n   \"– Changes in a planned method of working (re-scheduling).\",\n   \"– Acceptance of a quotation for acceleration.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 661,\n  \"level\": 2\n },\n {\n  \"question\": \"How does the NEC permit payment by milestones / stages?\",\n  \"answer\": [\n   \"The contractor must group in his tender his activities by groups of activities which will form the milestones.\",\n   \"At each assessment date the PM assess the level of completion of each group. Payment is only certified when all activities of the group have been fully completed with no scope for partial payments.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 662,\n  \"level\": 2\n },\n {\n  \"question\": \"Name some of the compensation events.\",\n  \"answer\": [\n   \"There are 19 of them in clause 60.1:-\",\n   \"– Changing the works information.\",\n   \"– Access to the site.\",\n   \"– PM instructs to stop work.\",\n   \"– PM or supervisor do not respond to a communication within the timescale stated in the contract.\",\n   \"– Object of value or historical interest.\",\n   \"– PM withholds an acceptance without valid reason.\",\n   \"– Instruction to search.\",\n   \"– Adverse weather (as measured in the contract data).\",\n   \"– Employer’s risks listed in clause 80.1 and contract data.\",\n   \"– PM changes assumptions previously made on compensation events\",\n   \"– Employer’s breach of contract.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 663,\n  \"level\": 1\n },\n {\n  \"question\": \"How are compensation events dealt with?\",\n  \"answer\": [\n   \"The Project Manager notifies the Compensation Event at the time of giving the instruction.\",\n   \"Or the contractor notifies the Project Manager of the CE but he must do so within 8 weeks of becoming aware otherwise they are not allowed compensation.\",\n   \"The PM has one week to decide whether it is a valid CE (or longer if agreed with the contractor).\",\n   \"If the PM fails to do so, the contractor notifies the PM that he needs to make a decision. If the PM still does not respond within 2 weeks of this notification, the CE is deemed to be accepted and the contractor can submit a quotation.\",\n   \"The contractor has 3 weeks to provide a quotation.\",\n   \"Within 2 weeks, the Project Manager can either request a revised quotation, or accept the quotation, or inform the contractor that the proposed change is not being pursued, or inform the contractor that he will make his own assessment.\",\n   \"If the PM failed to respond within the timescales, the contractor notifies him. If the PM fails to respond within a further 2 weeks, the quotation is deemed to be accepted.\",\n   \"Timescales can be extended if the parties agree. If there is a discrepancy between the employer’s requirements and contractor’s proposals which prevail?\",\n   \"The Contractor’s Proposals.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 664,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the contractor’s design liability under JCT contracts?\",\n  \"answer\": [\n   \"The same as an independently employed architect with the duty to offer reasonable skill and care.\"\n  ],\n  \"category\": \"Contract Administration\",\n  \"id\": 665,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Cost Value Reconciliation?\",\n  \"answer\": [\n   \"Cost value reconciliation is used to measure the projects ongoings costs and income against budgeted values at the start of the project.\",\n   \"This allows the profitability of the project to be determined at a given point in time throughout the project lifecycle.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 666,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you prepare a Cost Value Reconciliation?\",\n  \"answer\": [\n   \"I would determine the cumulative costs and value of the project to a set given point in time.\",\n   \"The cut-off date may coincide with an agreed accounting period or month end period which I would establish with the project management team.\",\n   \"I would carry out cost checks to ensure that:-\",\n   \"– No high value fluctuations in costs or value are expected during the reporting period.\",\n   \"– That all work in progress is accounted for and the reported values are inline with subcontractor’s measures and liabilities.\",\n   \"– Risk and contingency items have been included for items not yet agreed.\",\n   \"– When all costs and value items are finalised I would then determine the current profitability of the project and compare this against the original budgeted values.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 667,\n  \"level\": 3\n },\n {\n  \"question\": \"How do you ensure your Cost Value Reconciliation is accurate and up to date?\",\n  \"answer\": [\n   \"The forecast revenue on variations is only reported when variation items are agreed.\",\n   \"A reduced percentage profit is assumed if variations are paid on account or partly agreed.\",\n   \"Contingency items are retained with the CVR for any unknown or pending cost items.\",\n   \"I regularly arrange meetings to conclude the agreement of variations for each of the sub-contract packages so a backlog of items pending does not form.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 668,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Cash Flow Analysis?\",\n  \"answer\": [\n   \"A cash flow analysis highlights the movement of income and expenditure into and out of a business over time.\",\n   \"If the level expenditure going out of the company is higher than the income, the cash flow is classed as cash negative and may highlight the need to make additional funding arrangements.\",\n   \"The cash flow analysis will typically be based on a number of factors such as:-\",\n   \"– Under or over valuation of works complete and the impact this may have on cash flow.\",\n   \"– The contractual payment process so that the incoming payments can be accurately profiled.\",\n   \"– Month end dates for payments of salaries, leases and other fixed costs.\",\n   \"– Credit arrangements with subcontractors and suppliers.\",\n   \"It is important for contracting organisations to maintain positive cashflow where possible in order to avoid the need for expensive borrowing arrangements.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 669,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you compile a cash flow?\",\n  \"answer\": [\n   \"To calculate the project incomes I would look to utilise the agreed payment schedule set out under the terms of the contract, the programme and the BoQ or Activity schedule.\",\n   \"I would then accurately profile when the income is anticipated to be received and plot these dates on the cash flow forecast.\",\n   \"If this information is not available it may be possible to use information cash flow analysis software to plot a typical S-curve.\",\n   \"For the outgoings I would liaise with the supply chain to gain an insight of when invoices and payments are expected to become due taking extra care to account for any long lead items.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 670,\n  \"level\": 3\n },\n {\n  \"question\": \"Please explain your understanding of the term ‘Accruals’?\",\n  \"answer\": [\n   \"Accruals are made within the financial accounting systems that are operated to take into account anticipated invoices that are not yet paid.\",\n   \"The accrual can be calculated as the difference in the total liability that is due to a sub-contractor or supplier against the amount already paid to date.\",\n   \"The accruals are retained as anticipated cash outflows not yet incurred and in theory the older the accruals are, the less likely they are to paid and may be released at a given point in time.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 671,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the term ‘Contra Charge’?\",\n  \"answer\": [\n   \"Contra charges are issued as a deduction to a sub-contractors works package as a result of a cost item that has been incurred due to their activity on site.\",\n   \"For example a contra charge could be issued due to damage of property or equipment due to a subcontractor’s failure to put in place adequate protection of their working area.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 672,\n  \"level\": 2\n },\n {\n  \"question\": \"What processes would you put in place when making a contra charge?\",\n  \"answer\": [\n   \"I would attach supporting photographs, invoices and site records to the contra charge.\",\n   \"Any replacement materials or attendances provided to assist the subcontractor would also be recorded.\",\n   \"I would issue an early warning to the subcontractor’s commercial representative to make them aware of the contra charges being made and provide then with an opportunity to rectify the damages if possible.\",\n   \"I would try to ensure the contra charge is agreed with the sub-contractor prior to making adjustments to any payment certificates or running final accounts.\",\n   \"When issuing subsequent payment certificates, pay less notices or final account adjustments, I would clearly set out the contra charges as an individual line item for transparency with supporting substantiation attached.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 673,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Risk and Opportunity Register?\",\n  \"answer\": [\n   \"A risk and opportunity register summaries the potential or hypothesised risks that are specific to the project.\",\n   \"Whilst the format and content may vary depending on the nature of the project, its size and value, they will typically include an assessment of the likelihood of each risk and the potential impact it may have on the project if it is realised.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 674,\n  \"level\": 1\n },\n {\n  \"question\": \"What does a Risk and Opportunity Register look like?\",\n  \"answer\": [\n   \"The register will typically be compiled in a tabulated form with columns provided for:-\",\n   \"– The name and description of the risk item.\",\n   \"– An explanation of how the risk will impact the project.\",\n   \"– The likelihood of the risk occurring.\",\n   \"– A risk grade based on the probability multiplied by the impact.\",\n   \"– A risk classification of either High, Medium or Low.\",\n   \"– A summary of mitigation actions to be taken.\",\n   \"– The risk owner.\",\n   \"– The potential cost of the risk.\",\n   \"– A deadline date of when the risk is to be closed.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 675,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Company Overhead?\",\n  \"answer\": [\n   \"Company overheads are ongoing expenses incurred as a result of the day-to-day operations of the business.\",\n   \"They are items that need to be incurred in order to provide critical support to the revenue generating arms of the company for example factory rental costs, heating and lighting.\",\n   \"They are classified as fixed overheads which do not change for example monthly rental costs and variable overheads which do change depending on business activity for example heating costs.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 676,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of maintaining cumulative accounts and payment procedures?\",\n  \"answer\": [\n   \"Reporting, invoicing and processing of payments is done on a cumulative basis to ensure the full extent of the financial information is accounted for.\",\n   \"If this is not adopted and invoices are made ‘in the period’ mistakes can be made and double counting may take place.\",\n   \"It is much safer to work on a cumulative basis as the risk of double counting or missing invoices is reduced.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 677,\n  \"level\": 1\n },\n {\n  \"question\": \"Please explain your understanding of the term ‘Earned Value Analysis’?\",\n  \"answer\": [\n   \"Earned Value Analysis is a technique used to forecast the final financial position of a project.\",\n   \"The technique compares the current progress achieved to date with the planned progress at a given point in time.\",\n   \"It also considers the current costs incurred with planned costs over the same time period.\",\n   \"The EVA determines what value of work would have been achieved and what costs would have been incurred if the works had been on programme to forecast future performance and to highlight potential cost overspends and time overruns.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 678,\n  \"level\": 2\n },\n {\n  \"question\": \"What Contract Administration Controls do you implement?\",\n  \"answer\": [\n   \"Utilisation of payment and valuation schedules to ensure all parties are aware of key dates in accordance with the contract and Housing Grants Construction and Regeneration Act.\",\n   \"Running final accounts to ensure each party is informed of any adjustments, claims and variations.\",\n   \"Regular review of revised drawings and contractor’s instruction to ensure all variation and claims items are captured.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 679,\n  \"level\": 2\n },\n {\n  \"question\": \"What procedures do you adopt for supply chain and sub- contractor management?\",\n  \"answer\": [\n   \"My company maintains a database of potential suppliers that allows categorisation of specific trades with a current status of either pending approval, authorised or not to be used.\",\n   \"These categories are based on previous performance in combination with undertaking regular checks on items such as insurance certificates being provided, credit checks, maintenance of accident records and obtaining copies of quality management accreditations.\",\n   \"Performance checks will include items such as Health & Safety track record, quality reviews, remedial work requirements, programme delays, commercial and contract administration performance.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 680,\n  \"level\": 2\n },\n {\n  \"question\": \"What procedures do you undertake to resolve sub-contract final accounts?\",\n  \"answer\": [\n   \"Throughout the project I would maintain a running final account of the sub-contract package and look to agree any variation items with the sub-contractor on an ongoing basis.\",\n   \"Having the running final account in place in my experience has supported with reaching a swift final account agreement.\",\n   \"Prior to arranging the final account meeting I would collate the following items to support the discussion:-\",\n   \"– The subcontract order agreement including the BoQ or pricing schedule.\",\n   \"– The final account submission or final subcontract application for payment.\",\n   \"– Details of all variations or changes with full substantiation\",\n   \"– Supporting quantities or take-offs for any re-measurable items.\",\n   \"During the meeting I would run through the agreed and any pending adjustments with the sub- contractor.\",\n   \"Following discussions and agreement during the meeting I would circulate the final account statement for signature by both parties and hold this on file. Could you please provide some examples of mitigation strategies you could implement if the project was behind programme?\",\n   \"With input from the project manager, I would review team the current status of the programme and consider our options.\",\n   \"This could include selection of different construction methodologies or programme sequencing.\",\n   \"It may also be possible to explore the option of reviewing staffing and resource levels to gain further efficiencies.\",\n   \"Out of hours, weekend working or additional resources may also be utilised to bring current progress back in line with programme requirements.\",\n   \"Programme sequencing or acceleration options would need to be balanced against the additional costs that are likely to be incurred.\",\n   \"It may be the case that programme float is sufficient to absorb the delay that has been forecast.\",\n   \"I would also look to determine the origin of the delay to establish whether an extension of time or acceleration claim is applicable. Could you please provide some examples of mitigation strategies you could implement to safe guard against material price increases?\",\n   \"As a company wide strategy, we have hedged against the risk of material price increases and lack of availability by bulk purchasing materials in advance, in particular for steel and plastic piping to cover the extent of projects we are currently in contract to provide.\",\n   \"We have also placed early orders with our supply chain to safeguard against potential price increases.\",\n   \"Another strategy we have implemented has been to insert clauses within our current contracts that offer a fixed price period. In the event that the project is postponed, the contract then contains a mechanism to claim a material price supplement from the client.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 681,\n  \"level\": 2\n },\n {\n  \"question\": \"Please provide some examples of commercial decisions you have taken to improve the cost efficiencies of your projects?\",\n  \"answer\": [\n   \"On an industrial scheme I negotiated with a local land owner who agreed to dispose the inert excavated topsoil which was more advantageous than using local earthwork removal subcontractors.\",\n   \"The local landowner was also able to provide access across their land to a local water source which was much more efficient than using imported water and bowsers on site.\",\n   \"I have also undertaken comparisons between the outright purchase of plant and equipment vs. short term hire to realise cost efficiencies for my projects.\",\n   \"I have also recently undertaken a comparison between the use of temporary power leasing of generators and fuel against the use of a permanent local power sources to realise cost efficiencies.\"\n  ],\n  \"category\": \"Commercial Management of Construction\",\n  \"id\": 682,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you carry out risk analysis and risk management?\",\n  \"answer\": [\n   \"If the project is being undertaken within a wider programme of similar projects, experienced clients may have access to risk registers from previous schemes that can be used as a starting point.\",\n   \"A risk management workshop can also be organised with all members of the design team coming together to identity project specific risk items.\",\n   \"The risk register can be updated during the meeting and will form the basis of risk management for the project.\",\n   \"These risks will be continually monitored as the project progresses.\",\n   \"Identified risks can either be removed or we can aim to reduce their probably of occurring and put in mitigation measures if they do occur.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 683,\n  \"level\": 2\n },\n {\n  \"question\": \"What is risk defined as?\",\n  \"answer\": [\n   \"An uncertain event that will have an effect on the achievement of the project objectives should it occur.\",\n   \"Risks are measured in terms of their likelihood (probability) and consequence (impact).\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 684,\n  \"level\": 1\n },\n {\n  \"question\": \"What is risk management?\",\n  \"answer\": [\n   \"A process for identifying, assessing and responding to risks associated with the delivery of an objective such as a construction project.\",\n   \"Risk management establishes a set of procedures by which risks are managed.\",\n   \"It comprises an intuitive approach where project teams look to manage risk in a more proactive manner.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 685,\n  \"level\": 1\n },\n {\n  \"question\": \"Can you expand on the Identify, Assess, Respond approach?\",\n  \"answer\": [\n   \"Identification takes place after the project and its objectives have been well defined.\",\n   \"A risk cannot be effectively managed before it has been identified.\",\n   \"Risk identification should be carried out as early as possible.\",\n   \"Assessment can be carried out to determine the probability and impact of each risk item and its effect on cost, time and performance of the project. A qualitative approach can also be undertaken to describe the risk and effect on project performance.\",\n   \"Response actions aim to reduce the probability of the risk arising or to mitigate its impact should the risk arise.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 686,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Risk Event?\",\n  \"answer\": [\n   \"An event that can be predicted to at least some degree, generally based on historical data or experience and making a decision according to the probability of a particular event occurring.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 687,\n  \"level\": 1\n },\n {\n  \"question\": \"What is an uncertain or unforeseen event?\",\n  \"answer\": [\n   \"A random event that defies prediction.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 688,\n  \"level\": 1\n },\n {\n  \"question\": \"Why is risk management needed in construction?\",\n  \"answer\": [\n   \"Projects are typically complex, all have time, cost and quality targets which must be met.\",\n   \"Risk is present in all projects and surveyors are routinely involved in making decisions which have a major impact on risk.\",\n   \"Risk management cannot eliminate risk, but techniques can be used to reduce the impact of events that may cause failure to reach the desired targets.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 689,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the stages of Risk Management?\",\n  \"answer\": [\n   \"Identification.\",\n   \"Analysis.\",\n   \"Response.\",\n   \"Monitor and control.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 690,\n  \"level\": 1\n },\n {\n  \"question\": \"Can you give me some examples of risk in a construction project?\",\n  \"answer\": [\n   \"External risks for example include economic uncertainty, legislation changes and changes in government policy.\",\n   \"Financial risks for example include exchange rate changes or the increased cost of borrowing.\",\n   \"Site risks such as restricted access, planning difficulties and environmental issues can also be considered as further examples.\",\n   \"Client risks may include a lack of experience, a multi-headed client and the likelihood of post contract changes.\",\n   \"Design risks including an inappropriate consultant team, poor team ethos, an incomplete design or lack of design co-ordination.\",\n   \"Construction and delivery risks may include adverse weather, H&S and availability of resources.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 691,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Risk Allocation?\",\n  \"answer\": [\n   \"Risks should be allocated to those who are best able to manage it, in a manner likely to optimise project performance.\",\n   \"Financial allocation of risk should be achieved through the contract documents.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 692,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the benefits of risk management?\",\n  \"answer\": [\n   \"Increased confidence in achieving project objectives and success.\",\n   \"Reduced likelihood of cost and time overruns.\",\n   \"The team understands and recognises the use and composition of contingencies.\",\n   \"It enables decision making to be made on an assessment of known variables that are available.\",\n   \"Risk management workshops can facilitate team development and encourage communication.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 693,\n  \"level\": 1\n },\n {\n  \"question\": \"Please provide an overview of Risk Management?\",\n  \"answer\": [\n   \"Risk Management involves a set of procedures to mitigate risk.\",\n   \"There are 4 stages: Identify, Analyse, Respond, Review:- o 1) The identification stage involves identifying & prioritising those uncertainties that may have an adverse effect on the project. This can be achieved through workshops, experience and use of risk registers. o 2) The analysis stage involves assessing the impact of those identified risks and those most critical to the project in terms of time & cost. This can be achieved through judgement, probability matrix, monte carlo analysis and decision trees. o 3) The response stage involves implementing effective strategies to mitigate the impact of each risk. This could include acceptance, monitor, reduce, transfer and avoid via a change of design. In order to effectively manage those risks that cannot ultimately be avoided it must be allocated to the party best able to manage it. o 4) Regular reviews can be carried out to identify new risks & monitor existing risks up to completion.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 694,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe the format of the risk register?\",\n  \"answer\": [\n   \"A risk register format will typically include:- o 1) A description of the risk. o 2) The risk owner. o 3) A probability of occurrence. o 4) The impact of its occurrence (£/wks). o 5) Risk factors (probability x impact). o 6) Actions required. o 7) Review date. o 8) Status (open or closed).\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 695,\n  \"level\": 2\n },\n {\n  \"question\": \"What role does the QS play in Risk Management?\",\n  \"answer\": [\n   \"Part of the whole Cost Management Process is to:- o 1) Assist in setting & managing contingency funds appropriately. o 2) Undertake risk analysis to ensure accuracy of funds available & manage their release when no longer required. o 3) Assist in the decision making process by providing estimates with a degree of certainty & carry out simulations to determine the level of risk. o 4) Provide advice when bidding for work on the level of risk & financial exposure to the company with understanding of market conditions & impact on the project & rates.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 696,\n  \"level\": 2\n },\n {\n  \"question\": \"What are Risk Analysis techniques?\",\n  \"answer\": [\n   \"Risk analysis sets out to achieve a better understanding of the risks identified & quantify their effects in terms of probability (likelihood of the risk occurring as a percentage) & impact (the effect if the risk occurs either in cost impact or programme delays).\",\n   \"Methods of risk analysis available include:- o 1) Subjective probability where a persons confidence within a specific risk is assessed by a number of professionals independently to avoid bias. o 2) Decision Analysis where risk exposure and attitudes are assessed in addition to consideration of alternative options and outcomes (Decision Trees). o 3) Sensitivity Analysis where the adjustment of a single input variable is made to determine acceptable parameters & identify those variables most sensitive to change. o 4) Monte Carlo Simulation where variables are changed simultaneously. This uses triangular distribution & repeating the analysis 1,000 times to ensure there is no bias & to generate an appropriate contingency fund for the project. o 5) Intuition & Experience where risks are identified and impact on time & cost are assessed through professional judgement.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 697,\n  \"level\": 1\n },\n {\n  \"question\": \"What forms of risk response are available?\",\n  \"answer\": [\n   \"Risk avoidance where the approach is changed in order to avoid the risk completely. For example plotting an alternative excavation route in order to avoid underground cabling.\",\n   \"Reduction where the probability or impact of the risk occurring is reduced. This could include staff training, employing security, placement of early material orders and scheduling an earlier start on site.\",\n   \"Retention where the risk is considered and retained by a particular party who is best placed to manage the risk. For example it may be best managed by the employer if it is an internal risk with a sufficient contingency being put in place.\",\n   \"Transfer is when the risk is considered and transferred from one party to another who is considered to be in a better position to manage the risk. This can be achieved through contracts & insurances. Clients should note the importance of paying risk premiums and comparing these against the potential financial impact of the risk.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 698,\n  \"level\": 2\n },\n {\n  \"question\": \"Can risk be calculated?\",\n  \"answer\": [\n   \"Risk can be calculated to an extent with suitable provision being made for the risk however it cannot be calculated exactly otherwise it would not be classified as a risk.\",\n   \"Risk involves the probability of something occurring & its potential impact in the event that it does occur.\",\n   \"Risk can be assessed via a number of methods, the method I have most experience with is through using risk registers and workshop using the team’s intuition and professional judgement to identify risk & assess their impact in terms of cost & programme.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 699,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Monte Carlo Simulation & what is it used for?\",\n  \"answer\": [\n   \"Most RM techniques only work based on only one given variable, such as Sensitivity Analysis, changing at a point in time.\",\n   \"Monte Carlo simulation is a form of probabilistic risk analysis meaning it assesses the probability of achieving certain targets.\",\n   \"It uses random sampling to assess variables that change simultaneously.\",\n   \"The simulation is based on information generated by the project team who will identify a triangular distribution for each risk (optimistic / likely / pessimistic).\",\n   \"Arithmetical mean is multiplied by the probability & fed into programmes such as '@ Risk', which generates a series of random numbers. The Programme is run 1,000 times to ensure no bias occurs.\",\n   \"This method works on a triangular distribution of minimum, maximum and mean probabilities and therefore requires some professional judgement to be used.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 700,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Expected Monetary Value (EMV)?\",\n  \"answer\": [\n   \"EMV is the probability of the risk occurring multiplied by its impact.\",\n   \"This produces an aggregate result and can be use
