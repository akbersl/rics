d to establish the overall monetary value of risks within the project.\",\n   \"The probability is usually expressed as a fraction or percentage while the impact is usually a positive or negative monetary value. RISK ITEM PROBABILITY IMPACT EMV Unforeseen ground conditions resulting in a piled foundation solution in lieu of pad foundations 20% £300,000.00 £60,000.00\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 701,\n  \"level\": 1\n },\n {\n  \"question\": \"What happens during a risk workshop?\",\n  \"answer\": [\n   \"A project team will be formed prior to the workshop and a facilitator being appointed.\",\n   \"The workshop facilitator will brief the team by issuing appropriate information about the scheme and the purpose and objectives of the workshop to allow preparation to occur prior to the workshop.\",\n   \"The key operations of the workshops I have attended include:- o 1) Identification of risk & generation of the risk register. o 2) Identification of risk probability. o 3) Identification of risk impact. o 4) Allocation of risk items to the owner. o 4) Agreement of upcoming actions which are usually design led. o 5) Agreement of review dates for each risk item for the following workshops.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 702,\n  \"level\": 2\n },\n {\n  \"question\": \"Are there any risks for client working on overseas projects?\",\n  \"answer\": [\n   \"Conditions of contract could be unfamiliar.\",\n   \"Legislation may be different from the UK.\",\n   \"Exchange rates may fluctuate causing price uncertainty.\",\n   \"Cultural ways of the workforce may be different resulting in different working hours.\",\n   \"Foreign contractors may not fully understand the terms of contract.\"\n  ],\n  \"category\": \"Risk Management\",\n  \"id\": 703,\n  \"level\": 2\n },\n {\n  \"question\": \"Are you aware of any documents the RICS has produced on the use of Artificial Intelligence?\",\n  \"answer\": [\n   \"The RICS have produced the Professional Standard, ‘Responsible use of artificial intelligence in surveying practice’.\",\n   \"This is currently in its 1st Edition and is effective from 9th March 2026.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 704,\n  \"level\": 2\n },\n {\n  \"question\": \"Can you please provide an overview of the document?\",\n  \"answer\": [\n   \"It sets the baseline professional standards for RICS members and regulated firms using AI systems in their work.\",\n   \"It provides the basis for:\",\n   \"– Upskilling the profession.\",\n   \"– Aims to minimise the risk of harm caused by AI systems in the delivery of services.\",\n   \"– Enables informed and clear decisions to be made on AI procurement and reliance on AI outputs.\",\n   \"– Sets the baseline for good communication and information sharing with clients and other relevant stakeholders concerning the adoption of AI.\",\n   \"– Provides a framework for the responsible development of AI systems by members and regulated firms.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 705,\n  \"level\": 2\n },\n {\n  \"question\": \"What baseline knowledge must RICS members have before using AI in surveying services?\",\n  \"answer\": [\n   \"Members must have a basic understanding of the:\",\n   \"– Types & subsets of AI, how they work, their limitations and failure modes.\",\n   \"– Risks of erroneous outputs (errors generated by the AI being adopted).\",\n   \"– Inherent risk of bias for example valuation models trained on data with a particular bias to a specific region or type of property may generate inaccurate valuation outputs (bias data inputs may skew results, this may be done unethically to generate a higher or lower valuation).\",\n   \"– Data usage and the risks relevant to AI systems - (if the AI model is trained using poor, it is likely to produce inaccurate outputs).\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 706,\n  \"level\": 2\n },\n {\n  \"question\": \"Why is professional skepticism important when using AI?\",\n  \"answer\": [\n   \"Because AI outputs carry inherent risks of error or bias.\",\n   \"Members must critically assess evidence and remain alert to misleading information.\",\n   \"They should always their own apply professional judgement, knowledge, skills and experience.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 707,\n  \"level\": 2\n },\n {\n  \"question\": \"What does “material impact” mean in the context of AI use?\",\n  \"answer\": [\n   \"An output has a material impact if the use of AI is capable of influencing the delivery of the service.\",\n   \"Typically, AI outputs that have a material impact on the delivery of a service will be outputs that affect how the work of the surveyor is rendered meaningful.\",\n   \"For example outputs summarising documents that are then relied on when writing a report, outputs composing all or the significant parts of an opinion or outputs recommending which part of a building to investigate for a fault can be considered to have a material impact on the delivery of the service.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 708,\n  \"level\": 2\n },\n {\n  \"question\": \"What must a written decision on AI output reliability include?\",\n  \"answer\": [\n   \"Assumptions made.\",\n   \"Key concerns and reasons.\",\n   \"How concerns might be reduced.\",\n   \"Impact on overall reliability.\",\n   \"Whether the output can reasonably be used for its intended purpose\",\n   \"Prepared under supervision of a qualified surveyor.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 709,\n  \"level\": 2\n },\n {\n  \"question\": \"When must clients be informed that an AI output cannot be relied upon?\",\n  \"answer\": [\n   \"If the member determines an output cannot be used for its purpose, they must inform the client in writing, with reasoning or a summary.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 710,\n  \"level\": 1\n },\n {\n  \"question\": \"What must be disclosed to clients before using AI?\",\n  \"answer\": [\n   \"Members must disclose in writing, in advance:\",\n   \"– When AI will be used.\",\n   \"– Parts of the process AI will be involved in.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 711,\n  \"level\": 2\n },\n {\n  \"question\": \"What AI-related information must be included in terms of engagement?\",\n  \"answer\": [\n   \"When and where AI is used.\",\n   \"Professional indemnity cover (if available).\",\n   \"How to contest use of AI.\",\n   \"Redress processes.\",\n   \"How to opt out of AI use, if possible.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 712,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the “Failure to Prevent Fraud” offence under the Economic Crime and Corporate Transparency Act?\",\n  \"answer\": [\n   \"On 1 September 2025, the new failure to prevent fraud offence introduced by the Economic Crime and Corporate Transparency Act 2023 (ECCTA) came into force.\",\n   \"The Failure to Prevent Fraud offence makes large organisations criminally liable if an associated person (employee, agent, subsidiary, or contractor acting on the organisation’s behalf) commits a fraud offence.\",\n   \"To be considered an offence, the failure to prevent fraud must have been carried out for the organisation’s benefit where the organisation did not have reasonable fraud-prevention procedures in place.\",\n   \"The intention is to encourage stronger internal controls, governance, and transparency.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 713,\n  \"level\": 1\n },\n {\n  \"question\": \"Which organisations does the offence apply to?\",\n  \"answer\": [\n   \"The offence applies only to large organisations, meaning they meet two out of three of the following criteria:\",\n   \"– More than 250 employees.\",\n   \"– Turnover above £36 million.\",\n   \"– Balance sheet total over £18 million. o (This mirrors the Companies Act “large company” test.)\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 714,\n  \"level\": 1\n },\n {\n  \"question\": \"Who can commit the fraud that triggers the offence?\",\n  \"answer\": [\n   \"Any associated person acting for or on behalf of the organisation. This includes:\",\n   \"– Employees.\",\n   \"– Agents.\",\n   \"– Subsidiaries.\",\n   \"– Contractors or consultants acting on the organisation’s behalf.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 715,\n  \"level\": 1\n },\n {\n  \"question\": \"What must an organisation do to avoid liability?\",\n  \"answer\": [\n   \"They must demonstrate that they had reasonable procedures in place to prevent fraud.\",\n   \"The Government outlines Six Principles:\",\n   \"– Proportionate Procedures.\",\n   \"– Top-Level Commitment.\",\n   \"– Risk Assessment.\",\n   \"– Due Diligence.\",\n   \"– Communication and Training.\",\n   \"– Monitoring and Review.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 716,\n  \"level\": 2\n },\n {\n  \"question\": \"Can organisations be prosecuted under this offence?\",\n  \"answer\": [\n   \"Yes if an associated person commits a fraud offence and the organisation cannot demonstrate reasonable preventive controls, the organisation can be prosecuted.\",\n   \"There is no need to prove senior management involvement, making it similar to the “Failure to Prevent Bribery” offence.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 717,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the key economic trends within the UK Construction industry in 2026?\",\n  \"answer\": [\n   \"The UK construction industry is currently facing headwinds in the form of regulatory changes with rising expectations around sustainability targets, labour skills shortages, high inflation (3.6%), higher interest rates (4%) and accelerating advancements in technology particularly in AI.\",\n   \"Modest growth with some sectors outperforming\",\n   \"– Total construction output in the UK is forecast to rise by 3.7% in 2026 following lower growth in 2025.\",\n   \"– The growth is not uniform across sectors with private housing, infrastructure (water & energy) and data centres set to lead.\",\n   \"Sustainability & Net Zero Driving Material Choice\",\n   \"– Increasing pressure from government regulation is creating demand for building materials and construction methods with high energy efficiency and low carbon emissions.\",\n   \"– Sustainable materials like engineered timber, recycled steel and alternative concretes are becoming more common.\",\n   \"Shift towards modern methods of construction\",\n   \"– Modern Methods of Construction (MMC), modular build and off-site techniques are being used more to speed up delivery, reduce onsite labour, better manage quality, and reduce waste.\",\n   \"– These methods also help with supply chain issues and reduce disruptions from weather or site constraints.\",\n   \"Digital Transformation: AI, BIM, and Beyond\",\n   \"– Building Information Modelling (BIM) continues to deepen its role. More clients (and regulators) expect Level 2+ BIM as standard, and digital twins are increasingly used for planning, monitoring, and maintenance forecasting.\",\n   \"– AI, machine learning, and analytics are being adopted for better decision making, cost estimation, safety risk prediction, optimising design and supply chains.\",\n   \"Labour & Skills Challenges\",\n   \"– The workforce shortage continues to be one of the industry’s biggest headwinds. There are tens of thousands of vacancies and a demographic gap as many experienced workers approach retirement.\",\n   \"– Apprenticeship uptake is not keeping pace with demand. Alongside recruitment, upskilling and reskilling (especially in digital skills, MMC, sustainability) are critical.\",\n   \"– Firms with good workforce strategies, flexible work, diversity, better safety and wellbeing are likely to win out.\",\n   \"Regulatory & Cost Pressures\",\n   \"– Regulatory compliance is getting more complex through energy performance, building safety, environmental impact and planning delays. Firms must build in extra headroom for time and cost.\",\n   \"– Building materials and labour costs are forecast to rise (some estimates see materials like timber, insulation, steel going up significantly through to 2030).\",\n   \"– Inflation, supply chain constraints, and higher borrowing / financing costs will all squeeze margins.\",\n   \"Rise of Infrastructure & Data Centres\",\n   \"– There is strong public and private sector investment in infrastructure (roads, bridges, utilities) and in digital infrastructure (data centres), driven by demands for connectivity, cloud services, AI, etc.\",\n   \"– These projects often have high barriers to entry but offer stable returns and long-term contracts. Good opportunities for firms that can meet regulatory, technical, and environmental demands.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 718,\n  \"level\": 1\n },\n {\n  \"question\": \"Are you aware of any updates to the RICS Leadership Team?\",\n  \"answer\": [\n   \"The key leaders at RICS include: ▪ Justin Young: Chief Executive Officer, focused on experience-led transformation. ▪ Adeola Ajayi: Director of the CEO's office, leading strategy. ▪ Corinna Alstromer: General Counsel, managing legal and governance. ▪ Governing Council: 60 new board members were appointed, with terms beginning in 2025 to improve global governance. Eight new members joined the Governing Council in January 2025.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 719,\n  \"level\": 2\n },\n {\n  \"question\": \"Are you aware of any guidance that applies to RICS Members when using Social Media?\",\n  \"answer\": [\n   \"The RICS introduced the Guidance Note ‘Use of Social Media: Guidance for Members Version 1.\",\n   \"This took affect from 30th June 2021.\",\n   \"The Guidance note sets out the same standards as stipulated in the RICS Rules of Conduct and reminds members that these do not change whether communicating via social media, face to face or traditional forms of media.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 720,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you ensure you operate inline with RICS guidance on the use of Social Media?\",\n  \"answer\": [\n   \"Information sharing\",\n   \"I am always sure to use social media in a responsible and professional manner in the same way that I communicate via face to face or other written forms of communication.\",\n   \"I am sure to use professional and respectful language when communicating and understand the responsibility in representing the RICS.\",\n   \"I would never make a post that is dishonest or would cause offence in any way.\",\n   \"I realise that this could potentially undermine public confidence and trust in the profession.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 721,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the RICS Inclusive Employer Quality Mark?\",\n  \"answer\": [\n   \"The RICS is launching a scheme known as the Inclusive Employer Quality Mark.\",\n   \"This is designed to improve diversity and inclusion within the property and construction sector.\",\n   \"The scheme requires employers to pledge their commitment to adopting and continually improving against the following six principles:\",\n   \"– Leadership and Vision.\",\n   \"– Recruitment.\",\n   \"– Staff development.\",\n   \"– Staff retention.\",\n   \"– Staff engagement.\",\n   \"– Continuous improvement.\",\n   \"Participating firms will be required to assess their performance against the criteria on a bi-annual basis.\",\n   \"RICS will use the assessment information to document the outcomes and trends for the profession as a whole.\",\n   \"Participating firms are able to use the branding of, ‘Signatory to the RICS Inclusive Employer Quality Mark’.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 722,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the importance of Hart vs Large caselaw?\",\n  \"answer\": [\n   \"This was a high court case relating to a dispute between the purchasers, Mr & Mrs Hart, and their surveyor, Mr Large.\",\n   \"Large had carried out a Level 2 Home Buyer Report on a property based in Devon.\",\n   \"Mr & Mrs Hart experienced problems with damp and water ingress resulting in a claim against Large.\",\n   \"The court ruled that Large was negligent as he:\",\n   \"– Failed to identify the issues relating to damp.\",\n   \"– Failed to advise the purchaser to obtain a Professional Consultants Certificate.\",\n   \"– Failed to recommend further investigations were undertaken regarding the condition of the property.\",\n   \"This case is important for surveyors as it highlights the need to:\",\n   \"– Report on any building elements that have not been inspected, including an explanation as to why this is the case.\",\n   \"– Recommend further investigations are carried out if the surveyor has a suspicion that a visible defect may affect other concealed building elements. -\\\"Where there is a trail of suspicion, a surveyor must take reasonable steps to follow that trail, which may include recommending further investigations.\",\n   \"– The need to strongly recommend that a Professional Consultants Certificate should be obtained prior to purchase on recently refurbished properties to protect the property purchaser from concealed defects.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 723,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the main benefits of Diversity & Inclusion?\",\n  \"answer\": [\n   \"Diverse and inclusive environments help to:\",\n   \"– Attract skilled professionals from diverse backgrounds.\",\n   \"– Establishes a sense of belonging among employees.\",\n   \"– Encourage employees to feel more connected.\",\n   \"– Increases productivity.\",\n   \"– Reduces staff turnover.\",\n   \"– Allows employees to feel valued and accepted.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 724,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the RICS doing to improve Diversity & Inclusion?\",\n  \"answer\": [\n   \"The RICS has setup ‘Diversity & Inclusion leadership’ which is a knowledge hub allowing the RICS to share ideas on how and why diversity & inclusion is so important to the RICS.\",\n   \"This has included initiatives such as:\",\n   \"– International Women’s Days celebrating the achievement of Women in our profession.\",\n   \"– Pride 2023: LGBTQ+ equality pledge focusing on the importance of LGBTQ+ representation in the profession.\",\n   \"– The McGregor-Smith Review – aiming to develop black and ethnic minority talent within the profession.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 725,\n  \"level\": 1\n },\n {\n  \"question\": \"Please explain your understanding of how the RICS define Professional Standards vs. Practice Information?\",\n  \"answer\": [\n   \"Following the Birchard Review and its recommendations the RICS have introduced two new definitions for Professional guidance which are now split into Professional Standards and Practice Information.\",\n   \"These supersede the former definitions including Professional Statements, Guidance Notes and Codes of Practice etc.\",\n   \"Professional Standards - set out requirements or expectations for RICS members and regulated firms with a focus on baseline expectations for competence and ethical behavior. They contain mandatory requirements that surveyors must follow, where the word ‘must’ is used with best practice that surveyors should follow, where the word ‘should’ is used.\",\n   \"Practice Information – set out supporting guidance to advise surveyors in delivering specific services or working in specific areas of practice. The guidance is not mandatory and does not provide explicit recommendations. Practice Information can refer to processes, toolkits, checklists, insights, research and technical information or advice.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 726,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the guidelines around use of the RICS Logo?\",\n  \"answer\": [\n   \"I am aware of RICS guidelines which are split into:\",\n   \"– Rules of Conduct for Firms use of the RICS logo and designation.\",\n   \"– Guidelines for Personal Use of the RICS logo.\",\n   \"These guidelines contain detailed information regarding correct usage which is approved by the Standards and Regulation Board.\",\n   \"As a qualified RICS member you have the right to use the logo for personal use for example on Business Cards & Personal E-mail signatures.\",\n   \"There are specific rules around how the RICS master logo is presented for example the font and colour must not be adjusted and there should be a minimum clearance around the logo equivalent to the size of the capital R in RICS.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 727,\n  \"level\": 2\n },\n {\n  \"question\": \"What is ACM cladding?\",\n  \"answer\": [\n   \"ACM standards for aluminum composite material\",\n   \"It consists of two skins of aluminum bonded to either side of a lightweight core of materials such as polyethylene or a mineral core aimed to provided insulating properties.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 728,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the significance of ACM in relation to Grenfell?\",\n  \"answer\": [\n   \"The ACM cladding in use was thought to contain combustible materials that contributed towards the spread of fire across the external elevation of the building.\",\n   \"As a result the UK government has now banned the use of combustible materials on high rise homes from 29th November 2018.\",\n   \"The ban means that combustible materials are not permitted on the external walls of new buildings above 18m.\",\n   \"Local authorities also need to undertake remediation works to replace dangerous ACM cladding on existing buildings.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 729,\n  \"level\": 1\n },\n {\n  \"question\": \"When are the Rules of Conduct Changing?\",\n  \"answer\": [\n   \"The existing Rules of Conduct have been in place since 2007 and these will remain valid until 1st February 2022.\",\n   \"The New Rules of Conduct will take effect from 2nd February 2022.\",\n   \"For APC Candidates sitting their final assessment before 2nd February 2022 it’s important that you are aware of the impending changes but you will be tested on the current set of documents which are:\",\n   \"– Rules of conduct for Members.\",\n   \"– Rules of Conduct for Firms.\",\n   \"– Global Professional and Ethical Standards.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 730,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the New Rules of Conduct?\",\n  \"answer\": [\n   \"Rule 1. Members and firms must be honest, act with integrity and comply with their professional obligations, including obligations to RICS.\",\n   \"Rule 2. Members and firms must maintain their professional competence and ensure that services are provided by competent individuals who have the necessary expertise.\",\n   \"Rule 3. Members and firms must provide good-quality and diligent service.\",\n   \"Rule 4. Members and firms must treat others with respect and encourage diversity and inclusion.\",\n   \"Rule 5. Members and firms must act in the public interest, take responsibility for their actions and act to prevent harm and maintain public confidence in the profession.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 731,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain your understanding of Rule Number 1?\",\n  \"answer\": [\n   \"Having reviewed the example behaviors in adhering to Rule 1 RICS Members and firms should not allow themselves to be influenced improperly through the acceptance of work referrals, gifts or hospitality.\",\n   \"Members and Firms must also be sure to identify conflicts of interest and not provide services or advice where these conflicts of interest occur.\",\n   \"This could be a scenario where you have reduced impartiality due to an existing relationship, for example being friends with a Main Contractor who has subsequently been selected to submit a tender would form a conflict of interest. Explain your understanding of Rule Number 2?\",\n   \"To ensure compliance with Rule 2, Members and firms must only act for clients where they have the necessary knowledge, skills and resources to carry out the work competently.\",\n   \"Firms must supervise any employees or subcontractors undertaking work on their behalf, for example requesting that a Junior Surveyor undertakes a complex valuation due to resourcing issues would create problems in achieving compliance with this Rule. Instead an experienced and suitably qualified surveyor should be asked to undertake the valuation.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 732,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain your understanding of Rule Number 3?\",\n  \"answer\": [\n   \"As an RICS member or regulated Firm we must also be sure to understand a clients’ project specific requirements before acting on their behalf. The clients’ scope of services should be agreed along with any exclusions and timescales for achieving each of the deliverables before signing up to formal terms of engagement.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 733,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain your understanding of Rule Number 4?\",\n  \"answer\": [\n   \"The RICS also expects its members to respect the rights of others and treat others with courtesy.\",\n   \"We need to ensure that everyone is treated fairly and look to eliminate any instances of discrimination on the basis of age, disability, gender, pregnancy, race, religion or sexual orientation.\",\n   \"RICS members and firms also need to adopt a no tolerance policy of bullying or harassment.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 734,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain your understanding of Rule Number 5?\",\n  \"answer\": [\n   \"Members and firms are required to question practices and decisions that they suspect are not right and raise concerns with colleagues, senior management, clients or the RICS.\",\n   \"When making public statements we need to ensure these do not undermine public confidence in the profession.\",\n   \"When receiving and processing complaints, we need to ensure these are dealt with promptly, openly and professionally.\",\n   \"In complying with Rule 5, a useful sense check to ensure compliance is to ask ourselves if we would be comfortable in standing behind our actions if these were brought into the media or a public forum.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 735,\n  \"level\": 1\n },\n {\n  \"question\": \"Why did the previous Rules of Conduct change?\",\n  \"answer\": [\n   \"The previous rules had been in place since 2007.\",\n   \"Following research and consultation with RICS Members, Firms and Members of the public, the majority voted in favour of replacing the existing Rules of Conduct and separate Global Professional and Ethical Standards.\",\n   \"This was to provide a single document to enable greater clarity for RICS members and firms.\",\n   \"There is now a greater focus on clearer example behaviors, understanding evolving technology and tackling climate change.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 736,\n  \"level\": 2\n },\n {\n  \"question\": \"Talk us through your understanding of the changes?\",\n  \"answer\": [\n   \"The Rules of Conduct October 2021 Global Practice Statement will overhaul the previous separate documents:\",\n   \"– Rules of conduct for Members.\",\n   \"– Rules of Conduct for Firms.\",\n   \"– Global Professional and Ethical Standards.\",\n   \"– Appendix A of the Rules of Conduct now contains the professional obligations of Members and Firms.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 737,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the professional obligations of members?\",\n  \"answer\": [\n   \"1. Members must comply with the CPD requirements set by the RICS which requires 20 hours of CPD for each calendar year, 10 hours of which must be formal CPD.\",\n   \"2. Members must cooperate with RICS.\",\n   \"3. Members must promptly provide all information reasonably requested by the Standards and Regulation Board, or those exercising delegated authority on its behalf.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 738,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the professional obligations of firms?\",\n  \"answer\": [\n   \"1. Firms must publish a complaints-handling procedure, which includes an alternative dispute resolution provider approved by RICS, and maintain a complaints log.\",\n   \"2. Firms must ensure that all previous and current professional work is covered by adequate and appropriate professional indemnity cover that meets the standards approved by RICS.\",\n   \"3. Firms with a sole principal must make appropriate arrangements for their professional work to continue in the event of their incapacity, death, absence from or inability to work.\",\n   \"4. Firms must cooperate with RICS.\",\n   \"5. Firms must promptly provide all information reasonably requested by the Standards and Regulation Board, or those exercising delegated authority on its behalf.\",\n   \"6. Firms must display on their business literature, in accordance with RICS’ published policy on designations, a designation to denote that they are regulated by RICS.\",\n   \"7. Firms must report to RICS any matter that they are required to report under the Rules for the Registration of Firms.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 739,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the Levitt Report?\",\n  \"answer\": [\n   \"The Levitt Report was commissioned by the RICS following a Treasury management audit in 2018.\",\n   \"Prior to the Audit the RICS had to extend its overdraft facility by circa £3m due to inaccurate cashflow forecasting.\",\n   \"The treasury management audit offered a ‘no assurance verdict’ on RICS internal financial control procedures and following this the Levitt report was commissioned as an independent review.\",\n   \"The conclusion of the Levitt report illuded to an internal power struggle due to its two board structure made up of a Management Board and Executive Board.\",\n   \"Following the report, the RICS accepted each of Levitt’s recommendations including:\",\n   \"– The RICS Governing Council are to have more oversight over internal dealings of the RICS.\",\n   \"– The RICS Governing Council are to be briefed by the Management Board as opposed to a single CEO.\",\n   \"– The RICS Governing Council are to oversee executive management bonuses.\",\n   \"– The report called for greater transparency as the CEO could have involved the management board in order to rectify the treasury issues.\",\n   \"– No evidence of improper or illegal conduct was discovered.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 740,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the new RICS Professional Indemnity Insurance Requirements for 2022?\",\n  \"answer\": [\n   \"The requirements for professional indemnity insurance were updated following issue of the UK Professional indemnity insurance requirements Version 9 with effect from 1st April 2022.\",\n   \"The new requirements introduced a change to the maximum uninsured excess of Professional indemnity insurance.\",\n   \"This means that for larger companies with a turnover in excess of £10m, this is no maximum limit of uninsured excess.\",\n   \"Whereas for companies with a turnover of less than £10m, the maximum uninsured excess is the greater of £10,000 or 2.5% of the insured sum.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 741,\n  \"level\": 1\n },\n {\n  \"question\": \"What were the previous requirements for Professional Indemnity Insurance maximum uninsured excess?\",\n  \"answer\": [\n   \"The previous requirements were based on the level of indemnity cover provided.\",\n   \"This meant that for indemnity cover of £500k or less the maximum excess was the greater of £10,000 or 2.5% of the insured sum.\",\n   \"For levels of indemnity cover over £500k, the maximum excess was 2.5% of the insured sum.\",\n   \"These requirements have now been overhauled.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 742,\n  \"level\": 2\n },\n {\n  \"question\": \"What is meant by the term Global Carbon Market?\",\n  \"answer\": [\n   \"This refers to an international system that allows the buying and selling of carbon emissions, allowances or credits.\",\n   \"It is designed to help reduce global greenhouse gas emissions by putting a price on carbon to incentivise countries, companies and business entities to innovate and invest in cleaner technologies and help to reduce the global carbon footprint.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 743,\n  \"level\": 1\n },\n {\n  \"question\": \"Please provide a high-level overview of the RICS Sustainability Report?\",\n  \"answer\": [\n   \"The RICS Sustainability Report 2024 provides a detailed analysis of the current state of sustainability within the built environment sector. The key findings include:-\",\n   \"– Identification of an increase in market demand for green buildings however the adoption of sustainable practices remains limited.\",\n   \"– High upfront costs and insufficient government incentives form significant barriers to widespread implementation of greener building methods.\",\n   \"– The report highlighted a need for consistent sustainability measurement across projects. Tools like the RICS Whole Life Carbon Assessment (WLCA) standard aim to address this issue by providing a unified framework for assessing and reducing carbon emissions throughout a building's lifecycle.\",\n   \"– The RICS emphasises that the level of commitment and action needs to increase substantially to achieve 2050 net-zero targets.\",\n   \"– RICS continues to play a pivotal role in shaping sustainability policies and standards globally. Its involvement in initiatives like the UN's Buildings Breakthrough highlights the importance of harmonising sustainability standards worldwide.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 744,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the acronym MEES?\",\n  \"answer\": [\n   \"MEES stands for Minimum Energy Efficiency Standards. These are regulations in the UK that set minimum energy performance requirements for buildings, specifically for privately rented properties.\",\n   \"Under MEES, properties in the private rental sector must meet at least an E rating on their Energy Performance Certificate (EPC) to be legally rented out.\",\n   \"If a building is rated lower than an E, landlords are required to improve the energy efficiency of the property before renting it out, unless specific exemptions apply.\",\n   \"The MEES regulations are part of the UK government's broader environmental and sustainability agenda, aiming to ensure that properties are energy-efficient and more environmentally friendly.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 745,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Urban greening factor?\",\n  \"answer\": [\n   \"The urban greening factor is a tool that evaluates and measures the amount of urban greening (vegetation cover and planting around buildings) to aid the appropriate planning of greening on future developments.\",\n   \"The aim is to increase the amount of green cover around buildings and support its consideration at the design and outset of developments.\",\n   \"Councils can develop their own targets with the plan for London being a target score of 0.4 for residential developments and 0.3 for commercial developments.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 746,\n  \"level\": 1\n },\n {\n  \"question\": \"Please explain your understanding of the term ‘Negative Carbon’?\",\n  \"answer\": [\n   \"The reduction of an entity's carbon footprint to less than neutral.\",\n   \"This results in a net effect of removing carbon dioxide from the atmosphere rather than adding it.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 747,\n  \"level\": 2\n },\n {\n  \"question\": \"Please explain your understanding of the term ‘Carbon Offsetting’?\",\n  \"answer\": [\n   \"Carbon offsetting results in a reduction of Green House Gas emissions or an increase in carbon storage.\",\n   \"This is usually achieved through land restoration or the planting of trees that can compensate for emissions that occur elsewhere.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 748,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the ICMS3?\",\n  \"answer\": [\n   \"The RICS is one of 49 globally prominent organisations to have contributed to the development of the ICMS.\",\n   \"ICSM stands for the International Cost Management Standard which provides a framework for cost and carbon management in construction from concept to completion.\",\n   \"The framework provides a format for defining, measuring, recording and presenting life cycle costs and carbon emissions associated with construction projects and aims to decarbonise them in the most cost- effective way.\"\n  ],\n  \"category\": \"Hot Topics\",\n  \"id\": 749,\n  \"level\": 1\n }\n];\n<\u002Fscript>\n  <script>// One background/context note per chapter, shown via the card's collapsible Explain toggle.\nwindow.CHAPTER_NOTES = {\n \"Ethics & Professionalism\": \"RICS ethics questions test whether you understand the difference between the Rules of Conduct (mandatory, enforceable) and the broader ethical principles behind them. Assessors want you to link rules back to why they exist — protecting the public and trust in the profession.\",\n \"Accounting Principles\": \"This chapter checks you understand how a business is run financially, not just how to measure a building. Interviewers often probe whether you can read a set of accounts and explain what a ratio means for a real company's health.\",\n \"Business Planning\": \"Expect questions on how firms set strategy, KPIs and resourcing. This is less about surveying technique and more about showing commercial awareness of how your employer operates as a business.\",\n \"Client Care\": \"Client care questions assess soft skills — communication, expectation management and complaint handling. Strong answers use a real example from your experience rather than a generic textbook definition.\",\n \"Communication & Negotiation\": \"These questions test both formal communication (reports, meetings) and negotiation technique (BATNA, positions vs interests). Assessors listen for structure and outcome, not just definitions.\",\n \"Conflict Avoidance & Dispute Resolution\": \"Know the full ladder of dispute resolution — negotiation, mediation, adjudication, arbitration, litigation — and where each sits in cost and speed. Real examples of avoiding disputes score higher than reciting the ladder.\",\n \"Data Management\": \"This covers GDPR, information security and how firms handle client/project data responsibly. Increasingly this chapter also touches BIM and digital records management.\",\n \"Health & Safety\": \"CDM 2015 duty holders are the backbone of this chapter. Be precise about which duties belong to which party (Client, Principal Designer, Principal Contractor) — assessors often ask you to distinguish them.\",\n \"Sustainability\": \"Sustainability questions span environmental, social and economic principles (the 'triple bottom line'). Current legislation and reporting frameworks (e.g. embodied carbon, BREEAM) are common follow-ups.\",\n \"Diversity, Inclusion & Teamworking\": \"Assessors want evidence you understand why D&I matters commercially and ethically, plus how effective teams are built and led — not just policy definitions.\",\n \"Design Economics & Cost Planning\": \"This is core QS territory: elemental cost planning, benchmarking and value management. Be ready to explain how a cost plan evolves in accuracy as a design develops (RIBA stages).\",\n \"Project Financial Control & Cost Reporting\": \"Covers monitoring cost against budget through a project's life — valuations, cash flow forecasting, cost-value reconciliation. Interviewers like candidates who can explain the 'why' behind a variance.\",\n \"Quantification & Costing of Works\": \"Measurement rules (NRM/SMM) sit behind this chapter. Know why standard methods of measurement exist — consistency and fairness in pricing — beyond just being able to recite rules.\",\n \"Construction Technology & Environmental Services\": \"A broad technical chapter on how buildings are actually built and serviced. Assessors probe whether you understand the reasoning behind a construction method, not just its name.\",\n \"Contract Practice\": \"Focuses on standard forms (JCT, NEC) and the legal principles behind contracts generally. Know the difference between contract types (traditional, D&B, management) and when each is used.\",\n \"Procurement & Tendering\": \"Covers how projects are brought to market and contractors selected. Be clear on the pros/cons of different procurement routes — this is one of the most commonly probed topics at interview.\",\n \"Contract Administration\": \"Tests your understanding of the contract administrator's role during a live project — instructions, valuations, certificates, extensions of time. Real project examples strengthen these answers significantly.\",\n \"Commercial Management of Construction\": \"A broader commercial lens on running construction projects profitably — cash flow, subcontractor management, commercial risk. Ties together cost planning, contract and financial control themes.\",\n \"Risk Management\": \"Know the standard risk process (identify, assess, mitigate, monitor) and be ready to apply it to a real project risk you've managed, not just describe the theory.\",\n \"Hot Topics\": \"Current-affairs chapter — expect questions on whatever is live in the industry at your sitting (AI guidance, anti-bribery/fraud legislation, economic conditions). Keep this section updated closer to your interview date.\"\n};\n<\u002Fscript>\n  <style>\n    @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }\n    body { margin: 0; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#F5F3EE; font-family:'Source Sans 3', system-ui, sans-serif; color:oklch(0.24 0.015 50); display:flex; flex-direction:column; align-items:center; padding:32px 20px 64px;\">\n\n  <div style=\"width:100%; max-width:760px; display:flex; flex-direction:column; gap:20px;\">\n\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'Sora',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.01em;\">RICS APC Q&amp;A<\u002Fdiv>\n        <div style=\"font-size:14px; color:oklch(0.45 0.015 50); margin-top:2px;\">Quantity Surveying &amp; Construction<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <div style=\"text-align:right;\">\n          <div style=\"font-size:13px; color:oklch(0.45 0.015 50);\">Reviewed<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:18px;\">{{ reviewedCount }}/{{ totalCount }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleBookmarkFilter }}\" style=\"{{ bookmarkFilterBtnStyle }}\">\n          <span style=\"font-size:15px;\">★<\u002Fspan> Bookmarked ({{ bookmarkedCount }})\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n\n    <div style=\"height:6px; background:oklch(0.9 0.01 50); border-radius:99px; overflow:hidden;\">\n      <div style=\"{{ progressBarStyle }}\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap;\">\n      <span style=\"font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:oklch(0.55 0.015 50);\">Topic<\u002Fspan>\n      <select value=\"{{ filterCategory }}\" onchange=\"{{ onCategorySelect }}\" style=\"{{ categorySelectStyle }}\">\n        <sc-for list=\"{{ categoryOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n          <option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption>\n        <\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap;\">\n      <span style=\"font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:oklch(0.55 0.015 50);\">APC Level<\u002Fspan>\n      <sc-for list=\"{{ levelPills }}\" as=\"lvl\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ lvl.onClick }}\" style=\"{{ lvl.style }}\">{{ lvl.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ noCards }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:60px 24px; text-align:center; background:#FFFFFF; border-radius:16px; color:oklch(0.5 0.015 50); font-size:15px;\">\n        No bookmarked cards yet in this category. Flip a card and tap the star to save it.\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasCard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n\n        <div onclick=\"{{ flipCard }}\" style=\"{{ cardStyle }}\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n            <div style=\"display:flex; align-items:center; gap:8px;\">\n              <span style=\"{{ categoryTagStyle }}\">{{ currentCard.category }}<\u002Fspan>\n              <span style=\"{{ levelBadgeStyle }}\">{{ levelBadgeLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <button onclick=\"{{ toggleBookmark }}\" style=\"{{ starButtonStyle }}\">{{ starGlyph }}<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isFlipped }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; gap:14px; animation: cardIn 0.25s ease;\">\n              <div style=\"font-size:13px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:oklch(0.5 0.09 255);\">Answer<\u002Fdiv>\n              <ul style=\"margin:0; padding-left:20px; display:flex; flex-direction:column; gap:8px; font-size:17px; line-height:1.5;\">\n                <sc-for list=\"{{ currentCard.answer }}\" as=\"line\" hint-placeholder-count=\"3\">\n                  <li>{{ line }}<\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n              <div>\n                <button onclick=\"{{ toggleExplain }}\" style=\"{{ explainButtonStyle }}\">{{ explainButtonLabel }}<\u002Fbutton>\n                <sc-if value=\"{{ explainOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"{{ explainPanelStyle }}\">{{ chapterNote }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div onclick=\"{{ stopClickPropagation }}\" style=\"display:flex; flex-direction:column; gap:6px;\">\n                <div style=\"font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:oklch(0.55 0.015 50);\">Your notes<\u002Fdiv>\n                <textarea value=\"{{ noteText }}\" onchange=\"{{ onNoteChange }}\" onclick=\"{{ stopClickPropagation }}\" placeholder=\"Jot a personal reminder for this question…\" style=\"{{ noteTextareaStyle }}\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isNotFlipped }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; flex-direction:column; gap:16px; align-items:center; text-align:center; padding:40px 8px 24px; animation: cardIn 0.25s ease;\">\n              <div style=\"font-family:'Sora',sans-serif; font-weight:600; font-size:22px; line-height:1.4; max-width:520px;\">{{ currentCard.question }}<\u002Fdiv>\n              <div style=\"font-size:13px; color:oklch(0.55 0.015 50);\">Tap card to reveal answer<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n          <button onclick=\"{{ prevCard }}\" style=\"{{ navButtonStyle }}\">← Prev<\u002Fbutton>\n          <div style=\"font-size:13px; color:oklch(0.5 0.015 50);\">{{ positionLabel }}<\u002Fdiv>\n          <button onclick=\"{{ nextCard }}\" style=\"{{ navButtonStyle }}\">Next →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    filterCategory: 'All',\n    filterLevel: 'All',\n    bookmarkFilterOn: false,\n    index: 0,\n    flipped: false,\n    explainOpen: false,\n    reviewed: this.loadSet('qa_reviewed'),\n    bookmarked: this.loadSet('qa_bookmarked'),\n    notes: this.loadNotes(),\n    showSignInNote: false,\n  };\n\n  loadNotes() {\n    try {\n      const raw = localStorage.getItem('qa_notes');\n      return raw ? JSON.parse(raw) : {};\n    } catch (e) { return {}; }\n  }\n\n  saveNotes(notes) {\n    try { localStorage.setItem('qa_notes', JSON.stringify(notes)); } catch (e) {}\n  }\n\n  onNoteChange(e) {\n    const cards = this.getFiltered();\n    const card = cards[this.state.index];\n    if (!card) return;\n    const notes = Object.assign({}, this.state.notes, { [card.id]: e.target.value });\n    this.saveNotes(notes);\n    this.setState({ notes });\n  }\n\n  stopClickPropagation(e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n  }\n\n  onSignInClick() {\n    this.setState(s => ({ showSignInNote: !s.showSignInNote }));\n  }\n\n  loadSet(key) {\n    try {\n      const raw = localStorage.getItem(key);\n      return new Set(raw ? JSON.parse(raw) : []);\n    } catch (e) { return new Set(); }\n  }\n\n  saveSet(key, set) {\n    try { localStorage.setItem(key, JSON.stringify([...set])); } catch (e) {}\n  }\n\n  getAllCards() {\n    return (window.QA_DATA || []);\n  }\n\n  getCategories() {\n    const cards = this.getAllCards();\n    const seen = [];\n    cards.forEach(c => { if (!seen.includes(c.category)) seen.push(c.category); });\n    return seen;\n  }\n\n  getFiltered() {\n    let cards = this.getAllCards();\n    if (this.state.filterCategory !== 'All') {\n      cards = cards.filter(c => c.category === this.state.filterCategory);\n    }\n    if (this.state.filterLevel !== 'All') {\n      cards = cards.filter(c => c.level === this.state.filterLevel);\n    }\n    if (this.state.bookmarkFilterOn) {\n      cards = cards.filter(c => this.state.bookmarked.has(c.id));\n    }\n    return cards;\n  }\n\n  setCategory(cat) {\n    this.setState({ filterCategory: cat, index: 0, flipped: false, explainOpen: false });\n  }\n\n  setLevel(lvl) {\n    this.setState({ filterLevel: lvl, index: 0, flipped: false, explainOpen: false });\n  }\n\n  toggleBookmarkFilter() {\n    this.setState(s => ({ bookmarkFilterOn: !s.bookmarkFilterOn, index: 0, flipped: false, explainOpen: false }));\n  }\n\n  toggleExplain(e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState(s => ({ explainOpen: !s.explainOpen }));\n  }\n\n  flipCard() {\n    this.setState(s => {\n      const nowFlipped = !s.flipped;\n      if (nowFlipped) {\n        const cards = this.getFiltered();\n        const card = cards[s.index];\n        if (card) {\n          const reviewed = new Set(s.reviewed);\n          reviewed.add(card.id);\n          this.saveSet('qa_reviewed', reviewed);\n          return { flipped: nowFlipped, reviewed, explainOpen: false };\n        }\n      }\n      return { flipped: nowFlipped, explainOpen: false };\n    });\n  }\n\n  toggleBookmark(e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    const cards = this.getFiltered();\n    const card = cards[this.state.index];\n    if (!card) return;\n    const bookmarked = new Set(this.state.bookmarked);\n    if (bookmarked.has(card.id)) bookmarked.delete(card.id);\n    else bookmarked.add(card.id);\n    this.saveSet('qa_bookmarked', bookmarked);\n    this.setState({ bookmarked });\n  }\n\n  nextCard() {\n    const cards = this.getFiltered();\n    if (!cards.length) return;\n    this.setState(s => ({ index: (s.index + 1) % cards.length, flipped: false, explainOpen: false }));\n  }\n\n  prevCard() {\n    const cards = this.getFiltered();\n    if (!cards.length) return;\n    this.setState(s => ({ index: (s.index - 1 + cards.length) % cards.length, flipped: false, explainOpen: false }));\n  }\n\n  renderVals() {\n    const allCards = this.getAllCards();\n    const categories = this.getCategories();\n    const filtered = this.getFiltered();\n    const totalCount = allCards.length;\n    const reviewedCount = this.state.reviewed.size;\n    const bookmarkedCount = this.state.bookmarked.size;\n\n    const index = Math.min(this.state.index, Math.max(0, filtered.length - 1));\n    const currentCard = filtered[index] || null;\n    const hasCard = !!currentCard;\n    const noCards = !hasCard;\n    const isFlipped = this.state.flipped;\n    const isNotFlipped = !this.state.flipped;\n\n    const accent = '#2A6FDB';\n\n    const pillBase = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '14px',\n      fontWeight: 500,\n      padding: '8px 14px',\n      borderRadius: '99px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: '#FFFFFF',\n      color: 'oklch(0.35 0.015 50)',\n      cursor: 'pointer',\n      whiteSpace: 'nowrap',\n    };\n    const pillActive = Object.assign({}, pillBase, {\n      background: accent,\n      borderColor: accent,\n      color: '#FFFFFF',\n    });\n\n    const categoryOptions = [{ value: 'All', label: 'All topics (' + totalCount + ')' }]\n      .concat(categories.map(cat => {\n        const count = allCards.filter(c => c.category === cat).length;\n        return { value: cat, label: cat + ' (' + count + ')' };\n      }));\n\n    const categorySelectStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '14px',\n      fontWeight: 500,\n      padding: '8px 12px',\n      borderRadius: '10px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: '#FFFFFF',\n      color: 'oklch(0.3 0.015 50)',\n      cursor: 'pointer',\n      maxWidth: '100%',\n    };\n\n    const onCategorySelect = (e) => this.setCategory(e.target.value);\n\n    const levelInfo = {\n      1: { name: 'Knowledge', color: '#1F8A5B' },\n      2: { name: 'Experience', color: '#2A6FDB' },\n      3: { name: 'Advice', color: '#B5623A' },\n    };\n    const levelPills = [{ label: 'All', onClick: () => this.setLevel('All'), style: this.state.filterLevel === 'All' ? pillActive : pillBase }]\n      .concat([1, 2, 3].map(lvl => {\n        const info = levelInfo[lvl];\n        const isActive = this.state.filterLevel === lvl;\n        const style = isActive ? Object.assign({}, pillBase, { background: info.color, borderColor: info.color, color: '#FFFFFF' }) : pillBase;\n        return { label: 'L' + lvl + ' · ' + info.name, onClick: () => this.setLevel(lvl), style };\n      }));\n\n    const levelBadgeStyle = currentCard ? {\n      fontSize: '11px',\n      fontWeight: 600,\n      padding: '3px 8px',\n      borderRadius: '99px',\n      background: (levelInfo[currentCard.level] || levelInfo[2]).color,\n      color: '#FFFFFF',\n      whiteSpace: 'nowrap',\n    } : {};\n    const levelBadgeLabel = currentCard ? 'L' + currentCard.level + ' · ' + (levelInfo[currentCard.level] || levelInfo[2]).name : '';\n\n    const progressPct = totalCount ? Math.round((reviewedCount / totalCount) * 100) : 0;\n    const progressBarStyle = {\n      height: '100%',\n      width: progressPct + '%',\n      background: accent,\n      borderRadius: '99px',\n      transition: 'width 0.3s ease',\n    };\n\n    const bookmarkFilterBtnStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '13px',\n      fontWeight: 500,\n      padding: '8px 12px',\n      borderRadius: '10px',\n      border: '1px solid ' + (this.state.bookmarkFilterOn ? accent : 'oklch(0.85 0.01 50)'),\n      background: this.state.bookmarkFilterOn ? 'oklch(0.94 0.03 255)' : '#FFFFFF',\n      color: this.state.bookmarkFilterOn ? accent : 'oklch(0.4 0.015 50)',\n      cursor: 'pointer',\n      display: 'flex',\n      alignItems: 'center',\n      gap: '6px',\n      whiteSpace: 'nowrap',\n    };\n\n    const cardStyle = {\n      background: '#FFFFFF',\n      borderRadius: '20px',\n      padding: '28px',\n      minHeight: '260px',\n      display: 'flex',\n      flexDirection: 'column',\n      justifyContent: hasCard ? (isFlipped ? 'flex-start' : 'space-between') : 'center',\n      boxShadow: '0 1px 2px oklch(0 0 0 / 0.04), 0 12px 32px oklch(0 0 0 / 0.06)',\n      cursor: 'pointer',\n      border: '1px solid oklch(0.92 0.008 50)',\n    };\n\n    const categoryTagStyle = {\n      fontSize: '12px',\n      fontWeight: 600,\n      letterSpacing: '0.04em',\n      textTransform: 'uppercase',\n      color: 'oklch(0.5 0.015 50)',\n    };\n\n    const starButtonStyle = {\n      fontSize: '20px',\n      background: 'none',\n      border: 'none',\n      cursor: 'pointer',\n      color: currentCard && this.state.bookmarked.has(currentCard.id) ? '#D9A02A' : 'oklch(0.8 0.01 50)',\n      lineHeight: 1,\n      padding: '4px',\n    };\n\n    const navButtonStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '14px',\n      fontWeight: 500,\n      padding: '10px 18px',\n      borderRadius: '10px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: '#FFFFFF',\n      color: 'oklch(0.35 0.015 50)',\n      cursor: 'pointer',\n      whiteSpace: 'nowrap',\n    };\n\n    const starGlyph = currentCard && this.state.bookmarked.has(currentCard.id) ? '★' : '☆';\n    const positionLabel = hasCard ? (index + 1) + ' / ' + filtered.length : '';\n\n    const notesMap = (window.CHAPTER_NOTES || {});\n    const chapterNote = currentCard ? (notesMap[currentCard.category] || 'No background note available for this chapter yet.') : '';\n    const explainOpen = this.state.explainOpen;\n    const explainButtonStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '13px',\n      fontWeight: 500,\n      padding: '6px 10px',\n      borderRadius: '8px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: explainOpen ? 'oklch(0.94 0.03 255)' : 'oklch(0.97 0.005 50)',\n      color: explainOpen ? accent : 'oklch(0.45 0.015 50)',\n      cursor: 'pointer',\n      whiteSpace: 'nowrap',\n    };\n    const explainButtonLabel = (explainOpen ? '▾' : '▸') + ' Explain';\n    const explainPanelStyle = {\n      marginTop: '10px',\n      padding: '14px 16px',\n      background: 'oklch(0.97 0.01 255)',\n      border: '1px solid oklch(0.9 0.02 255)',\n      borderRadius: '10px',\n      fontSize: '14px',\n      lineHeight: 1.55,\n      color: 'oklch(0.35 0.02 255)',\n    };\n\n    const noteText = currentCard ? (this.state.notes[currentCard.id] || '') : '';\n    const noteTextareaStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '14px',\n      lineHeight: 1.5,\n      padding: '10px 12px',\n      borderRadius: '10px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: 'oklch(0.985 0.005 50)',\n      color: 'oklch(0.3 0.015 50)',\n      minHeight: '64px',\n      resize: 'vertical',\n    };\n\n    const signInButtonStyle = {\n      fontFamily: \"'Source Sans 3', system-ui, sans-serif\",\n      fontSize: '13px',\n      fontWeight: 500,\n      padding: '8px 12px',\n      borderRadius: '10px',\n      border: '1px solid oklch(0.85 0.01 50)',\n      background: '#FFFFFF',\n      color: 'oklch(0.35 0.015 50)',\n      cursor: 'pointer',\n      display: 'flex',\n      alignItems: 'center',\n      gap: '6px',\n      whiteSpace: 'nowrap',\n    };\n    const signInLabel = 'Sign in with Google';\n\n    return {\n      chapterNote, explainOpen, explainButtonStyle, explainButtonLabel, explainPanelStyle,\n      toggleExplain: (e) => this.toggleExplain(e),\n      noteText, noteTextareaStyle,\n      onNoteChange: (e) => this.onNoteChange(e),\n      stopClickPropagation: (e) => this.stopClickPropagation(e),\n      signInButtonStyle, signInLabel,\n      onSignInClick: () => this.onSignInClick(),\n      showSignInNote: this.state.showSignInNote,\n      totalCount, reviewedCount, bookmarkedCount,\n      toggleBookmarkFilter: () => this.toggleBookmarkFilter(),\n      bookmarkFilterBtnStyle,\n      progressBarStyle,\n      categoryOptions, categorySelectStyle, onCategorySelect, filterCategory: this.state.filterCategory,\n      levelPills, levelBadgeStyle, levelBadgeLabel,\n      noCards, hasCard,\n      currentCard: currentCard || { category: '', question: '', answer: [] },\n      cardStyle, categoryTagStyle, starButtonStyle, starGlyph,\n      flipCard: () => this.flipCard(),\n      toggleBookmark: (e) => this.toggleBookmark(e),\n      isFlipped, isNotFlipped,\n      prevCard: () => this.prevCard(),\n      nextCard: () => this.nextCard(),\n      navButtonStyle,\n      positionLabel,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
