o be heated close to the roof.\",\n   \"– Heating anything to 200 degrees C is dangerous especially in a working environment.\",\n   \"– Asphalt roofs are hard wearing and are design to allow for transit over them.\",\n   \"– Some companies offer a 60-year guarantee due to their durability.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 403,\n  \"level\": 1\n },\n {\n  \"question\": \"What items would you expect to find on a timber or part glazed door that was required to have a half-hour fire rating?\",\n  \"answer\": [\n   \"3 hinges.\",\n   \"Intumescent strip on door or edge of frame.\",\n   \"A self-closing devise.\",\n   \"If a glazing panel is present it must be 6mm thick, wired glass to a max of 1.2m2 with 13mm x 13mm wood beads encased with non-combustible materials.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 404,\n  \"level\": 2\n },\n {\n  \"question\": \"What is an MF ceiling?\",\n  \"answer\": [\n   \"The abbreviation MF commonly refers to a Mineral Fibre plasterboard suspended ceiling.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 405,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a metal grid ceiling and what are the benefits?\",\n  \"answer\": [\n   \"This is a suspended ceiling system formed by a square grid.\",\n   \"These are normally quicker to construct than alternative options and allow for service runs through the void above therefore allowing greater floor to ceiling height. They also offer easy access for service repairs.\",\n   \"Damaged tiles can also be replaced rather than needing to repair the entire ceiling or replastering.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 406,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between rolled and tiled carpet tiles and why do we use each type?\",\n  \"answer\": [\n   \"Rolled carpets generally offer better quality and are more expensive. Rolled carpet is commonly used in dwellings.\",\n   \"Carpet tiles are harder wearing and are often cheaper. Individual tiles can be replaced therefore they are easier to maintain. Carpet tiles are commonly used in offices and hospitals. They are also used where raised access flooring systems adopted to allow for easier access to services that run in the void below.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 407,\n  \"level\": 1\n },\n {\n  \"question\": \"What is top down construction?\",\n  \"answer\": [\n   \"“Top down” is used to speed up the construction process of a building with basement levels.\",\n   \"The ground floor slab is cast with an access hatch.\",\n   \"The ground below is excavated and another slab is formed. If there is another level, the process is repeated. Piles are usually used as foundations and also act as retaining walls. It allows the building above to be constructed at the same time as the basement.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 408,\n  \"level\": 1\n },\n {\n  \"question\": \"What is bottom up construction?\",\n  \"answer\": [\n   \"“Bottom up” forms the basement and then works upwards in a traditional manner. This offers a simpler construction than top down methods of construction but will often carry a longer programme duration.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 409,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a three phase electrical supply?\",\n  \"answer\": [\n   \"A three phase supply is an AC (Alternating Current) supply that consists of three AC voltages 120 degrees out of phase with each other.\",\n   \"Three phase electricity is cheaper and an easier way to transmit electricity compared to single phase electricity.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 410,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain how power is distributed to floor boxes in a raised floor?\",\n  \"answer\": [\n   \"The incoming power supply connects to a low voltage switchboard, which in turn connects to a distribution board.\",\n   \"The distribution board will have an under floor busbar connected to it. The busbar has a number of sockets to which the floor box plugs into via a flexible lead. The floor box has sockets to which the appliances can plug into.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 411,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Cat II lighting?\",\n  \"answer\": [\n   \"Cat II Lighting are light fittings suitable for use with VDU screens. The light fittings should be designed in such a way so as to limit the amount of glare from computer screens and such like.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 412,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a syphonic drainage system?\",\n  \"answer\": [\n   \"A syphonic drainage system is an alternative to the gravity drainage system. In syphonic drainage, water is sucked from the guttering in to the drain pipe so there is no need to have pipes set at a gradient and to rely on gravity to pull the water to the drain (a vacuum is created to achieve this).\",\n   \"Syphonic drainage has the advantage that narrower down pipes can be used.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 413,\n  \"level\": 1\n },\n {\n  \"question\": \"Describe the different types of lift available?\",\n  \"answer\": [\n   \"Passenger Lifts\",\n   \"– Passenger lifts can be specialised for the service they perform for example in hospitals with front and rear entrances.\",\n   \"Residential lifts\",\n   \"– Residential lifts may be small enough for one person while some are large enough for more than a dozen.\",\n   \"Platform Lifts\",\n   \"– Wheelchair or platform lifts are specialist lifts designed to move a wheelchair 2m or less they can often accommodate just one person in a wheelchair at a time with a maximum load of 340kg.\",\n   \"Freight Lifts\",\n   \"– Freight lifts are similar to passenger lifts but designed to carry goods. Passengers often travel with the freight so most building regulations still apply.\",\n   \"– Freight elevators are typically larger and capable of carrying heavier loads than a passenger elevator, generally from 2,300 to 4,500 kg. Freight Elevators may have manually operated doors, and often have rugged interior finishes to prevent damage while loading and unloading.\",\n   \"– Although hydraulic freight elevators exist, electric elevators are more energy efficient for the work of freight lifting.\",\n   \"Dumbwaiter\",\n   \"– A small freight elevator is often called a dumbwaiter, often used for the moving of small items such as dishes in a 2-story kitchen or books in a multi-story rack assembly.\",\n   \"– Dumbwaiters are generally driven by a small electric motor with a counterweight and their capacity is limited to about 750 lb (340 kg). They may also be hand operated using a roped pulley.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 414,\n  \"level\": 2\n },\n {\n  \"question\": \"What fire safety provisions would you expect to find in an office block?\",\n  \"answer\": [\n   \"Maximum occupancy listings.\",\n   \"Fire exits with signage above that can function in a power failure.\",\n   \"Placing fire extinguishers and fire alarms in easily accessible places.\",\n   \"Restricted use of flammable materials.\",\n   \"Installing fire alarm control panels for quick detection and warning of fire.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 415,\n  \"level\": 2\n },\n {\n  \"question\": \"What are automatic fire sprinklers?\",\n  \"answer\": [\n   \"Automatic fire sprinklers are individually heat-activated and tied into a network of piping with water under pressure.\",\n   \"When the heat of a fire raises the sprinkler temperature to its operating point (usually 165ºF), a solder link will melt or a liquid-filled glass bulb will shatter to open that single sprinkler, releasing water directly over the source of the heat.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 416,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main types of air-conditioning system available?\",\n  \"answer\": [\n   \"Refrigeration Cycle\",\n   \"– In the refrigeration cycle, a heat pump transfers heat from a lower temperature heat source into a higher temperature heat sink. Heat would naturally flow in the opposite direction. This is the most common type of air conditioning. A refrigerator works in much the same way, as it pumps the heat out of the interior into the room in which it stands.\",\n   \"Evaporative Coolers\",\n   \"– The evaporative cooler is a device that draws outside air through a wet pad. The sensible heat of the incoming air, as measured by a dry bulb thermometer, is reduced. The total heat (sensible heat plus latent heat) of the entering air is unchanged. Some of the sensible heat of the entering air is converted to latent heat by the evaporation of water in the wet cooler pads. If the entering air is dry enough, the results can be quite comfortable. These coolers cost less and are mechanically simple to understand and maintain.\",\n   \"Absorptive Chillers\",\n   \"– Some buildings use gas turbines to generate electricity. The exhausts of these are hot enough to drive an absorptive chiller that produces cold water. The cold water is then run through radiators in air ducts for hydronic cooling.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 417,\n  \"level\": 1\n },\n {\n  \"question\": \"Describe a VAV (Variable Air Volume) AC System?\",\n  \"answer\": [\n   \"VAV systems vary the airflow at a constant temperature.\",\n   \"These systems utilise a supply duct that distributes cooled air.\",\n   \"The temperature is kept constant and the air flow varies to meets the rising and falling heat gains within the thermal zone that is being cooled.\",\n   \"The system is made up of supply and return ductwork, a VAV box also referred to as a VAV terminal unit and air terminals.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 418,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a VRF (Variable Refrigerant Flow) AC System?\",\n  \"answer\": [\n   \"VRF systems can be made up of a heat pump system or heat recovery system which can provide simultaneous heating and cooling.\",\n   \"The heat pump is connected to multiple indoor units which can heat and cool independently of each other.\",\n   \"The energy recovered from one zone can be utilised to heat a separate zone meaning VRF systems are more efficient in comparison to other systems.\",\n   \"The system is made up of units a heat pump, a compressor and pipework that takes up much less space than traditional ductwork.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 419,\n  \"level\": 2\n },\n {\n  \"question\": \"How are fire barriers formed in suspended ceilings and what happens when services pass through the barriers?\",\n  \"answer\": [\n   \"If a suspended ceiling is not fire resistant, fire barriers will be required within the ceiling void if the walls stop at the underside of the ceiling.\",\n   \"The barriers will be installed between the soffit of the floor above and the suspended ceiling resulting in the ceiling void being compartmented.\",\n   \"It is also important to consider whether smoke stops are also required.\",\n   \"When services run through the barriers it is important that they are sealed to prevent fire spreading through the service gap.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 420,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a UPS and why does a building require one?\",\n  \"answer\": [\n   \"An uninterruptible power supply, or UPS, is a device or system that maintains a continuous supply of electric power to certain essential equipment that must not be shut down unexpectedly.\",\n   \"Typically, it is installed in hospitals for life critical equipment and in businesses for business-critical equipment.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 421,\n  \"level\": 1\n },\n {\n  \"question\": \"Why do we install generators in buildings?\",\n  \"answer\": [\n   \"Generators are normally installed in buildings to act as a backup power supply should the primary power supply fail.\",\n   \"Generators in buildings for this reason are becoming less common as technical advances are made in UPS.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 422,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Busbar trunking?\",\n  \"answer\": [\n   \"Bare copper or aluminum conductors fixed inside trunking that distribute heavy-duty electrical power to tap-off units.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 423,\n  \"level\": 1\n },\n {\n  \"question\": \"What do the abbreviations FCU, AHU & VAV stand for?\",\n  \"answer\": [\n   \"Fan Coil Unit (FCU).\",\n   \"Air Handling Unit (AHU).\",\n   \"Variable Air Volume System (VAV).\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 424,\n  \"level\": 2\n },\n {\n  \"question\": \"What types of bridge construction are there?\",\n  \"answer\": [\n   \"Beam Bridge with simple beam or cantilever.\",\n   \"Arch Bridge.\",\n   \"Suspension Bridge or Cable Stayed Bridge.\",\n   \"Moveable Bridge - Swing bridge, Draw bridge or Lift bridge.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 425,\n  \"level\": 2\n },\n {\n  \"question\": \"How does a cable stayed bridge work?\",\n  \"answer\": [\n   \"The load exerted from the bridge deck and all live loads are transferred through the wires to towers and into ground anchorages.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 426,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the difference between a tower and a pier?\",\n  \"answer\": [\n   \"The towers protrude through the deck vertically to provide a connection point for the cable stays which transfer the load.\",\n   \"Piers support the bridge deck.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 427,\n  \"level\": 1\n },\n {\n  \"question\": \"What type of building work is covered by the Building regulations?\",\n  \"answer\": [\n   \"The Erection or extension of a building.\",\n   \"Installation or extension of a service that is controlled by the regulations.\",\n   \"Alteration projects which will temporarily or permanently affect the building in terms of structure, fire & access.\",\n   \"Insertion of insulation into cavity walls.\",\n   \"Underpinning building foundations.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 428,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the specific areas covered by the Building Regulations?\",\n  \"answer\": [\n   \"A) Structure.\",\n   \"B) Fire Safety.\",\n   \"C) Site preparation and resistance to moisture.\",\n   \"D) Toxic substances.\",\n   \"E) Resistance to the passage of sound.\",\n   \"F) Ventilation.\",\n   \"G) Hygiene.\",\n   \"H) Drainage.\",\n   \"J) Heat producing appliances.\",\n   \"K) Protection from falling, collision and impact.\",\n   \"L) Conservation of fuel and power.\",\n   \"M) Access and facilities for disabled people.\",\n   \"N) Glazing – safety in relation to impact, opening and cleaning.\",\n   \"P) Electrical safety.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 429,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the Building Regulations Approved Documents?\",\n  \"answer\": [\n   \"They provide general guidance on performance of materials expected in order to comply with the functional requirements of the building regulations & provide practical examples.\",\n   \"They only provide guidance & therefore there is no obligation to adopt specific solutions if it is possible to meet requirements via a different means.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 430,\n  \"level\": 1\n },\n {\n  \"question\": \"Who ensures the building regulations are complied with?\",\n  \"answer\": [\n   \"Building Control Services such as the Local Authority or Approved Inspectors (Private companies set up to specifically regulate building control).\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 431,\n  \"level\": 1\n },\n {\n  \"question\": \"What would be a typical programme for a new build structure?\",\n  \"answer\": [\n   \"Site clearance.\",\n   \"Enabling works.\",\n   \"Site setup.\",\n   \"Haul & access roads.\",\n   \"Setting out.\",\n   \"Excavate to reduced levels.\",\n   \"Excavate foundations.\",\n   \"Cast foundations.\",\n   \"Frame erection.\",\n   \"Cladding.\",\n   \"Roof.\",\n   \"Floors.\",\n   \"Services.\",\n   \"FF&E.\",\n   \"Testing.\",\n   \"Commissioning.\",\n   \"Landscaping.\",\n   \"Snagging.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 432,\n  \"level\": 2\n },\n {\n  \"question\": \"What if the client tells you the LADs are to be £100,000 per week?\",\n  \"answer\": [\n   \"I would check that the LAD figure is based on a genuine pre-estimate of financial loss and explain that in the event LAD’s are to be applied, they would need to substantiate this figure.\",\n   \"I would also explain that if the figure inserted into the contract is shown to be punitive and not based on genuine financial loss it is not likely to be enforceable.\",\n   \"In this scenario the employer will have to pursue the Main Contractor for any actual direct loss that can be substantiated through a formal dispute resolution procedure.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 433,\n  \"level\": 2\n },\n {\n  \"question\": \"What are extensions of time?\",\n  \"answer\": [\n   \"Extensions of time adjust the completion date and relieves the contractor’s liability to pay liquidated damages for the period of the extension.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 434,\n  \"level\": 1\n },\n {\n  \"question\": \"What are liquidated damages?\",\n  \"answer\": [\n   \"A genuine pre-estimate of the likely loss incurred by the employer should the completion date not be met.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 435,\n  \"level\": 1\n },\n {\n  \"question\": \"What must be in place before LDs can be deducted?\",\n  \"answer\": [\n   \"A non-completion certificate.\",\n   \"A withholding notice.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 436,\n  \"level\": 2\n },\n {\n  \"question\": \"What if the employer actually suffered no loss or damage?\",\n  \"answer\": [\n   \"It doesn’t matter.\",\n   \"The damages can still be deducted at the value stated in the contract.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 437,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the benefits of being able to grant an extension of time?\",\n  \"answer\": [\n   \"It relieves the contractor’s liability for liquidated damages for a delay that they did not cause.\",\n   \"It enables another completion date to be set, which maintains the employer’s ability to deduct liquidated damages if another delay occurs.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 438,\n  \"level\": 1\n },\n {\n  \"question\": \"What happens when ‘time is at large’?\",\n  \"answer\": [\n   \"There is no set completion date.\",\n   \"The contractor only has the obligation to complete the works in a ‘reasonable time’.\",\n   \"Liquidated damages cannot be claimed as there is no date to take them from.\",\n   \"The employer would have to try and prove that the contractor had not completed in a reasonable time.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 439,\n  \"level\": 2\n },\n {\n  \"question\": \"What are Relevant Events in a JCT form of Contract?\",\n  \"answer\": [\n   \"They are events that entitle the contractor to an extension of time.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 440,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the relevant events?\",\n  \"answer\": [\n   \"There are 13 relevant events set out in JCT forms including:\",\n   \"– Variations.\",\n   \"– Instructions.\",\n   \"– Execution of an approx. quantity that is not a reasonably accurate forecast.\",\n   \"– Deferment of possession of the site.\",\n   \"– Suspension by the contractor for non-payment.\",\n   \"– The carrying out of work by statutory authorities.\",\n   \"– Impediment, prevention or default by the employer.\",\n   \"– Loss or damages occasioned by the Specified Perils.\",\n   \"– Exceptionally adverse weather conditions.\",\n   \"– Strike or lock out.\",\n   \"– Civil commotion or terrorism.\",\n   \"– The exercise of any statutory power after the base date by the UK gov.\",\n   \"– Force majeure.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 441,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main elements you would include within an interim valuation?\",\n  \"answer\": [\n   \"Preliminaries.\",\n   \"Measured work.\",\n   \"Variations.\",\n   \"Materials on site.\",\n   \"Materials off site.\",\n   \"Loss and expense.\",\n   \"Retention.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 442,\n  \"level\": 1\n },\n {\n  \"question\": \"What needs to be in place for you to include payments for materials on site?\",\n  \"answer\": [\n   \"The materials should be for the works.\",\n   \"They should be adequately protected.\",\n   \"Delivered to programme.\",\n   \"In a reasonable quantity.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 443,\n  \"level\": 2\n },\n {\n  \"question\": \"What needs to be in place for you to include payments for materials off site?\",\n  \"answer\": [\n   \"Proof that ownership will transfer to the employer upon payment (vesting certificate).\",\n   \"Insurance until materials arrive at site.\",\n   \"Materials are clearly labelled as for the site and set apart from other materials.\",\n   \"A materials off site bond has been provided if required.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 444,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a retention of title clause?\",\n  \"answer\": [\n   \"Where the sub-contractor or supplier retains ownership of materials until they are paid for them by the contractor.\",\n   \"This highlights the importance of vesting certificates as the employer may subsequently pay for materials that are not owned by the contractor.\",\n   \"This legal principle can lead to disputes in the event of insolvency.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 445,\n  \"level\": 1\n },\n {\n  \"question\": \"How do you evaluate interim valuations?\",\n  \"answer\": [\n   \"Go to site and inspect the works to form a view on the percentage of works undertaken.\",\n   \"Check for materials on site and materials off site.\",\n   \"Value time related and fixed preliminaries items undertaken.\",\n   \"Value any agreed variations and claims.\",\n   \"The valuation amount is presented as the gross valuation, less previous payment made and retention.\",\n   \"Finally I would send my recommendation to the Architect or Contract Administrator for them to prepare the payment certificate.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 446,\n  \"level\": 2\n },\n {\n  \"question\": \"How do stage payments work?\",\n  \"answer\": [\n   \"The stages and their values are set out in the contract particulars.\",\n   \"The stages are usually related to the completion of significant design items for example completion of the substructure or achieving a water tight structure.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 447,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the interim certificate conclusive of?\",\n  \"answer\": [\n   \"Interim certificates are not conclusive.\",\n   \"They carry no contractual significance to state that the quality of materials or workmanship is satisfactory.\",\n   \"It is only the final certificate that is conclusive.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 448,\n  \"level\": 1\n },\n {\n  \"question\": \"What is retention?\",\n  \"answer\": [\n   \"It is a percentage of each interim certificate deducted and retained by the employer from each interim payment to the contractor.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 449,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of retention?\",\n  \"answer\": [\n   \"It provides an incentive for the contractor to rectify any defects within the contract defects liability period.\",\n   \"It provides some financial security to the employer in the event of a contractor default.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 450,\n  \"level\": 1\n },\n {\n  \"question\": \"When is the retention released to the contractor?\",\n  \"answer\": [\n   \"Half of the retention is released in the interim certificate after Practical Completion.\",\n   \"The remaining retention is released in the final certificate after the certificate of making good defects is issued.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 451,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a typical retention percentage under JCT contracts?\",\n  \"answer\": [\n   \"Usually retention is between 3% or 5% depending on the form in use.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 452,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a retention bond?\",\n  \"answer\": [\n   \"This is a bond provided by the contractor in lieu of taking retention from interim payments.\",\n   \"It should be equal to the same value as the retention deducted.\",\n   \"The requirement for the bond should be stated in the contract particulars.\",\n   \"A standard form is provided in the JCT contract schedules.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 453,\n  \"level\": 1\n },\n {\n  \"question\": \"What happens if the contractor does not maintain the retention bond?\",\n  \"answer\": [\n   \"The employer can deduct retention from interim payments.\",\n   \"If the bond is subsequently taken out, the retention deducted must be repaid to the contractor.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 454,\n  \"level\": 3\n },\n {\n  \"question\": \"Why might a retention bond be used?\",\n  \"answer\": [\n   \"It may be used in difficult market conditions to aid the contractor’s cashflow.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 455,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the disadvantages of a retention bond?\",\n  \"answer\": [\n   \"The employer would have to pay the premium for taking out the bond.\",\n   \"It may reduce the contractor’s incentive to complete making good defects promptly.\",\n   \"It reduces the employer’s cashflow.\",\n   \"The employer would not get the interest accruing on the amount of the retention bond.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 456,\n  \"level\": 1\n },\n {\n  \"question\": \"What is acceleration?\",\n  \"answer\": [\n   \"Acceleration is the completion of works in a shorter time frame than that anticipated at tender or the act of programme recovery by the contractor if they are in delay.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 457,\n  \"level\": 1\n },\n {\n  \"question\": \"What options may be considered to achieve acceleration?\",\n  \"answer\": [\n   \"Re-sequencing the works or making sequential activities parallel.\",\n   \"Increasing the working time by using working longer hours.\",\n   \"Increasing the resources employed by using larger gangs.\",\n   \"Changing the working methods for example using a dehumidifier to dry out the works faster.\",\n   \"Increasing incentives for example offering bonus payments.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 458,\n  \"level\": 2\n },\n {\n  \"question\": \"Which are the most and least efficient?\",\n  \"answer\": [\n   \"Re-sequencing the works can be the most cost effective and efficient.\",\n   \"The least efficient is usually increasing the working time and increasing the resources employed which usually results in lower productivity.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 459,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a fixed price contract?\",\n  \"answer\": [\n   \"Where adjustments of the contract sum are limited to changes in statutory contributions, taxes and levies.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 460,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a fluctuating price contract?\",\n  \"answer\": [\n   \"Where the contract sum is adjusted for changes in the costs of materials and labour as well as statutory contributions, taxes and levies.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 461,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the date for completion?\",\n  \"answer\": [\n   \"The date fixed and stated in the contract particulars.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 462,\n  \"level\": 1\n },\n {\n  \"question\": \"How does this differ from the completion date?\",\n  \"answer\": [\n   \"This is the date for completion of the works that may be adjusted to take into account agreed Extension of Time.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 463,\n  \"level\": 2\n },\n {\n  \"question\": \"What does it mean when ‘time is at large’?\",\n  \"answer\": [\n   \"There is no fixed completion date.\",\n   \"The contractor must only complete the works in a reasonable time.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 464,\n  \"level\": 2\n },\n {\n  \"question\": \"What is practical completion?\",\n  \"answer\": [\n   \"When the works are substantially complete with minor defects only.\",\n   \"The employer is able to gain beneficial occupancy of the development.\",\n   \"Half of retention is released.\",\n   \"The employer surrenders the right to apply liquidated damages.\",\n   \"The employer takes back possession of the works and is responsible for arranging insurances.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 465,\n  \"level\": 1\n },\n {\n  \"question\": \"What is sectional completion?\",\n  \"answer\": [\n   \"The completion and handover of the works to the employer in agreed stages. Do the works have to be totally completed before practical or sectional completion is achieved?\",\n   \"Practical completion is a vague concept.\",\n   \"It is not defined in JCT.\",\n   \"It is reliant on the architect’s opinion that the works are complete.\",\n   \"It should not be conditional.\",\n   \"It is common practice for PC to be granted when the works are substantially complete however there may be minor defects or omissions with nothing to prevent the employer from taking beneficial occupancy.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 466,\n  \"level\": 1\n },\n {\n  \"question\": \"What is partial possession?\",\n  \"answer\": [\n   \"Where the employer requests and the contractor consents to the employer taking possession of the works or part of the works before the date for practical or sectional completion.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 467,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between partial possession and sectional completion?\",\n  \"answer\": [\n   \"Sectional completion is a contractual obligation to hand over the section at the stated date, partial possession relies on the contractor’s consent.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 468,\n  \"level\": 1\n },\n {\n  \"question\": \"What does the architect have to do at partial possession?\",\n  \"answer\": [\n   \"Issue to a written statement to the contractor showing the relevant part and stating the relevant date.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 469,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the rectification period?\",\n  \"answer\": [\n   \"The contractor has an obligation to make good any defects, shrinkages or other faults that arise during this period of time.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 470,\n  \"level\": 1\n },\n {\n  \"question\": \"How long is it?\",\n  \"answer\": [\n   \"It depends on the forms of contract is place but is typically 12 months so the building can be observed in all seasons.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 471,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a non-completion certificate?\",\n  \"answer\": [\n   \"This is issued by the architect to certify that the works or works section have not been completed by the relevant completion date.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 472,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the consequences of a non-completion certificate?\",\n  \"answer\": [\n   \"The employer has the right to withhold liquidated damages, as long as a withholding notice has been given.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 473,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different certificates you are aware of under JCT forms of contract?\",\n  \"answer\": [\n   \"Interim certificates.\",\n   \"Practical completion or sectional completion certificates.\",\n   \"Non completion certificates.\",\n   \"Certification of Making Good.\",\n   \"Final Certificate.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 474,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the three ways that benefits can be transferred under JCT contracts?\",\n  \"answer\": [\n   \"Collateral warranties.\",\n   \"Third party rights.\",\n   \"Assignment.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 475,\n  \"level\": 1\n },\n {\n  \"question\": \"What are collateral warranties?\",\n  \"answer\": [\n   \"They create contractual relationships between the main parties of a contract with an external third party.\",\n   \"The contractual relationship would not exist with the third party due to privity of contract.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 476,\n  \"level\": 1\n },\n {\n  \"question\": \"Why are they used?\",\n  \"answer\": [\n   \"Due to the principle of privity of contract, the rights and obligations under a contract can only be enforced by a party to that contract.\",\n   \"Collateral warranties give remedies to external third parties that due to privity of contract would not otherwise have them.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 477,\n  \"level\": 2\n },\n {\n  \"question\": \"Who might want a collateral warranty?\",\n  \"answer\": [\n   \"Any third party with a financial investment in a project but not party to the main contract.\",\n   \"Funding institutions, future tenants or purchasers may use collateral warranties.\",\n   \"The employer may want a collateral warranty with key subcontractors or suppliers, as if the main contractor were to go into liquidation, they would have no contractual link with them for redress in case of defective workmanship.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 478,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the common clauses / terms in collateral warranties?\",\n  \"answer\": [\n   \"The obligations of the collateral warranties should mirror that of the main agreement.\",\n   \"Therefore, if a party is in breach of the main agreement they would also be in breach of the warranty.\",\n   \"Common terms include:-\",\n   \"– Limitation of liability.\",\n   \"– Reasonable skill and care or fitness for purpose.\",\n   \"– Requirements for PI insurance.\",\n   \"– Assignment rights.\",\n   \"– Novation rights.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 479,\n  \"level\": 1\n },\n {\n  \"question\": \"Name some standard forms of collateral warranty that may be used\",\n  \"answer\": [\n   \"CWa/F – JCT standard form of collateral warranty for a funder.\",\n   \"CWa/P&T – JCT standard form of collateral warranty for a future purchaser or tenant.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 480,\n  \"level\": 1\n },\n {\n  \"question\": \"What is assignment?\",\n  \"answer\": [\n   \"Where the rights and benefits of one contractual party are transferred to a third party.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 481,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the standard commercial position regarding assignment?\",\n  \"answer\": [\n   \"It is standard to allow assignment of rights twice without consent.\",\n   \"The assignment should be notified in writing to the other party.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 482,\n  \"level\": 1\n },\n {\n  \"question\": \"What is novation and how does this differ from assignment?\",\n  \"answer\": [\n   \"Novation is where a new contract transfers the rights and obligations of one contractual party to a new third party.\",\n   \"Assignment is the transfer of contractual rights or contractual benefits only as burdens cannot be assigned.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 483,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the key issue after a design team has been novated?\",\n  \"answer\": [\n   \"Whether the new party has the right to take action against the novated party for breaches that occurred before the novation.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 484,\n  \"level\": 1\n },\n {\n  \"question\": \"How does novation affect the employer’s rights?\",\n  \"answer\": [\n   \"They lose all contractual relations with the novated party and therefore the right to take action for a breach.\",\n   \"It is therefore common for there to be a collateral warranty between the employer and novated party.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 485,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a limitation clause?\",\n  \"answer\": [\n   \"These are clauses that limit a party’s liability for potential losses\",\n   \"Examples of limitation clauses could be:-\",\n   \"– Limitation to a fixed sum.\",\n   \"– Limitation to the extent of PI insurance.\",\n   \"– Exclusion of consequential loss.\",\n   \"– Limitation to loss that can be recovered from a third party.\",\n   \"– Limitation to responsibility or a net contribution clause.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 486,\n  \"level\": 1\n },\n {\n  \"question\": \"What is available to protect clients from sub-contractors failing?\",\n  \"answer\": [\n   \"Collateral warranties can be used as a direct link between the employer and subcontractor.\",\n   \"In the event that the subcontractor fails to carry out his obligations the employer can have a contractual remedy to sue the subcontractor for breach of contract.\",\n   \"They could also use a performance bond.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 487,\n  \"level\": 1\n },\n {\n  \"question\": \"What are step in rights and why do they exist?\",\n  \"answer\": [\n   \"They typically permit funders to step into another parties’ shoes, usually the employer.\",\n   \"They provide funders protection in the event employer defaults on its loans.\",\n   \"The funder can then take ownership of the development and sell it off if required.\",\n   \"A key problem is that the main cause will often result from the developer not being able to sell the development resulting in them being in arrears.\",\n   \"The funder will stand less of chance of selling the asset than an experienced developer.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 488,\n  \"level\": 1\n },\n {\n  \"question\": \"What is reasonable skill and care?\",\n  \"answer\": [\n   \"The ordinary skill and care expected of an ordinary competent man carrying out the particular service.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 489,\n  \"level\": 1\n },\n {\n  \"question\": \"What is fitness for purpose?\",\n  \"answer\": [\n   \"The provision of a service that is suitable for the employer’s intended purpose.\",\n   \"It is clearly a more onerous obligation than reasonable skill and care.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 490,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a bond?\",\n  \"answer\": [\n   \"A surety bond is a guarantee from the surety in favour of the employer that the contractual obligations will be fulfilled by the main contractor.\",\n   \"The bond if called upon will provide financial compensation up to a stated value if the other party does not fulfill their obligations under the contract.\",\n   \"It does not guarantee the completion of the works.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 491,\n  \"level\": 1\n },\n {\n  \"question\": \"What form must a bond be in?\",\n  \"answer\": [\n   \"It must be in writing, it is common for it to be executed as a deed.\",\n   \"It will contain a duration, usually until practical completion and a financial limit.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 492,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Retention Bond?\",\n  \"answer\": [\n   \"An alternative to the normal contractual retention provisions whereby the Employer holds retention money from the Contractor which does not help the Contractor’s cash flow.\",\n   \"A bond will increase in value from the start of a project to mirror retention normally held throughout the project.\",\n   \"They may reduce in value upon completion.\",\n   \"Clients need to be wary of hidden costs to the employer such as lost interest on retained monies and the cost of the retention bond being passed to the Employer through the tender price.\",\n   \"The choice of a bond may benefit the contractors cash flow.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 493,\n  \"level\": 1\n },\n {\n  \"question\": \"When would you use a retention bond?\",\n  \"answer\": [\n   \"When the client does not wish to hold retention on the contractor, but requires some assurance or financial cover for rectifying defects at the end of the contract in the event that the contractor fails to return and correct them himself.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 494,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a parent company guarantee?\",\n  \"answer\": [\n   \"An arrangement where the contractual performance of one company in a corporate group is underwritten by the other members of that corporate group.\",\n   \"This means that it must complete the works itself if it can or pay the financial equivalent.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 495,\n  \"level\": 1\n },\n {\n  \"question\": \"Which is the most common type in the construction industry?\",\n  \"answer\": [\n   \"Performance bonds.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 496,\n  \"level\": 1\n },\n {\n  \"question\": \"What does this do?\",\n  \"answer\": [\n   \"Performance bonds are typically provided by banks or insurance companies.\",\n   \"They give the employer a guarantee of payment up to a stated amount of money should they suffer a loss as a result of the contractor's breach of his contractual obligations.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 497,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the standard value of a performance bond?\",\n  \"answer\": [\n   \"10% of the contract value, the premium for taking out the bond is added to the contract sum.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 498,\n  \"level\": 1\n },\n {\n  \"question\": \"How can the employer call for payment?\",\n  \"answer\": [\n   \"They have to prove that the contractor has defaulted in their obligations under the main contract and that loss has been suffered\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 499,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of a tender bond?\",\n  \"answer\": [\n   \"This covers the party inviting the tender if the lowest tenderer refuses to enter into a contract with them.\",\n   \"This can be important if the inviting party is in turn tendering for work on the basis of that tender.\",\n   \"It should also prevent idle tendering as there is an incentive to submit a price.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 500,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Notional Final Account?\",\n  \"answer\": [\n   \"A final account that is prepared when the Main Contractor is facing insolvency.\",\n   \"This will typically be of a greater value than the original forecast final account due to costs incurred by the client to appoint a new Contractor to complete the works.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 501,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the standard value?\",\n  \"answer\": [\n   \"1-5% of the tender sum.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 502,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of a materials off site bond?\",\n  \"answer\": [\n   \"It covers the employer against loss or damage to materials already paid for through interim valuations before the materials are delivered to site.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 503,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the arguments against requesting bonds?\",\n  \"answer\": [\n   \"They shouldn’t really be needed if the tenderer selection process is operated effectively as only reliable and capable contractors are then selected.\",\n   \"Unnecessary premiums are added to the contract sum, which are unlikely to be called upon.\",\n   \"If the developer is a serial developer this may add a lot of money to their project costs.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 504,\n  \"level\": 1\n },\n {\n  \"question\": \"Where might bonds be appropriate?\",\n  \"answer\": [\n   \"If the contractor is new or unproven.\",\n   \"To protect the interests of a ‘one off’ developer.\",\n   \"In a difficult economic climate, when the risk of insolvency is higher and PCGs are risky.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 505,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the pro’s and con’s of Parent Company Guarantees?\",\n  \"answer\": [\n   \"They are not as secure as Bonds because of the financial link between a parent company and subsidiary whereas a performance bond is provided by a third-party finance institution.\",\n   \"Advantages are that they do not need to be paid for, they can be unlimited, and they can make the parent company responsible for performance as well as a financial guarantee.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 506,\n  \"level\": 1\n },\n {\n  \"question\": \"What is an ‘on demand’ bond?\",\n  \"answer\": [\n   \"An 'on demand' bond is one which is paid straight away upon the default occurring and request for payment.\",\n   \"There is no requirement to satisfy any review or specific condition to demonstrate the default.\",\n   \"Whereas with conditional Bonds, the employer must satisfy the surety that the default has occurred and the bond must identify what this condition is. It may also require litigation or arbitration resulting in delays and costs.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 507,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Highway Bond?\",\n  \"answer\": [\n   \"A Developer who undertakes speculative housing developments will frequently be required to enter into an agreement with a Local Authority for the adoption of roads and sewers.\",\n   \"If for any reason the Developer fails to complete the adoption of the roads and sewers to the required standards then the Local Authority will complete this on his behalf and call on the bond to claim back costs.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 508,\n  \"level\": 1\n },\n {\n  \"question\": \"What provisions are available for ensuring Contractor carries out works properly?\",\n  \"answer\": [\n   \"To provide assurance that the contractor will perform these obligations, a Parent Company Guarantee (PCG) or a Performance Bond may be provided.\",\n   \"A PCG can only be used where the contractor is a subsidiary to another company.\",\n   \"The parent company guarantees the performance and will become liable if it does not perform.\",\n   \"Alternatively, a performance bond can be provided by the assurers and is used to protect the client in the event the contractor does not perform in the event that specific performance requirements are not met.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 509,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the difference between insurance and indemnity?\",\n  \"answer\": [\n   \"The purpose of indemnity is to protect against legal responsibility or to compensate, it is open ended.\",\n   \"Insurance is a fund that enables the indemnifying party to make any payments that may arise. It includes time and financial limits.\",\n   \"The contract sets out the insurances required to cover the indemnities that the party is liable for.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 510,\n  \"level\": 1\n },\n {\n  \"question\": \"What is insurance?\",\n  \"answer\": [\n   \"A transfer of a defined risk to an insurance company in exchange of a premium.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 511,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the two main types of insurance?\",\n  \"answer\": [\n   \"Liability and loss insurance\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 512,\n  \"level\": 1\n },\n {\n  \"question\": \"What is liability insurance?\",\n  \"answer\": [\n   \"Financial cover for the legal liabilities that the insured party owes to others.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 513,\n  \"level\": 1\n },\n {\n  \"question\": \"What is loss insurance?\",\n  \"answer\": [\n   \"Financial cover for losses that fall directly on the insured party.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 514,\n  \"level\": 1\n },\n {\n  \"question\": \"What is subrogation?\",\n  \"answer\": [\n   \"A legal technique where the insurer steps into the shoes of the insured in order to take the benefit of any legal rights or remedies they may have against a third party responsible for the loss.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 515,\n  \"level\": 1\n },\n {\n  \"question\": \"What does ‘joint names’ mean?\",\n  \"answer\": [\n   \"Where the employer and contractor are insured under the same policy.\",\n   \"It stops the insurer having the right of subrogation against the other party if they caused the loss.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 516,\n  \"level\": 2\n },\n {\n  \"question\": \"Is an LOI that includes a spend limit any use to a contractor?\",\n  \"answer\": [\n   \"It is only useful to the contractor if the LOI is legally binding.\",\n   \"In order for an LOI to be legally binding it must have the basis of a simple contract (offer, acceptance & consideration) & both parties must intend to create legal relations.\",\n   \"Without either of these 4 criteria the LOI is worthless.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 517,\n  \"level\": 2\n },\n {\n  \"question\": \"When are LOI’s used?\",\n  \"answer\": [\n   \"Letters of Intent are used when an early start on site is required.\",\n   \"They can be used to instruct initial design or survey works to be carried out or procurement of materials on a tight programme.\",\n   \"LOIs are issued to commence works while discussions are ongoing regarding the main contract.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 518,\n  \"level\": 1\n },\n {\n  \"question\": \"Are they legally binding?\",\n  \"answer\": [\n   \"There is no legal significance of letters of intent.\",\n   \"The courts will look at all the correspondence between the parties to establish if a contract has been formed.\",\n   \"If it is found that a contract exists, then it will determine obligations.\",\n   \"If there is no contract, then the letter of intent will have no contractual effect and quantum merit will be applied.\"\n  ],\n  \"category\": \"Contract Practice\",\n  \"id\": 519,\n  \"level\": 2\n },\n {\n  \"question\": \"What is procurement?\",\n  \"answer\": [\n   \"The overall process of acquiring construction work or services.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 520,\n  \"level\": 1\n },\n {\n  \"question\": \"What should be considered when selecting a procurement route?\",\n  \"answer\": [\n   \"The specifics of the project.\",\n   \"The client objectives regarding:\",\n   \"– Cost.\",\n   \"– Time.\",\n   \"– Control.\",\n   \"– Quality.\",\n   \"– Risk.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 521,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the main procurement methods?\",\n  \"answer\": [\n   \"Traditional & General Contracting.\",\n   \"Design and Build.\",\n   \"Management Contracting.\",\n   \"Construction management.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 522,\n  \"level\": 1\n },\n {\n  \"question\": \"What is traditional procurement?\",\n  \"answer\": [\n   \"The design is completed by the client’s design team before competitive tenders are invited and a main contractor is employed to build what the designers have specified.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 523,\n  \"level\": 1\n },\n {\n  \"question\": \"How does it work?\",\n  \"answer\": [\n   \"The contractor takes responsibility and financial risk for the construction of the works to the design produced by the client’s design team for the contract sum within the contract period.\",\n   \"The client takes the responsibility and risk for the design and design team performance. *The Client retains design responsibility and holds the direct contractual relationship with the Architect\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 524,\n  \"level\": 2\n },\n {\n  \"question\": \"When might it be appropriate?\",\n  \"answer\": [\n   \"If the employer has had the design prepared.\",\n   \"If the design is substantially completed at time of contractor selection.\",\n   \"The client wishes to retain control over the design and specification.\",\n   \"If cost certainty at start on site is important.\",\n   \"The shortest overall programme is not the client’s main priority\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 525,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages of traditional procurement?\",\n  \"answer\": [\n   \"Retaining control over the design can lead to higher quality.\",\n   \"It offers increased levels of cost certainty before commencement\",\n   \"Design changes are reasonably easy to arrange and value.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 526,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"The overall project duration may be longer than others due to lack of overlap between design and construction.\",\n   \"There is no input into design and planning by the contractor.\",\n   \"A strategy based on price competition can lead to adversarial relations.\",\n   \"There is a dual point of responsibility with the design team controlling the design and the contractor retaining responsibility for the construction.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 527,\n  \"level\": 1\n },\n {\n  \"question\": \"What is design and build?\",\n  \"answer\": [\n   \"Where the contractor is responsible for the design, planning, organisation, control and construction of the works to the employer’s requirements.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 528,\n  \"level\": 1\n },\n {\n  \"question\": \"How does it work?\",\n  \"answer\": [\n   \"The employer gives the tenderers the ‘Employer’s Requirements’ and the contractors responds with the ‘Contractor’s Proposals’, which include the price for the works. *The Client transfers design responsibility to the Main Contractor who holds the direct contractual relationship with the Architect\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 529,\n  \"level\": 2\n },\n {\n  \"question\": \"When might it be appropriate?\",\n  \"answer\": [\n   \"Where there is a need to make an early start on site as there can be overlap between design and construction.\",\n   \"Where the client wishes to minimise their risk as they transfer design responsibility to the Main Contractor.\",\n   \"For technically complex projects requiring the contractor’s expertise.\",\n   \"Where the employer does not want to retain control over design development.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 530,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages of design and build?\",\n  \"answer\": [\n   \"There is a single point of responsibility for the design and construction.\",\n   \"There is earlier commencement on site.\",\n   \"Early price certainty is increased.\",\n   \"The client can benefit from the contractor’s experience harnessed during the design.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 531,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"Clients may find it hard to prepare a sufficiently comprehensive brief.\",\n   \"The Client has to commit to a concept design early.\",\n   \"Variations from the original brief are difficult to arrange and are often expensive.\",\n   \"It is harder to compare tenders and harder to determine whether value for money is being achieved.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 532,\n  \"level\": 1\n },\n {\n  \"question\": \"How much design input will the contractor have?\",\n  \"answer\": [\n   \"This depends on the amount of design work the employer has already had completed at time of tender.\",\n   \"This can range from full design to production information and coordination only.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 533,\n  \"level\": 2\n },\n {\n  \"question\": \"Who carries out the design for the contractor?\",\n  \"answer\": [\n   \"It may be outsourced to a separate design company (contractor retains responsibility).\",\n   \"They may have in-house design capabilities or the client’s team may be novated.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 534,\n  \"level\": 1\n },\n {\n  \"question\": \"What is management contracting?\",\n  \"answer\": [\n   \"A management contractor is employed to contribute their expertise to the design and to manage construction with a management fee being paid to them for doing so.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 535,\n  \"level\": 1\n },\n {\n  \"question\": \"How does it work?\",\n  \"answer\": [\n   \"The management contractor has direct contractual links with all of the works contractors.\",\n   \"They have the responsibility for the construction works without actually carrying them out.\",\n   \"Not all of the design need be completed before the first works contractors start work.\",\n   \"The MC selects the works contractors through competitive open book tender.\",\n   \"The client reimburses the cost of these packages to the MC plus their management fee. *The Management Contractor holds the Contractual relationship with the Works Package Contractors\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 536,\n  \"level\": 2\n },\n {\n  \"question\": \"When might it be appropriate?\",\n  \"answer\": [\n   \"Where the client does not want cost certainty before commencement.\",\n   \"Where an early start on site is a priority.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 537,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages?\",\n  \"answer\": [\n   \"Overall project duration is shorter due to overlapping design and construction.\",\n   \"There is contractor contribution to the design and planning process.\",\n   \"Changes can be accommodated in packages not yet let if they have no further impact.\",\n   \"The works are let competitively at current market prices on a firm price basis.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 538,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"The price for the works is not received until the last package has been let.\",\n   \"Changes to the design of later packages may affect packages already let.\",\n   \"There is little incentive for the Management Contractor to reduce costs.\",\n   \"In practice, the MC has little legal responsibility for the defaults of the works contractors.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 539,\n  \"level\": 1\n },\n {\n  \"question\": \"What is construction management?\",\n  \"answer\": [\n   \"The employer places a direct contract with each of the trade contractors and utilises the expertise of a construction manager who acts as a consultant to coordinate the contracts.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 540,\n  \"level\": 1\n },\n {\n  \"question\": \"How does it work?\",\n  \"answer\": [\n   \"The trade contactors carry out the work.\",\n   \"The construction managers supervises the construction process and coordinates the design team.\",\n   \"The construction manager has no contractual links with the trade contractors or members of the design team.\",\n   \"Their role includes preparation of the programme, determining requirements for site facilities, breaking down the project into suitable works packages, obtaining and evaluating tenders, co-ordinating and supervising the works. *The Client holds the Contractual relationship directly with the Trade Package Contractors\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 541,\n  \"level\": 2\n },\n {\n  \"question\": \"When might it be appropriate?\",\n  \"answer\": [\n   \"On large, complex projects where the advantages of Construction Management can be utilisied for example using upfront buildability knowledge of the Construction Manager and their programme advice including specialist input from trade contractors.\",\n   \"Where an early start on site date is key.\",\n   \"Maintenance of flexibility in design and construction strategy.\",\n   \"Where price certainty before commencement is not considered a key driver.\",\n   \"Where the client is experienced in construction.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 542,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages?\",\n  \"answer\": [\n   \"The overall project duration is reduced by overlapping design and construction.\",\n   \"The construction manager can contribute to the design and project planning processes.\",\n   \"Roles, risks and relationships for all parties are clear.\",\n   \"Changes in design can be accommodated without paying a premium.\",\n   \"Prices may be lower due to direct contracts with trade contractors.\",\n   \"The Client has a means of redress to trade contractors through direct contractual links.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 543,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"Price certainty is not achieved until the last trade package is let.\",\n   \"Changes to packages may adversely affect packages that are already let.\",\n   \"The client must be proactive and hands on.\",\n   \"The client has a lot of consultants and contractors to deal with.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 544,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between management contracting and construction management?\",\n  \"answer\": [\n   \"Under construction management the client is in direct contractual relationships with each of the trade contractors and the construction manager isn’t.\",\n   \"Under management contracting, the Main Contractor is in direct contractual relationships with the trade contractors and the client is in contract with the Main Contractor only.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 545,\n  \"level\": 1\n },\n {\n  \"question\": \"How do you identify the client requirements before recommending a procurement route?\",\n  \"answer\": [\n   \"Through detailed discussions with the client and design team to identify their priorities in terms of cost, time, quality, risk, control requirements and experience. If the client wishes to start on site asap, what route would you recommend?\",\n   \"My recommendation would need to take into account their other requirements such as cost and quality.\",\n   \"If time was their overriding priority, then Construction Management or Management Contracting may offer the best solution as they can offer the fastest start on site with overlap of the design and construction.\",\n   \"This is because start on site is not dependent upon a long tender period however the key tradeoff is a reduction in cost certainty.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 546,\n  \"level\": 2\n },\n {\n  \"question\": \"What would you recommend if the client wanted an early start but also cost certainty?\",\n  \"answer\": [\n   \"Design and build procurement may offer the best solution.\",\n   \"This is because it allows the design and construction to be overlapped rather than being sequential.\",\n   \"Design and Construction risk is transferred to the Main Contractor with their tender being based on a lump sum price to offer high levels of cost certainty.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 547,\n  \"level\": 3\n },\n {\n  \"question\": \"What is GMP?\",\n  \"answer\": [\n   \"Guaranteed maximum price.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 548,\n  \"level\": 1\n },\n {\n  \"question\": \"What does it mean to you?\",\n  \"answer\": [\n   \"A lump sum contract under which there is no adjustment of tender price unless design changes are requested by the client.\",\n   \"The contractor includes the additional risks involved in the design development process in his tender price.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 549,\n  \"level\": 2\n },\n {\n  \"question\": \"What is PFI?\",\n  \"answer\": [\n   \"Private Finance Initiative.\",\n   \"A government programme launched in 1992 to bring private sector project management and expertise into the public sector.\",\n   \"The private sector is granted a concession to finance, design & build and operate major public projects such as schools and hospitals.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 550,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the three types of PFI projects?\",\n  \"answer\": [\n   \"Financially free-standing - Projects costs are recovered by charging users for example toll roads and bridges.\",\n   \"Joint Venture - Public and private sector stakeholders both invest however the private sector has overall control. Contributions and allocation of risk are clearly defined.\",\n   \"Services Sold – The capital expenditure for the project is financed by the private sector and then sold back to the public sector. The public sector requires clear demonstration that this provides better value for money than option 1 and 2.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 551,\n  \"level\": 1\n },\n {\n  \"question\": \"What sort of projects might PFI be used on?\",\n  \"answer\": [\n   \"Its use is recommended where it offers clear value for money when compared against traditional public sector procurement.\",\n   \"It is generally considered more appropriate for larger projects of value greater than £20m and where there are significant ongoing maintenance requirements.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 552,\n  \"level\": 2\n },\n {\n  \"question\": \"What might be some of the problems associated with PFI?\",\n  \"answer\": [\n   \"High bidding costs are associate with PFI projects can take longer to procure than traditional projects.\",\n   \"Value for money is hard to achieve as the cost of private borrowing is more expensive than public sector borrowing.\",\n   \"Long term and inflexible contracts are formed which cannot respond to demographic changes. For example, a reduction in school cohort numbers can lead to empty classrooms being paid for by local authorities.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 553,\n  \"level\": 2\n },\n {\n  \"question\": \"What is Build Lease Transfer (BLT)?\",\n  \"answer\": [\n   \"A facility is designed, financed and constructed by the private sector and then leased back to the government for a predetermined period of time at a pre-agreed rental cost.\",\n   \"The facility is owned by the private sector partner during the lease period, at the end the government can renew the lease, buy out the private sector partner or walk away from the deal.\",\n   \"Operation and maintenance of the facility during the lease period is usually the government’s responsibility.\",\n   \"This provides the public sector with a way of financing large-scale infrastructure projects based on ongoing revenue rather than using high levels of capital expenditure.\",\n   \"The primary disadvantage is that legal ownership remains with the private sector.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 554,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Build Operate Transfer (BOT)?\",\n  \"answer\": [\n   \"The facility is designed, financed, operated and maintained by a concession company, for the period of the concession.\",\n   \"Ownership of the facility is vested in the host government from the time of construction completion.\",\n   \"At the end of the period, the concessionaire’s involvement in the project ends and all operating rights and maintenance responsibilities revert to the host government.\",\n   \"The concessionaire retains all toll income during the agreed period.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 555,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Build Own Operate Transfer (BOOT)?\",\n  \"answer\": [\n   \"A variation on Build Operate Transfer where ownership stays with the concessionaries until the end of the concession period at which time it is then transferred free of charge to the host government.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 556,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Partnering?\",\n  \"answer\": [\n   \"A long term approach of structuring business relationships.\",\n   \"It involves two or more organisations working together to achieve specific mutual objectives and deliver continuous measurable improvements.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 557,\n  \"level\": 1\n },\n {\n  \"question\": \"What is project partnering?\",\n  \"answer\": [\n   \"All members of the professional team become involved in the partnering process at the design stage including contractors.\",\n   \"Ownership of risk is spread between the parties and a collaborative approach is encouraged to delivering the solution and overcoming problems.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 558,\n  \"level\": 1\n },\n {\n  \"question\": \"What is Strategic Partnering?\",\n  \"answer\": [\n   \"A long-term relationship that is established with a view to undertaking a number of projects over a long period.\",\n   \"Framework agreements are used to set out the overriding contractual terms with fixed terms and conditions for future purchases.\",\n   \"Projects and services are then draw down on a project-by-project basis.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 559,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the key characteristics of partnering?\",\n  \"answer\": [\n   \"More trust is achieved between the parties.\",\n   \"There is a reduced risk of adversarial relationships as pre-determined contract conditions are agreed by all parties in advance.\",\n   \"Increased cost certainty and speed of calling off contracts is gained.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 560,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the benefits of partnering?\",\n  \"answer\": [\n   \"The overall construction and design programme is shortened because there is a prior understanding of the Client and their requirements from previous projects.\",\n   \"– The potential for conflict is reduced.\",\n   \"– Communication is improved.\",\n   \"– Pooling of resources and ideas should result in innovative solutions.\",\n   \"– Improved client satisfaction is gained.\",\n   \"– Recognition of protection of profit margin for contractors and suppliers.\",\n   \"– A team environment is formed that encourages innovation and technical development.\",\n   \"– Improved buildability with early involvement of contractors.\",\n   \"– Better predictability of time and cost.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 561,\n  \"level\": 1\n },\n {\n  \"question\": \"What is tendering?\",\n  \"answer\": [\n   \"A structured procedure for generating quotations from suppliers or contractors looking to obtain an award of business activity either under competition or via negotiation with a single contractor.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 562,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main methods of choosing a contractor?\",\n  \"answer\": [\n   \"Open tendering.\",\n   \"Selective tendering:-\",\n   \"– Single or Two Stage.\",\n   \"Negotiated tendering.\",\n   \"Serial tendering.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 563,\n  \"level\": 1\n },\n {\n  \"question\": \"What is open tendering?\",\n  \"answer\": [\n   \"This is an indiscriminate request for tenders to be submitted to the open market.\",\n   \"This could be achieved by advert placement in local papers or technical press inviting contractors to apply for the tender documentation.\",\n   \"There are little or no barriers to entry needed to submit a tender.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 564,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages of open tendering?\",\n  \"answer\": [\n   \"It provides opportunities for capable firms which the clients may have not previously considered.\",\n   \"It should secure maximum competition from the open market.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 565,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the disadvantages?\",\n  \"answer\": [\n   \"There is a danger of increased errors within the tender submission due to a risk of inexperienced contractors that have no prior understanding of the clients requirements.\",\n   \"There is no assurance that the lowest tenderer is capable or financially stable.\",\n   \"The total cost and time needed to review the tenders is increased.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 566,\n  \"level\": 1\n },\n {\n  \"question\": \"What is selective tendering?\",\n  \"answer\": [\n   \"This restricts the number of tenderers by pre-selecting a limited number of contractors to tender for the work.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 567,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the two types of selective tendering?\",\n  \"answer\": [\n   \"Single stage.\",\n   \"Two stage.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 568,\n  \"level\": 1\n },\n {\n  \"question\": \"What is single stage tendering?\",\n  \"answer\": [\n   \"A structured process of receiving competitive tenders from a number of pre-selected capable contractors.\",\n   \"Contractors are pre-selected based on:-\",\n   \"– Financial standing.\",\n   \"– Qualifications and certifications.\",\n   \"– Previous track record.\",\n   \"– References.\",\n   \"– Organisational structure.\",\n   \"– Capacity and resources.\",\n   \"– Size of work previously undertaken.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 569,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the advantages of single stage tendering?\",\n  \"answer\": [\n   \"It ensures only capable and approved firms submit tenders.\",\n   \"It tends to reduce the aggregate cost of tendering.\",\n   \"It reduces the risk of receiving tenders from unsuitable contractors.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 570,\n  \"level\": 1\n },\n {\n  \"question\": \"What is two stage tendering?\",\n  \"answer\": [\n   \"Two stage tendering is where the Client seeks to appoint the Contractor based on an outline scope of work that is not fully defined.\",\n   \"The client then works with the appointed contractor to develop the scope of work and reaches an agreed price.\",\n   \"It can be used when it is useful to obtain the contractors buildability expertise on the planning of the project and gain an earlier contractor involvement.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 571,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of the first stage?\",\n  \"answer\": [\n   \"The client provides an outline project design to each of the tenderers.\",\n   \"The tendering contractors will submit prices for helping the client develop and finalise the design using their buildability expertise.\",\n   \"Tender submissions will typically consist of:-\",\n   \"– A schedule of rates that will be used to calculate the agreed price during stage 2.\",\n   \"– A price for assisting the client with design development and buildability expertise during stage 2.\",\n   \"– Confirmation of the contractors Overheads & Profits Percentage.\",\n   \"A preferred contractor is then appointed to assist with developing the design further.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 572,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of the second stage?\",\n  \"answer\": [\n   \"Following development of the design to a defined stage, a formal negotiation process is undertaken during stage 2 to agree:-\",\n   \"– The final price.\",\n   \"– The contract conditions.\",\n   \"– Programme.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 573,\n  \"level\": 1\n },\n {\n  \"question\": \"What do tenderers return as part of the first stage?\",\n  \"answer\": [\n   \"Detailed build up of prices for the preliminaries items.\",\n   \"Percentage additions for profit and overheads.\",\n   \"A construction programme.\",\n   \"Proposed sub-letting of the works.\"\n  ],\n  \"category\": \"Procurement & Tendering\",\n  \"id\": 574,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the advantage
