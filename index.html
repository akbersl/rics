  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"4539c98d-97f3-4b8a-8be8-c79f5479a9b9\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"70710833-10f4-434f-993d-781e70471738\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f6ba2e75-1f25-4ccd-a8e7-fe444f6263c0\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"36295d58-7cda-4b05-a949-c39ab26e8659\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"190e6870-e7db-467d-9768-c8bebbb87861\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script>// Full Q&A dataset extracted from the user's RICS APC PDF (Quantity Surveying & Construction).\n// 749 question/answer pairs. `level` is a heuristic best-effort classification (1=Knowledge, 2=Experience, 3=Advice/Reasoning) based on question phrasing, per the book's own Level 1/2/3 framework — not an authoritative per-question tag from the source.\nwindow.QA_DATA = [\n {\n  \"question\": \"What is the meaning of the RICS Motto?\",\n  \"answer\": [\n   \"The motto is ‘Est Modus in Rebus’ which in Latin translates to ‘There is measure in all things’.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 1,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the Mission Statement of the RICS?\",\n  \"answer\": [\n   \"To qualify and equip their members to offer the highest standards of professional service.\",\n   \"To promote and enforce standards\",\n   \"To lead solutions to the major challenges facing the built environment through professional expertise.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 2,\n  \"level\": 1\n },\n {\n  \"question\": \"When was the RICS founded?\",\n  \"answer\": [\n   \"It was founded in 1868.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 3,\n  \"level\": 1\n },\n {\n  \"question\": \"How is the RICS Structured?\",\n  \"answer\": [\n   \"The RICS was founded in 1868 with the Royal Charter being granted by the Privy Council in1881.\",\n   \"The RICS is self-regulated and internally monitored meaning that it is not regulated by the Government or external parties.\",\n   \"The Bye-Laws determine how the RICS is regulated.\",\n   \"The Governing council manage and agree the strategy for the RICS.\",\n   \"The Regulatory board, audit committee and management board are beneath the governing council and execute the strategy set by them.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 4,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the RICS’ 5 principles of better regulation?\",\n  \"answer\": [\n   \"Proportionality.\",\n   \"Accountability.\",\n   \"Consistency.\",\n   \"Targeting.\",\n   \"Transparency.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 5,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between RICS ethics and rules?\",\n  \"answer\": [\n   \"Ethics are a set of moral values.\",\n   \"Rules of conduct are a framework that we work to.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 6,\n  \"level\": 1\n },\n {\n  \"question\": \"How many Global Professional and Ethical standards are there?\",\n  \"answer\": [\n   \"Up until the 1st February 2022 there were 5 Global Professional & Ethical Standards.\",\n   \"From the 2nd February 2022 onwards the Global Professional & Ethical Standards have been consolidated within the New Rules of Conduct 2022.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 7,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the Global Professional & Ethical Standards? [Note that Candidates sitting prior to 2nd February 2022 will be tested on these however for candidates sitting after 2nd February 2022 this is not applicable].\",\n  \"answer\": [\n   \"Act with integrity.\",\n   \"Always provide a high standard of service.\",\n   \"Act in a way that promotes trust in the profession.\",\n   \"Treat others with respect.\",\n   \"Take responsibility.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 8,\n  \"level\": 1\n },\n {\n  \"question\": \"When are the Rules of Conduct changing?\",\n  \"answer\": [\n   \"The New Rules of Conduct are effective from the 2nd February 2022.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 9,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the New Rules of Conduct?\",\n  \"answer\": [\n   \"Rule 1. Members and firms must be honest, act with integrity and comply with their professional obligations, including obligations to RICS.\",\n   \"Rule 2. Members and firms must maintain their professional competence and ensure that services are provided by competent individuals who have the necessary expertise.\",\n   \"Rule 3. Members and firms must provide good-quality and diligent service.\",\n   \"Rule 4. Members and firms must treat others with respect and encourage diversity and inclusion.\",\n   \"Rule 5. Members and firms must act in the public interest, take responsibility for their actions and act to prevent harm and maintain public confidence in the profession.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 10,\n  \"level\": 1\n },\n {\n  \"question\": \"Why did the previous Rules of Conduct change?\",\n  \"answer\": [\n   \"The previous rules had been in place since 2007.\",\n   \"Following research and consultation with RICS Members, Firms and Members of the public, the majority voted in favour of replacing the existing Rules of Conduct and separate Global Professional and Ethical Standards.\",\n   \"This was to provide a single document to enable greater clarity for RICS members and firms.\",\n   \"I also understand there is now a greater focus on clearer example behaviors, understanding evolving technology and tackling climate change.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 11,\n  \"level\": 2\n },\n {\n  \"question\": \"Talk us through your understanding of the Rules of Conduct changes?\",\n  \"answer\": [\n   \"The Rules of Conduct October 2021 Global Practice Statement will overhaul the previous separate documents:\",\n   \"– Rules of conduct for Members.\",\n   \"– Rules of Conduct for Firms.\",\n   \"– Global Professional and Ethical Standards.\",\n   \"Appendix A of the Rules of Conduct now contains the professional obligations of Members and Firms.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 12,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the professional obligations of members?\",\n  \"answer\": [\n   \"1. Members must comply with the CPD requirements set by the RICS which requires 20 hours of CPD for each calendar year, 10 hours of which must be formal CPD.\",\n   \"2. Members must cooperate with RICS.\",\n   \"3. Members must promptly provide all information reasonably requested by the Standards and Regulation Board, or those exercising delegated authority on its behalf.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 13,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the professional obligations of firms?\",\n  \"answer\": [\n   \"1. Firms must publish a complaints-handling procedure, which includes an alternative dispute resolution provider approved by RICS, and maintain a complaints log.\",\n   \"2. Firms must ensure that all previous and current professional work is covered by adequate and appropriate professional indemnity cover that meets the standards approved by RICS.\",\n   \"3. Firms with a sole principal must make appropriate arrangements for their professional work to continue in the event of their incapacity, death, absence from or inability to work.\",\n   \"4. Firms must cooperate with RICS.\",\n   \"5. Firms must promptly provide all information reasonably requested by the Standards and Regulation Board, or those exercising delegated authority on its behalf.\",\n   \"6. Firms must display on their business literature, in accordance with RICS’ published policy on designations, a designation to denote that they are regulated by RICS.\",\n   \"7. Firms must report to RICS any matter that they are required to report under the Rules for the Registration of Firms.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 14,\n  \"level\": 1\n },\n {\n  \"question\": \"Why does the RICS have Rules of Conduct?\",\n  \"answer\": [\n   \"To provide a framework that we can all work to and so the client knows he is getting a set level of service.\",\n   \"As well as being an important tool for the Institution, the Rules of Conduct are also a useful professional guide for individual institution members. Your brother-in-law is a chartered surveyor. You find out that he is working outside the RICS Rules of Conduct. What do you do?\",\n   \"I verify the facts and confront him reminding him of his duties as a member of the RICS.\",\n   \"I inform the RICS specifying my relationship to the person and any corrective action which I believe my brother-in-law is committed to put in place. In the case of a breach of a rule of conduct what is the procedure?\",\n   \"Not every shortcoming will necessarily give rise to proceedings.\",\n   \"A formal investigation by the Head of Regulation of the RICS is the first step in the process.\",\n   \"The RICS can request information and/or visit and inspect to investigate compliance.\",\n   \"Members must cooperate fully with all enquiries.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 15,\n  \"level\": 2\n },\n {\n  \"question\": \"How can a disciplinary proceeding be triggered?\",\n  \"answer\": [\n   \"Someone complaining to the RICS.\",\n   \"An allegation by a client or third party.\",\n   \"Information received or established by the RICS.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 16,\n  \"level\": 2\n },\n {\n  \"question\": \"What three actions can be imposed after the end of the investigation stage?\",\n  \"answer\": [\n   \"Fixed penalty.\",\n   \"Consent order.\",\n   \"Disciplinary panel.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 17,\n  \"level\": 2\n },\n {\n  \"question\": \"What are fixed penalties?\",\n  \"answer\": [\n   \"A fine by the RICS.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 18,\n  \"level\": 1\n },\n {\n  \"question\": \"What are consent orders?\",\n  \"answer\": [\n   \"It is a written agreement between the RICS and a member or firm concerning a disciplinary issue on a breach of the RICS rules.\",\n   \"It can require the member to take certain corrective actions, or restrain them from taking certain actions for a specified period of time and may require them to pay a fine or costs.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 19,\n  \"level\": 1\n },\n {\n  \"question\": \"When is a disciplinary panel applicable?\",\n  \"answer\": [\n   \"They are used for more serious breaches of conduct.\",\n   \"The panel will usually be held in public.\",\n   \"The burden of proof is on the RICS.\",\n   \"A balance of probabilities approach will be adopted.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 20,\n  \"level\": 1\n },\n {\n  \"question\": \"What sort of breaches would expulsion be suitable for?\",\n  \"answer\": [\n   \"Gross, persistent or willful failure to comply with an RICS rule of conduct.\",\n   \"Fraud, dishonesty, conviction of a serious criminal offence, gross incompetence, deliberate discrimination, misappropriation of a client’s money.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 21,\n  \"level\": 2\n },\n {\n  \"question\": \"What procedures must you follow if you are starting up a new practice?\",\n  \"answer\": [\n   \"Contact the RICS for guidance and obtain a company start up pack.\",\n   \"Inform the RICS and register for regulation.\",\n   \"Appoint a contact officer for all RICS communication.\",\n   \"Prepare a complaints handling procedure.\",\n   \"Obtain Professional indemnity insurance cover.\",\n   \"Abide by the Rules of Conduct for Firms.\",\n   \"Use the designation ‘Regulated by RICS’ on all practice material.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 22,\n  \"level\": 2\n },\n {\n  \"question\": \"Would you advertise your new company in the press?\",\n  \"answer\": [\n   \"Yes as long as it is in a trustful and responsible manner in line with the Rules of Conduct for Firms.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 23,\n  \"level\": 3\n },\n {\n  \"question\": \"What insurances would you need if you were starting up your own firm?\",\n  \"answer\": [\n   \"Professional Indemnity Insurance.\",\n   \"Employer’s Liability.\",\n   \"Public Liability.\",\n   \"Building’s insurance of an office premises.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 24,\n  \"level\": 2\n },\n {\n  \"question\": \"What sort of information do registered firms have to send to the RICS annually?\",\n  \"answer\": [\n   \"It is called annual return and carried out on-line.\",\n   \"Failure to do so leads to a fixed penalty.\",\n   \"It includes:-\",\n   \"– Type of business and staffing.\",\n   \"– Nature of clients.\",\n   \"– Training provision.\",\n   \"– Complaints handling procedures details and records.\",\n   \"– PI insurance details.\",\n   \"– Whether the firm holds clients’ money.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 25,\n  \"level\": 2\n },\n {\n  \"question\": \"What processes do regulated firms need to put in place when handling Clients' Money?\",\n  \"answer\": [\n   \"Preserve the security of clients' money which does not belong wholly to the company.\",\n   \"RICS regulated firms that operate a client account must:-\",\n   \"– Set clear segregation of duties for employees.\",\n   \"– A Principal oversees the client money accounting functions.\",\n   \"– Principles cannot override controls.\",\n   \"– Competent and knowledgeable staff are to process clients' money with cover provided for long term absence.\",\n   \"– Accounting systems and data must be secure.\",\n   \"– Client money must be kept separate and clearly identifiable with the word ‘client’ included in the bank account name.\",\n   \"– Clients must always have access to funds.\",\n   \"– We must agree the terms and advise the client on bank details.\",\n   \"– The account must not be overdrawn.\",\n   \"– We must maintain client ledgers and provide a running balance.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 26,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the different types of client money accounts?\",\n  \"answer\": [\n   \"General accounts hold money for more than one client.\",\n   \"Discrete accounts reference a single named client.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 27,\n  \"level\": 1\n },\n {\n  \"question\": \"What is meant by the term Negligence?\",\n  \"answer\": [\n   \"A duty of care is owed to all clients and 3rd parties using reasonable skill and care.\",\n   \"If it is breached due to Negligence a claim may arise resulting in damages being paid or a Professional Indemnity Insurance claim.\",\n   \"Negligence is a failure to provide the duty of care that is owed to the client.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 28,\n  \"level\": 1\n },\n {\n  \"question\": \"Tell us about the Merrit V Babb case law?\",\n  \"answer\": [\n   \"This case dates back to 2001 and highlights the importance of having run-off cover in place.\",\n   \"A surveyor was sued for negligence by a former client.\",\n   \"Because the surveying firm was no longer in existence therefore the individual surveyor was pursued for damages successfully.\",\n   \"This caused a big shock in the industry and highlighted the need to ensure that run-off cover is in place for all previous employees.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 29,\n  \"level\": 2\n },\n {\n  \"question\": \"What limitation periods are associated with underhand and deed forms of contract?\",\n  \"answer\": [\n   \"6 years when executed under hand.\",\n   \"12 years when executed as a deed.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 30,\n  \"level\": 2\n },\n {\n  \"question\": \"What must a complaints handling procedure include?\",\n  \"answer\": [\n   \"The RICS provides a model form.\",\n   \"The process must include a redress mechanism.\",\n   \"Details of the policy should be issued to the client with the Terms of Business.\",\n   \"It must be clear, quick, transparent and impartial and free of charge within the first stage.\",\n   \"Names and contact details of the nominated investigating person must be stated.\",\n   \"The complaint must be investigated within 28 days.\",\n   \"All complaints, their progress and outcomes must be recorded.\",\n   \"We must note the need to advise PI insurers of a complaint immediately.\",\n   \"The process must have two stages as a minimum:-\",\n   \"– Stage 1 is where there needs to be consideration of the complaint by a senior member of the firm or the complaints handling officer.\",\n   \"– Stage 2 if the issue is not resolved, the complaint is referred to an independent third party with the authority to award redress. The complainant may be expected to contribute towards costs at this stage.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 31,\n  \"level\": 2\n },\n {\n  \"question\": \"What is an independent redress scheme?\",\n  \"answer\": [\n   \"It is a consumer scheme designed to handle small issues that would be disproportionally expensive to take to court.\",\n   \"If the scheme judges in favour of the complainant, it is binding.\",\n   \"If it judges in favour of the firm, the complainant can escalate the matter to court.\",\n   \"RICS firms must specify which redress scheme they want to use, it could be an ombudsman, arbitration or sometimes adjudication.\",\n   \"If the complaint relates to a large amount of money or if the complainant wishes so, he can take the matter to court.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 32,\n  \"level\": 1\n },\n {\n  \"question\": \"What do you do if you receive a letter of complaint?\",\n  \"answer\": [\n   \"I would acknowledge receipt and I would forward it to my firms designated complaint handler, as per our complaint handling procedure, providing additional information as required.\",\n   \"I would also highlight the importance of informing our Professional Indemnity insurance providers immediately.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 33,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the ‘Clients’ Money Protection Scheme’?\",\n  \"answer\": [\n   \"This is a money protection scheme operated by the RICS.\",\n   \"It contains provision for any member of the public to be reimbursed their direct loss of funds when using an RICS regulated firm.\",\n   \"This is provided through an RICS insurance policy.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 34,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of the joint names on a client account?\",\n  \"answer\": [\n   \"For the purpose of dual authorisation.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 35,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the continuous professional development (CPD) requirements?\",\n  \"answer\": [\n   \"Members must undertake and record appropriate lifelong learning.\",\n   \"On request by the RICS they must provide evidence that they have carried out the CPD to maintain and improve their levels of professional competence.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 36,\n  \"level\": 1\n },\n {\n  \"question\": \"How many hours must you do?\",\n  \"answer\": [\n   \"A minimum of 20 hours CPD must be achieved per calendar year, of which a minimum 10 hours must be formal.\",\n   \"Members must undertake learning on the standards expected around RICS Ethics on a rolling 3-year period.\",\n   \"All CPD’s must be recorded via the RICS on-line management system.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 37,\n  \"level\": 1\n },\n {\n  \"question\": \"What sorts of activities are included?\",\n  \"answer\": [\n   \"It must have a clear learning objective relevant to my role to count as CPD.\",\n   \"Formal CPD can be classed as web based training with structured assessments, formal seminars, providing training to others where research and preparation is required.\",\n   \"Informal CPD is classed as private reading, internal CPD’s and on the job shadowing.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 38,\n  \"level\": 2\n },\n {\n  \"question\": \"What types of articles do you read?\",\n  \"answer\": [\n   \"My employer’s research & development team send us weekly digests of the relevant press and I request copies of articles of interest.\",\n   \"I also read the RICS journals (Modus, Construction Journal, RICS regional magazine).\",\n   \"I also keep up to date via the RICS website, Building Magazine, Estates Gazette and BCIS updates.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 39,\n  \"level\": 2\n },\n {\n  \"question\": \"What recent article have you read from the RICS?\",\n  \"answer\": [\n   \"This is going to be specific to the candidate’s own reading.\",\n   \"Be sure to have a couple of articles in mind that you are able to talk through with the assessors.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 40,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you keep up to date with topical issues?\",\n  \"answer\": [\n   \"I am on the mailing list for several CPD providers.\",\n   \"My employer’s research & development team send us weekly digests of the relevant press and I request copies of articles of interest.\",\n   \"I also exchange industry articles and relevant information with colleagues.\",\n   \"I follow updates on the RICS website and Construction Journals\",\n   \"I undertake regular web research on key topics relevant to my field of surveying.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 41,\n  \"level\": 2\n },\n {\n  \"question\": \"What is your CPD strategy\",\n  \"answer\": [\n   \"I meet with my manager twice a year to review my career development plan and objectives.\",\n   \"I build my CPD strategy around these objectives, current topics and personal interests.\",\n   \"The candidate should try to explain their own personal objectives to address this question.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 42,\n  \"level\": 1\n },\n {\n  \"question\": \"What does PII stand for?\",\n  \"answer\": [\n   \"Professional Indemnity Insurance.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 43,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of Professional Indemnity Insurance?\",\n  \"answer\": [\n   \"To provide financial cover in the event a client suffers financial loss as a result of a breach of professional duty e.g. neglect, errors or omissions.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 44,\n  \"level\": 1\n },\n {\n  \"question\": \"What benefits does it provide for the professional?\",\n  \"answer\": [\n   \"The professional is protected from financial losses.\",\n   \"The firm does not have to meet the claim from their own assets and resources.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 45,\n  \"level\": 2\n },\n {\n  \"question\": \"What benefits does it provide for the client?\",\n  \"answer\": [\n   \"They are able to recover their financial losses.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 46,\n  \"level\": 2\n },\n {\n  \"question\": \"On what basis is it underwritten in the UK?\",\n  \"answer\": [\n   \"On a claims made basis.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 47,\n  \"level\": 2\n },\n {\n  \"question\": \"What does this mean?\",\n  \"answer\": [\n   \"The insurance policy that is in place at the time the breach is discovered is responsible for providing the indemnity, not the insurance policy in place when the breach was made.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 48,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the requirements regarding Professional Indemnity Insurance set by the RICS?\",\n  \"answer\": [\n   \"The policy cover must be made on an ‘each and every’ claim basis.\",\n   \"The RICS sets out the minimum levels of indemnity.\",\n   \"The RICS sets out the maximum levels of uninsured excess.\",\n   \"Run off cover must be in place for at least 6 years.\",\n   \"The policy should include cover for past and present employees, directors and partners.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 49,\n  \"level\": 1\n },\n {\n  \"question\": \"What measures should be taken to try and avoid PI claims?\",\n  \"answer\": [\n   \"Keep full and detailed records of meetings and conversations.\",\n   \"Record recommendations and advice given.\",\n   \"Use proper letters of engagement, scope of services and terms of engagement.\",\n   \"Don’t advise on a specialism outside your field of experience.\",\n   \"Use RICS guidelines.\",\n   \"Avoid poor management and excessive workloads.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 50,\n  \"level\": 2\n },\n {\n  \"question\": \"If you made a mistake in your cost plan what would your insurance company expect?\",\n  \"answer\": [\n   \"For you to notify them and comply with any conditions & procedures set out in the insurance policy. If an estimate prepared by a QS is incorrect can the client claim damages?\",\n   \"An estimate that is incorrect in itself will not provide the client with a right of redress.\",\n   \"The client must demonstrate that the QS warranted the accuracy of the estimate or that it was incorrect due to a lack of reasonable skill and care.\",\n   \"It could have been incorrect due to reasons outside their control for example market conditions or an item referred to in their exclusions.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 51,\n  \"level\": 2\n },\n {\n  \"question\": \"How can you limit your liability when agreeing terms of appointment with a client?\",\n  \"answer\": [\n   \"Base the appointment on reasonable care and skill rather than fitness for purpose which is more onerous.\",\n   \"If the client’s requirements are performance based, this may imply fitness for purpose. It is advisable to request a clause limiting the appointment to reasonable skill and care only.\",\n   \"Run off cover must be in place.\",\n   \"Execution of the appointment under hand will result in a reduced liability period of 6 years instead of 12.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 52,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the main elements included within a fee proposal?\",\n  \"answer\": [\n   \"Terms and conditions.\",\n   \"Scope of services.\",\n   \"Exclusions.\",\n   \"Assumptions.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 53,\n  \"level\": 1\n },\n {\n  \"question\": \"If you put together a fee proposal, but a couple of months into the job you realise that you have under forecasted your resources, would you go back to the client and ask for more money?\",\n  \"answer\": [\n   \"If project requirements such as the services, scope or value of the project has increased then I would go back to client and request a fee increase.\",\n   \"If the scope of works had remained the same, this highlights a mistake within our fee bid and the additional work would need to be carried out without reducing the level of service being offered and without requesting additional fees from the client. Once you and your client agreed the services that are to be provided verbally what would you do next?\",\n   \"Follow up with a formal letter which includes the terms and conditions, fees and scope of services that are to be provided. If the client gives you a lump sum fee before going on holiday, what would you do?\",\n   \"I would place the funds in a separately identified client account and agree a drawdown of monies against the services being provided with the client.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 54,\n  \"level\": 2\n },\n {\n  \"question\": \"Tell me what you understand about conflicts of interest?\",\n  \"answer\": [\n   \"A conflict of interest is where someone in a position of trust has competing personal or professional interests making it difficult for them to fulfil their duties impartially.\",\n   \"An existing relationship will result in reduced impartiality and Chartered Surveyors have an obligation to make clients aware of this and if necessary, decline work opportunities where a conflict of interest occurs.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 55,\n  \"level\": 2\n },\n {\n  \"question\": \"How could the conflict of interest be managed internally if two separate departments were working for the same client?\",\n  \"answer\": [\n   \"I could put in place procedures to ensure exclusivity of staff.\",\n   \"This would avoid any cross over of information between the departments.\",\n   \"I would also ensure that there are separate communication lines into the client.\",\n   \"Separate geographical locations and secure office and data storage would also need to be provided.\",\n   \"Staff could also sign up to confidentiality or non-disclosure agreements.\",\n   \"I would also need to monitor the potential conflict and keep the client updated on progress. If the client was insistent that you worked for them despite an existing conflict of interest, how would you proceed?\",\n   \"I would check the clients understanding around the conflict of interest.\",\n   \"I would then make the client aware of the potential for reduced impartiality.\",\n   \"If they were still insistent on the appointment, I would seek a letter of instruction from the client to continue.\",\n   \"Following the appointment I would agree working procedures to manage the conflict of interest with the client and the teams involved.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 56,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the Main Principles of the Bribery Act?\",\n  \"answer\": [\n   \"The offences are:-\",\n   \"– Making a bribe.\",\n   \"– Receiving a bribe.\",\n   \"– Bribery of a foreign public official.\",\n   \"– Failure of a corporate entity to prevent bribery on its behalf.\",\n   \"The legislation applies to all UK Entities and includes associated Persons for example sub-consultants and external advisors.\",\n   \"There are six principles of prevention companies should put in place:- o 1. Proportionate Procedures. o 2. Top Level Commitment. o 3. Risk Assessments. o 4. Due Diligence. o 5. Communication. o 6. Monitoring & Review. Under the Bribery Act, under what circumstance is a facilitation payment permitted?\",\n   \"The only circumstance in which it is OK to make a facilitation payment is when you are under duress.\",\n   \"For example if there is a real and present risk or danger to \\\"life, limb or liberty\\\".\",\n   \"If you or your companions are under immediate physical threat.\",\n   \"You should put safety first, make the payment and report the matter immediately.\",\n   \"Or as soon as is practicable to your manager or your ethics compliance contact. You are attending a Main Contractor organised business conference where it is announced the you have been randomly selected as the winner of this months prize draw. Its an i-pad air. How would you act in this scenario?\",\n   \"I would be extremely uncomfortable accepting the prize in this scenario.\",\n   \"The prize is of a significant value and could be interpreted as a bribe.\",\n   \"Furthermore due to working on a project with the Main Contractor at the time of this scenario, accepting the prize would have been highly inappropriate and could be interpreted as having an affect on my business conduct during the project.\",\n   \"I would respectfully decline the prize and suggest that this is made as a charitable donation to a charity of the Main Contractor’s choice.\",\n   \"I am aware that bribes are commonly distributed as random prizes and due to the seriousness of this incident I would report this to my line manager. You receive an invite to attend the Theatre with some members of your Project Team but they dropped out due to illness at the last minute, would you still attend?\",\n   \"In the first instance I would declare this hospitality on my companies’ gifts and hospitality register.\",\n   \"Assuming the invite was approved and I was authorised to attend, I would need to decline the invite due to the Project Team dropping out.\",\n   \"Since they won't be present, this will not be a genuine business event.\",\n   \"Consequently, I would decline this hospitality at the Project Team's expense. A contractor invites you to lunch to a restaurant and advises they've got two Michelin stars and a wine list second to none. They say they are keen to discuss the details of their tender they are about to submit for the project you are working on.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 57,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you respond?\",\n  \"answer\": [\n   \"Going to what sounds like a lavish lunch paid for by a bidder in the middle of a tender process is against Company policy and could be an offence under the UK Bribery Act.\",\n   \"If this were the first time, it would be OK just to decline and explain that such an invitation is inappropriate.\",\n   \"However if this supplier is persistent, there is a red flag in that he wants to discuss things that he cannot put in writing, so we should report this infringement.\"\n  ],\n  \"category\": \"Ethics & Professionalism\",\n  \"id\": 58,\n  \"level\": 3\n },\n {\n  \"question\": \"What are the key financial statements that companies provide?\",\n  \"answer\": [\n   \"The key financial statements are:-\",\n   \"– Profit and loss accounts.\",\n   \"– Balance sheets.\",\n   \"– Cash flow statements.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 59,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between management and financial accounts?\",\n  \"answer\": [\n   \"Management accounts are for the internal use of the management team.\",\n   \"Financial accounts are the company accounts that are required by UK law.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 60,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between a profit and loss account and a balance sheet?\",\n  \"answer\": [\n   \"A profit and loss account shows the incomes and expenditures of a company and the resulting profit or loss.\",\n   \"The balance sheet shows what a company owns (it’s assets) and what it owes (it’s liabilities) at a given point in time.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 61,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a cashflow statement?\",\n  \"answer\": [\n   \"It is the summary of the actual or anticipated ingoing and outgoing of cash in a firm over the accounting period.\",\n   \"It measures the short-term ability of a firm to pay off its bills.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 62,\n  \"level\": 1\n },\n {\n  \"question\": \"Explain your understanding of the following Terminology?\",\n  \"answer\": [\n   \"Capital Allowances - Tax relief on certain items purchased for the business for example tools and equipment.\",\n   \"Sinking Finds – Funds that are set aside for future expense or long-term debt.\",\n   \"Insolvency – An inability to pay debts where liabilities exceed assets.\",\n   \"Companies House – An agency that incorporates and dissolves limited companies within the United Kingdom.\",\n   \"HMRC - Her Majesties Revenue and Customs.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 63,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Liquidity ratios?\",\n  \"answer\": [\n   \"Liquidity rations measure the ability of a company to pay off its current liabilities by converting its current assets into cash.\",\n   \"Liquidity ratio calculation = current assets / current liabilities.\",\n   \"The ratio is usually around 1.5 but it depends on the sector of activity.\",\n   \"For example house builders often operate on a liquidity ratio over 3 because they retain high value assets in the form of unsold houses.\",\n   \"A liquidity ratio of less than 0.75 can be an early indicator of insolvency.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 64,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Profitability ratios?\",\n  \"answer\": [\n   \"Profitability ratios measure the performance of a company in generating its profits.\",\n   \"The trading profit margin ratio = turnover – (cost of sales / turnover).\",\n   \"Low margins may be due to a growth strategy from the company and do not always result from bad management.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 65,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Financial Gearing Ratios?\",\n  \"answer\": [\n   \"These measure the financial structure of the company which are crucial indicators for the external suppliers of debt and equity as well as for internal management.\",\n   \"They help to measure solvency.\",\n   \"Highly geared companies rely mainly on borrowing.\",\n   \"The payment of interests reduces the profit.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 66,\n  \"level\": 1\n },\n {\n  \"question\": \"Why do chartered quantity surveyors need to understand and be able to interpret company accounts?\",\n  \"answer\": [\n   \"To aid in preparing their own business accounts.\",\n   \"For assessing the financial strength of contractors and those tendering for contracts.\",\n   \"For assessing competition.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 67,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of a P & L?\",\n  \"answer\": [\n   \"To monitor and measure profit (or loss).\",\n   \"To compare against past performance and against company budgets.\",\n   \"For valuation purposes and to compare against competitors.\",\n   \"To assist in forecasting with future performance.\",\n   \"To calculate taxation.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 68,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between debtors and creditors?\",\n  \"answer\": [\n   \"Creditors are business entities that are owed money by another entity that they have extended credit to.\",\n   \"For example if you have provided services to a client and they owe payment of your fees, you become a creditor to that client.\",\n   \"Debtors are business entities that owe money to another respective company.\",\n   \"For example if you have used a sub-consultant and still owe them payment of their fees then you become a debtor of the sub-consultant.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 69,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Management Accounts?\",\n  \"answer\": [\n   \"The accounts prepared by a company for internal management use.\",\n   \"Accounts prepared for a lender, such as a bank to evaluate how you will be able to repay the funding.\",\n   \"These accounts are not be audited externally.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 70,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Financial Statement?\",\n  \"answer\": [\n   \"Forecasts of income and expenditure that can be used as an analytical tool to identify potential shortfalls and surpluses.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 71,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Profit and Loss account?\",\n  \"answer\": [\n   \"They demonstrate a companies sales, running costs and profit or loss over a financial period (usually 1 year).\",\n   \"They are used to show sales vs expense (invoicing vs time and disbursements).\",\n   \"They can also be used to identify non-profitable work.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 72,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Balance Sheet?\",\n  \"answer\": [\n   \"They shows the value of everything the company owns made up of its assets and liabilities.\",\n   \"The balance sheet demonstrates the value of the business at any given point in time.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 73,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Cash Flow forecast?\",\n  \"answer\": [\n   \"A cash flow forecast summarises the amount of cash or cash equivalents entering and leaving a company or project entity.\",\n   \"On construction projects they usually show as an 'S' curve.\",\n   \"There is typically a small financial outlay at the start, a steep increase during the midway point and a taper towards the end.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 74,\n  \"level\": 1\n },\n {\n  \"question\": \"What is an S-Curve?\",\n  \"answer\": [\n   \"S-Curve means ‘standard’ and refers to the shape of the expenditure profile when shown in graphical form.\",\n   \"During the start of a project, the rate of expenditure is typically lower due to site setup and lower value enabling works.\",\n   \"As the scheme progresses to the middle of the programme, the rate of expenditure will typically increase as more expensive building components such as M&E and Structural Steel Work are installed.\",\n   \"Towards the back end of the programme, the rate of expenditure will slow down which is shown by the flattening of the S-Curve. S-Curve Example\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 75,\n  \"level\": 1\n },\n {\n  \"question\": \"How are these used by Surveyors?\",\n  \"answer\": [\n   \"To track, analyse and assess business accounts and performance.\",\n   \"For assessing the financial strength of contractors.\",\n   \"To compare actual progress of the work against pre-contract predictions.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 76,\n  \"level\": 2\n },\n {\n  \"question\": \"What are Escrow Accounts?\",\n  \"answer\": [\n   \"A sperate account owned by a third party, held on behalf of two other parties.\",\n   \"A bank account with defined contractual conditions for the release of funds.\",\n   \"They can be used as a project bank account.\",\n   \"Mechanisms must be in place for the release of funds such as payment certificates.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 77,\n  \"level\": 1\n },\n {\n  \"question\": \"When have you used company accounts in your work?\",\n  \"answer\": [\n   \"To assess the financial strength of contractors at Pre-Qualification Stage and tender stages.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 78,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you analyse a company’s accounts?\",\n  \"answer\": [\n   \"The client’s accountants will carry out the detailed analysis but I can look at the warning signs by calculating ratios such as liquidity ratios, profitability ratios and gearing ratios.\",\n   \"I should always calculate the ratios myself as those included in the company accounts may have been manipulated.\",\n   \"I should always use the group or consolidated accounts rather than the company accounts unless it is a limited company.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 79,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you carry out a credit check? Give an example.\",\n  \"answer\": [\n   \"I use the Credit Safe website to which my company subscribes to access a company’s accounts.\",\n   \"I considered both the group accounts and the company accounts.\",\n   \"If the credit rating is low, I calculate some key ratios and pass on all the information to my client’s accountants for them to analyse further.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 80,\n  \"level\": 2\n },\n {\n  \"question\": \"What are signs of insolvency in company accounts or credit checks?\",\n  \"answer\": [\n   \"A low credit rating.\",\n   \"A liquidity ratio below 0.75.\",\n   \"A falling working capital ratio suggesting that the company has taken on more contracts than it can finance.\",\n   \"A low return on equity.\",\n   \"A highly geared company that is heavily reliant on loans.\",\n   \"A falling cashflow statement.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 81,\n  \"level\": 1\n },\n {\n  \"question\": \"Why would you not recommend the appointment of a contractor with a low credit rating? .\",\n  \"answer\": [\n   \"There may be an increased risk of the contractor not performing satisfactorily.\",\n   \"It could present increased risk of the contractor failing to deploy sufficient resources and materials to the project.\",\n   \"It could increase the risk of the contractor’s insolvency.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 82,\n  \"level\": 3\n },\n {\n  \"question\": \"What measures would you recommend if your client wanted to appoint a contractor with a low credit rating?\",\n  \"answer\": [\n   \"I would explore the option of requesting a performance bond that my client could call on if they Main Contractor failed to perform.\",\n   \"I would also review the tender submission to ensure this is not excessively front loaded.\",\n   \"When reviewing interim valuations, I would ensure that these are accurate and not over claimed.\",\n   \"A project bank account may also provide an additional level of assurance and should be considered.\"\n  ],\n  \"category\": \"Accounting Principles\",\n  \"id\": 83,\n  \"level\": 2\n },\n {\n  \"question\": \"What are Porter’s five forces?\",\n  \"answer\": [\n   \"They are used to analyse the competitiveness of an industry and the barriers to entry.\",\n   \"These typically include:\",\n   \"– Substitute products.\",\n   \"– Bargaining power of suppliers.\",\n   \"– Bargaining power of customers.\",\n   \"– Rivalry amongst existing firms.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 84,\n  \"level\": 1\n },\n {\n  \"question\": \"How do companies write a business plan?\",\n  \"answer\": [\n   \"They undertake an analysis of the market and industry to identify business opportunities and critical success factors.\",\n   \"Companies should focus their resources in developing their competences in the critical success factors.\",\n   \"This then leads to the development of goals and objectives with their associated strategies and actions.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 85,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Client Account Planning session?\",\n  \"answer\": [\n   \"A review of current workload, resources & fees.\",\n   \"It involves the identification of key client personnel who have influence over job opportunities and identification of who the firm should look to build relationships with.\",\n   \"A review of pipeline opportunities with that client is also undertaken.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 86,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a Business Plan?\",\n  \"answer\": [\n   \"A formal statement of the business’s goals with reasons why they are thought to be attainable and the plan for reaching the goals.\",\n   \"The business plan also provides employers with a common ground to focus upon.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 87,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a SWOT analysis?\",\n  \"answer\": [\n   \"A SWOT analysis can be used to analyse the internal strengths and weaknesses and external threats and opportunities of a company.\",\n   \"This is carried out with a view to exploiting strengths and opportunities and mitigating weaknesses and threats.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 88,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a PEST analysis?\",\n  \"answer\": [\n   \"This is a structured method of analysing the key factors influencing market conditions.\",\n   \"These factors are:\",\n   \"– Political influences.\",\n   \"– Economical influences.\",\n   \"– Socio-demographical influences.\",\n   \"– Technological influences.\",\n   \"– Environmental influences.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 89,\n  \"level\": 1\n },\n {\n  \"question\": \"What is contained within an appointment document?\",\n  \"answer\": [\n   \"It includes a clarification of the work scope.\",\n   \"The agreed fee bid.\",\n   \"The firms terms of business.\",\n   \"Any agreed amendments to the firms’ terms of business.\",\n   \"Contact Details.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 90,\n  \"level\": 1\n },\n {\n  \"question\": \"Does your firm produce an annual account?\",\n  \"answer\": [\n   \"Yes it produces a statement of turnover, gross profit & net profit.\",\n   \"This must be submitted to Companies House in accordance with the Companies Act.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 91,\n  \"level\": 2\n },\n {\n  \"question\": \"Would you be able to interpret & understand an annual account?\",\n  \"answer\": [\n   \"At a high level but I would seek further advice from one of our internal Chartered Accountants if necessary.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 92,\n  \"level\": 3\n },\n {\n  \"question\": \"What are your firms Terms of Business?\",\n  \"answer\": [\n   \"Together with the Engagement Letter, the T&C's will form the contract between our Firm and the Client.\",\n   \"Our terms of business are made up of around 14 Sections including:\",\n   \"– Our firms General Obligations to the client which is to provide 'Services' detailed in the Engagement Letter with the skill, care and diligence expected of a professional person.\",\n   \"– The Client’s General Obligations for example they are not to solicit any Partner or Employee with a job offer, if this occurs they must pay £35,000.00 compensation.\",\n   \"– Additional Service terms for example this sets out the entitlement for additional fees if the work scope varies.\",\n   \"– My firms’ liability for example any claims raised are to be against the company and not any Partner or Employee.\",\n   \"– Payment terms and interest entitlement in the event of late payment.\",\n   \"– Termination and Suspension terms which have a minimum 7 days notice to suspend the works.\",\n   \"– Force Majeure terms for example the company is not liable for failure to carry out its service obligations if this occurs.\",\n   \"– Intellectual Property Rights relating to copyright of documents provided by the firm.\",\n   \"– Assignment and Subcontracting terms set out the requirements for written consent from other either party.\",\n   \"– Formal communication is to be in writing to the addresses set out within the Engagement Letter.\",\n   \"– Problems and Complaints handling procedures are included within the terms of business.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 93,\n  \"level\": 1\n },\n {\n  \"question\": \"What is your firms business plan?\",\n  \"answer\": [\n   \"Vision:- To create, enhance and sustain the world’s built, natural and social environments.\",\n   \"The current 10 year business plan is called [this will be specific to your firm].\",\n   \"Example goals you could reference include:\",\n   \"– Strong financial performance.\",\n   \"– Diversification.\",\n   \"– To become the Global Industry leader.\",\n   \"– To increase to a targeted percentage of market share.\",\n   \"– Expansion into new territories. o £X Turnover with % net profitability.\",\n   \"– Growth within certain sectors for example e-commerce logistics warehousing or data centers.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 94,\n  \"level\": 1\n },\n {\n  \"question\": \"How do you contribute to your company’s goals?\",\n  \"answer\": [\n   \"Focus on safety.\",\n   \"Maintain excellence in my work.\",\n   \"Sharing knowledge within integrated teams.\",\n   \"Keeping up with new technologies.\",\n   \"Upskilling new and junior team members.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 95,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you think an up to date business plan can help an organisation in the current economic climate?\",\n  \"answer\": [\n   \"To support with gaining additional investment, funding or finance.\",\n   \"To gain new instructions from new and existing clients.\",\n   \"The business plan will help focus on key priorities.\",\n   \"It allows the organisation to respond to change.\",\n   \"For budgeting purposes.\",\n   \"To support with recovery from Covid-19.\",\n   \"To facilitate the setting of targets for staff.\"\n  ],\n  \"category\": \"Business Planning\",\n  \"id\": 96,\n  \"level\": 2\n },\n {\n  \"question\": \"What is client care?\",\n  \"answer\": [\n   \"The principle of client care is looking after the clients’ best interests and providing an appropriate level of service that satisfies the client’s needs and achieves VfM.\",\n   \"Client care can be provided through:\",\n   \"– Professionalism.\",\n   \"– Competence.\",\n   \"– Punctuality.\",\n   \"– Trust.\",\n   \"– Reliability.\",\n   \"– Presentation.\",\n   \"– Regular communication.\",\n   \"– Review of services provided and standard.\",\n   \"– KPIs to monitor client satisfaction.\",\n   \"– Client Performance Feedback.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 97,\n  \"level\": 1\n },\n {\n  \"question\": \"Why is Client Care important for surveying firms?\",\n  \"answer\": [\n   \"The majority of work is developed through repeat business from existing clients.\",\n   \"Therefore, it is important not only for the client to achieve their requirements but also for the company to encourage repeat businesses where possible.\",\n   \"Providing that the Client’s satisfaction is maintained, positive testimonials can be achieved and word of mouth recommendations will be generated.\",\n   \"However dissatisfied Clients can be very damaging as negative feedback and experiences can spread quickly.\",\n   \"Providing excellent client care can also reduce the potential for negligence claims to arise.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 98,\n  \"level\": 2\n },\n {\n  \"question\": \"What is CPF?\",\n  \"answer\": [\n   \"Client performance feedback is the process of gathering and acting on feedback from the client. This comprises:\",\n   \"– Gathering feedback during and after project completion.\",\n   \"– This is usually carried out by an independent person.\",\n   \"– The feedback sets the standards for the company and identifies areas for improvement.\",\n   \"– It encourages open discussions with the client to ensure satisfactory service is delivered and that goals are achieved.\",\n   \"– It also provides an opportunity to gain future work for the company.\",\n   \"– CPF is usually carried out at regular intervals (3-6 months) to ensure any problems can be identified and rectified as early as possible.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 99,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you identify the needs of a client?\",\n  \"answer\": [\n   \"I would look to achieve this by holding Client Account Planning Sessions.\",\n   \"Each client & project is different & their needs would be assessed on their own merit, this could be achieved by:-\",\n   \"– Holding discussions regarding project key deliverables & the scope of services required.\",\n   \"– Reviewing past CPF scores & identifying key areas for improvement.\",\n   \"– Reviewing any complaints to identify mistakes and best practice methods of working.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 100,\n  \"level\": 3\n },\n {\n  \"question\": \"What is a Client Brief?\",\n  \"answer\": [\n   \"The purpose of the client brief is to provide a firm foundation for the initiation of the project.\",\n   \"It is a formal statement of the objectives and functional and operational requirements of the finished project.\",\n   \"It should be in sufficient detail to enable the integrated project team to execute the specification and detailed design of the work and is therefore an essential reference for the team.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 101,\n  \"level\": 1\n },\n {\n  \"question\": \"Please provide an example of your client care & empathy skills?\",\n  \"answer\": [\n   \"Despite working on multiple commissions I always try to ensure that I prioritise each client’s needs accordingly.\",\n   \"My approach is to always make the client feel like their project is the only commission I am working on.\",\n   \"Through organisation and communication I can meet the deliverables of each client in advance of the agreed deadlines and am always sure to deliver work to a high standard.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 102,\n  \"level\": 2\n },\n {\n  \"question\": \"When should you decline an instruction of new work from a client?\",\n  \"answer\": [\n   \"If there is a Conflict of Interest.\",\n   \"If the appointment is would not be in the clients’ best interests.\",\n   \"My firm may not be able to resource the job adequately.\",\n   \"If the project is outside of my skillset.\",\n   \"If the work was unlawful.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 103,\n  \"level\": 1\n },\n {\n  \"question\": \"What do you need to consider when using preparing a fee bid?\",\n  \"answer\": [\n   \"My firm has its own procedure for preparing fee submissions, this comprises:-\",\n   \"– Finding out what the client’s requirement are and identifying whether this is a service that we provide.\",\n   \"– A bid or no bid form is populated to identity if this is suitable for the business by considering the risks involved.\",\n   \"– There are varying levels of sign off depending on fee value prior to submission.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 104,\n  \"level\": 2\n },\n {\n  \"question\": \"What makes up a fee bid proposal?\",\n  \"answer\": [\n   \"The Executive Summary including reference to the Scope & Solution.\",\n   \"Identification of the Client’s needs & key deliverables.\",\n   \"Identification and analysis of Project issues.\",\n   \"Communication of key Benefits for the Clients.\",\n   \"References to relevant experience.\",\n   \"The Conditions of engagement.\",\n   \"A Methodology.\",\n   \"An Organogram.\",\n   \"The proposed fees.\",\n   \"Supporting CVs.\",\n   \"References to the project programme.\",\n   \"Identification of sub consultants.\",\n   \"A List of quality assurance procedures\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 105,\n  \"level\": 2\n },\n {\n  \"question\": \"How would you limit the risk of working with a client who may be financially unstable?\",\n  \"answer\": [\n   \"I would use a screening process to check the client’s finances, this could include:-\",\n   \"– A company search using the Companies House website to obtain their account information.\",\n   \"– A Dun & Bradstreet or credit safe credit check.\",\n   \"– An Internet search using their website for additional information and to make a judgement on their reliability. If your client asked you to lower your fees because of their limited funding, what would you do?\",\n   \"The client would have to pay the required price for the level of service required or reduce the scope of works involved.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 106,\n  \"level\": 3\n },\n {\n  \"question\": \"How would you calculate a fee proposal?\",\n  \"answer\": [\n   \"I would review the work involved with the commission based on the level of information available.\",\n   \"I would calculate the time & number of individuals required to undertake the work & multiply it by an hourly rate adding a suitable allowance for over heads and profits.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 107,\n  \"level\": 3\n },\n {\n  \"question\": \"What is your company’s procedure for client’s feed-back?\",\n  \"answer\": [\n   \"We undertake formal project reviews with the client every two months.\",\n   \"In my day-to-day involvement with the client I look to obtain regular informal feed-back through verbal and email communication.\",\n   \"We undertake a satisfaction survey questionnaire at the end of each project.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 108,\n  \"level\": 1\n },\n {\n  \"question\": \"What is your company’s procedure for complaint handling?\",\n  \"answer\": [\n   \"The RICS specifies 2 stages as a minimum:\",\n   \"– Stage 1 – The complaint in the first instance is reported to a Senior Member of the firm or the designated complaints handler.\",\n   \"– Stage 2 – If the complaint cannot be resolved this is referred to the independent redress mechanism.\",\n   \"The person is invited to make a complaint in writing to our designated complaint handler who will investigate the complaint with all parties involved and advise the complainant of any action taken within 21 days.\",\n   \"If the complainant is not satisfied, the complaint is escalated to the Regional Managing Director who will take action and respond within 21 days.\",\n   \"Should the complainant remain dissatisfied, the matter can be escalated to the RICS independent redress mechanism.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 109,\n  \"level\": 1\n },\n {\n  \"question\": \"How do you identify your client’s needs and expectations?\",\n  \"answer\": [\n   \"I am always sure to ask questions and listen to the client on key challenges and issues they are facing.\",\n   \"I also use client’s briefing checklists where applicable.\",\n   \"There have been times when I have not received an adequate briefing from the client and in these instances I am sure to ask for further clarification on their specific requirements.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 110,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you establish trust with a new client?\",\n  \"answer\": [\n   \"I am transparent and honest about my actions at all times.\",\n   \"I learn about my client and their long term objectives in addition to key challenges they are facing.\",\n   \"I only act inside the parameters of my level of expertise and competence.\",\n   \"I always act in a professional manner.\",\n   \"I always provide a high level of service.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 111,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you encourage repeat business?\",\n  \"answer\": [\n   \"I provide high levels of service and customer care during projects.\",\n   \"I regularly obtain feedback and act on it.\",\n   \"By dealing with complaints honestly and effectively.\",\n   \"Through keeping in touch with clients even when we have no live projects with them.\",\n   \"Organising business development activities such as social events or CPD’s.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 112,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the advantages & disadvantages of working from a client’s office?\",\n  \"answer\": [\n   \"The advantages are quicker and clearer lines of communication.\",\n   \"A better understanding of the client’s culture, needs and expectations can be determined.\",\n   \"The disadvantages are the loss of technical support from colleagues and a possible isolation from my own organisation’s culture.\"\n  ],\n  \"category\": \"Client Care\",\n  \"id\": 113,\n  \"level\": 1\n },\n {\n  \"question\": \"Which forms of communication are you aware of?\",\n  \"answer\": [\n   \"Verbal either in person or via telephone.\",\n   \"Non-verbal such as body language, eye contact, gestures and appearance.\",\n   \"Written for example e-mails and letters.\",\n   \"Graphical information such as charts, diagrams and tables.\",\n   \"Presentations.\",\n   \"Video conference.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 114,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the barriers to effective communication?\",\n  \"answer\": [\n   \"Verbal mono tone delivery or unclear delivery of speech.\",\n   \"The over use of technical language that may not be understood by lay clients.\",\n   \"Emotionally charged and heated conversations when parties are unable to listen.\",\n   \"International language barriers.\",\n   \"Disinterest and boredom.\",\n   \"Prejudice.\",\n   \"Bias.\",\n   \"Interruptions and distractions.\",\n   \"Background noise pollution.\",\n   \"Poor call quality.\",\n   \"Poorly maintained and adversarial relationships.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 115,\n  \"level\": 1\n },\n {\n  \"question\": \"Please explain to me your approach when negotiating in challenging circumstances?\",\n  \"answer\": [\n   \"In the first instance I undertake detailed research on the matters under consideration and form an opinion.\",\n   \"I will then look to compile supporting documentation as substantiation to any claims.\",\n   \"Following these initial steps I arrange an internal meeting with the client and project team to discuss negotiable items which can be conceded in addition to the non-negotiable items.\",\n   \"If needed I will prepare a SWOT analysis to support decision making.\",\n   \"During negotiations I try to develop a partnering approach rather than an adversarial one.\",\n   \"My attitude and ethos is that the project must be the winner not individuals.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 116,\n  \"level\": 2\n },\n {\n  \"question\": \"What makes a successful negotiation?\",\n  \"answer\": [\n   \"Preparation and collating supporting documentation.\",\n   \"Each party should get the chance to present their case in a calm forum.\",\n   \"Identification of bargaining positions and politely making proposals.\",\n   \"A swift confirmation in writing on what was agreed at the meeting and confirmation on what items still need to be actions and by whom.\",\n   \"A confirmation of next steps to bring the negotiations to a close.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 117,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the key steps when preparing for a negotiation?\",\n  \"answer\": [\n   \"The key steps I have undertaken previously have included:-\",\n   \"1) Claim notification – Where the heads of claim are notified to the parties involved with notification out what claim items are being sought with general setting of the scene prior to the meeting.\",\n   \"2) Internal research and preparation – Where both parties undertake research and planning with initial responses being issued. Concession items and non negotiable items are usually identified internally within each team with planning of strategy & role’s being allocated prior to the meeting.\",\n   \"3) Organisation of the meeting - The time and venue for the negotiation meeting will be arranged followed by the actual meeting itself.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 118,\n  \"level\": 1\n },\n {\n  \"question\": \"What happens during a negotiation meeting?\",\n  \"answer\": [\n   \"Both parties should be allowed to discuss their position on the claim items being discussed and their reasoning for their position.\",\n   \"All parties should look to maintain professionalism, remain calm, acting with respect and courtesy at all times.\",\n   \"The meeting should take place ideally in a calm setting.\",\n   \"Both parties should honor the agreements reached for the benefit of the project.\",\n   \"Once the negotiation items are agreed they should be put in writing as soon as possible.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 119,\n  \"level\": 2\n },\n {\n  \"question\": \"Please provide an example of when you had to handle difficult negotiations.\",\n  \"answer\": [\n   \"This will be specific to your own experience.\",\n   \"As an example:\",\n   \"– On the Birmingham Brindley Place project, a design item contained within a tender pack was not priced by the contractor.\",\n   \"– During the works, this became apparent as a missed item by the contractor but was not clearly referenced within the design information.\",\n   \"– The Contractor claimed 100% for the costs for work.\",\n   \"– I negotiated to a 50/50 position as the contractor should have priced the design item however this should have been more clearly identified within the design pack.\",\n   \"– Rather than expending time calculating the difference we reach a common ground to maintain relationships.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 120,\n  \"level\": 2\n },\n {\n  \"question\": \"Please provide an example of your oral communication skills.\",\n  \"answer\": [\n   \"I have been responsible for providing a number of professional presentations.\",\n   \"I have held site meetings with the contractor to discuss various issues & presented monthly reports within the meeting.\",\n   \"I also use my oral communication and written communication skills when dealing with day-to-day issues on the phone, within meetings and on video call.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 121,\n  \"level\": 2\n },\n {\n  \"question\": \"What are your thoughts on using e-mail as a form of communication?\",\n  \"answer\": [\n   \"E-mails carry the same legal value as a letter and contracts can be inadvertently created by e-mail.\",\n   \"We must therefore be very careful with regards to the content and form of the e-mail communication.\",\n   \"When issuing e-mails it is easy to become complacent as they are perceived as being informal.\",\n   \"I am always sure to communicate in a professional manner even if other parties do not.\",\n   \"I always make sure that I select the correct recipient and do not release someone’s e-mail addresses without their consent.\"\n  ],\n  \"category\": \"Communication & Negotiation\",\n  \"id\": 122,\n  \"level\": 1\n },\n {\n  \"question\": \"Name some different forms of Alternative Dispute Resolution?\",\n  \"answer\": [\n   \"Mediation.\",\n   \"Conciliation.\",\n   \"Negotiation.\"\n  ],\n  \"category\": \"Conflict Avoidance & Dispute Resolution\",\n  \"id\": 123,\n  \"level\": 1\n },\n {\n  \"question\": \"Name some formal methods of dispute resolution?\"
