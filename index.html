 Economics & Cost Planning\",\n  \"id\": 263,\n  \"level\": 2\n },\n {\n  \"question\": \"How does the payback period method work?\",\n  \"answer\": [\n   \"It judges an investment in terms of the time period over which the invested sum is returned in cost savings.\",\n   \"The increased expenditure on a higher quality component is viewed as the ‘investment’ and the savings provided in the form of future costs is viewed as the ‘revenue’.\",\n   \"The best option would be the one that repaid the investment in the shortest time.\"\n  ],\n  \"category\": \"Design Economics & Cost Planning\",\n  \"id\": 264,\n  \"level\": 2\n },\n {\n  \"question\": \"What sort of materials is the payback period method used for?\",\n  \"answer\": [\n   \"This is often used to evaluate the options for incorporating sustainable technologies.\",\n   \"It is considered suitable for elements that have a very high initial capital cost but will ‘pay back’ this initial investment over a period of time in terms of reduced running costs.\"\n  ],\n  \"category\": \"Design Economics & Cost Planning\",\n  \"id\": 265,\n  \"level\": 2\n },\n {\n  \"question\": \"Why might a client accept higher capital costs?\",\n  \"answer\": [\n   \"For prestige reasons.\",\n   \"When considering that the replacement or repair may be inconvenient even if the solution is cheaper.\"\n  ],\n  \"category\": \"Design Economics & Cost Planning\",\n  \"id\": 266,\n  \"level\": 2\n },\n {\n  \"question\": \"How would you create a cashflow forecast?\",\n  \"answer\": [\n   \"I would need to have access to the construction programme and contract sum analysis in order to populate the cashflow.\",\n   \"The values associated with each element of construction could be forecasted at times to reflect their installation within the programme.\",\n   \"I would split the works into the different packages as shown on the contract programme and include individual s-curves for each package.\",\n   \"Obtaining drawdown schedules from specialist subcontractors and professional consultants can also assist when populating the cashflow.\",\n   \"An alternative approach would be to utilise a previous cashflow from a similar scheme or to use cashflow forecasting software although this may not be as accurate. If your construction budget was £2.5m and proposed construction period was 25 weeks, would a forecast cashflow expenditure of £100,000 per week be realistic?\",\n   \"In reality this would not be very realistic as the cashflow expenditure per week is unlikely to have a flat or regular profile.\",\n   \"In reality the expenditure is much more likely to have an S-curve profile where at the start of the scheme, the expenditure per week will be fairly low as the site setup and enabling works are undertaken.\",\n   \"As the scheme progresses, items that are of higher value such as the steel frame and M&E installations will be undertaken. The cost expenditure per week at this stage will be much higher than at the start of the scheme.\",\n   \"As the scheme draws to a close, minor finishing items such as decoration and cleaning packages will be undertaken again resulting in a lower expenditure cost per week.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 267,\n  \"level\": 3\n },\n {\n  \"question\": \"What is the benefit of a cashflow forecast?\",\n  \"answer\": [\n   \"A cashflow forecast allows the employer to gain an understanding of the financial requirements over the duration of the project duration and setup any funding requirements for the scheme in advance.\",\n   \"It can also act as a check against valuations and provide an early indication of financial difficulties if the actual expenditure is lagging behind the forecast.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 268,\n  \"level\": 1\n },\n {\n  \"question\": \"What would you include within a financial report?\",\n  \"answer\": [\n   \"I would typically look to include reference to:\",\n   \"– a) Contract sum total.\",\n   \"– b) The value of Instructed variations.\",\n   \"– c) The value of potential future variations.\",\n   \"– d) Ongoing claims.\",\n   \"– e) Provisional Sum Adjustments.\",\n   \"– e) The anticipated final account total.\",\n   \"– f) The total of certified payments.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 269,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of a financial report?\",\n  \"answer\": [\n   \"To report against budgeted values and act as a working cost check on the project budget.\",\n   \"To give the Client an understanding of any savings or additional monies required.\",\n   \"To report contract progress compared against pre-contract predictions.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 270,\n  \"level\": 1\n },\n {\n  \"question\": \"What are variations?\",\n  \"answer\": [\n   \"Alterations or modifications to the design, quality or quantity of the contract works or to the site access or working conditions.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 271,\n  \"level\": 1\n },\n {\n  \"question\": \"Why might they arise?\",\n  \"answer\": [\n   \"a) change to specification.\",\n   \"b) discrepancies between contract documents.\",\n   \"c) discrepancies with statutory requirements.\",\n   \"d) errors and omissions.\",\n   \"e) deficiencies in employer’s requirements.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 272,\n  \"level\": 2\n },\n {\n  \"question\": \"What form must architect’s instructions take?\",\n  \"answer\": [\n   \"It is best practice under the majority of contracts for instructions to be made in writing.\",\n   \"The QS is not usually authorised to make additions to the contract sum for instructions that are not in written form.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 273,\n  \"level\": 2\n },\n {\n  \"question\": \"What about oral instructions?\",\n  \"answer\": [\n   \"The validity of oral instructions depends on whether the form of contract being used contains mechanisms for them to be valid.\",\n   \"For example within the JCT Standard Building Contract (SBC):-\",\n   \"– Where the Contract Administrator issues an instruction otherwise than in writing, it shall be of no immediate effect\",\n   \"– But the Contractor shall confirm in writing receipt of the verbal instruction within 7 days.\",\n   \"– If the Contract Administrator does not dissent by notice to the Contractor within 7 days from receiving the contractors confirmation, it shall take effect as from the expiry of the latter 7 day period.\",\n   \"In my opinion it is always best practice to follow up verbal instructions with written instructions as soon as possible.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 274,\n  \"level\": 2\n },\n {\n  \"question\": \"Can the contractor object to a variation?\",\n  \"answer\": [\n   \"Some contracts allow the contractor to object to an instruction in special circumstances for example:-\",\n   \"In the JCT Standard Building Contract the requirement to comply with a valid instruction is subject to certain exceptions, where:-\",\n   \"– Where the instruction might affect the efficacy of the design of the Contractors Designed Portion.\",\n   \"– Where the instruction might affect the contractor’s compliance with the CDM Regulations.\",\n   \"– Where the instruction may infringe patent rights.\",\n   \"– Where the instruction relates to a named specialist, and the contractor is unable to enter into a contract with that firm.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 275,\n  \"level\": 2\n },\n {\n  \"question\": \"What can the architect do if the contractor does not comply with an instruction?\",\n  \"answer\": [\n   \"This depends on the form of contract being used however under JCT Suites if the contractor does not follow an instruction, the architect will be required to issue a 'notice to comply' to the contractor.\",\n   \"If the Contractor still fails to comply, the architect can instruct another party to carry out the work and the contractor will be liable for any additional costs incurred.\",\n   \"In this circumstance it is important to record the costs and obtain a range of quotations.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 276,\n  \"level\": 3\n },\n {\n  \"question\": \"What 3 methods are there of obtaining a cost for variations under JCT forms of Contract?\",\n  \"answer\": [\n   \"This depends on the form of contract being used, under JCT SBC, quotations can be made by:-\",\n   \"– Agreement between the employer and contractor.\",\n   \"– A schedule 2 quotation.\",\n   \"– Valuation by the QS under the valuation rules.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 277,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the time periods for Schedule 2 quotations under JCT SBC?\",\n  \"answer\": [\n   \"– The architect should request via issue of an AI.\",\n   \"– The contractor has 7 days to notify that they will not provide one.\",\n   \"– If not, they have 21 days to provide the quotation.\",\n   \"– The architect then has 7 days to confirm in writing the acceptance or rejection.\",\n   \"– The acceptance is called the ‘confirmed acceptance’.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 278,\n  \"level\": 1\n },\n {\n  \"question\": \"What costs does the schedule 2 quotation contain?\",\n  \"answer\": [\n   \"Value of the work.\",\n   \"Any adjustment of time.\",\n   \"Money in lieu of direct loss and expense.\",\n   \"The fair and reasonable cost of preparing the quotation.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 279,\n  \"level\": 2\n },\n {\n  \"question\": \"What costs is the contractor entitled to if the schedule 2 quotation is rejected?\",\n  \"answer\": [\n   \"The fair and reasonable cost of preparing the quote, as long as the quote itself was fair and reasonable.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 280,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the valuation rules under JCT Forms of Contract?\",\n  \"answer\": [\n   \"There are three rules for measurable work:-\",\n   \"– If it is of a similar character, quantity and in the same conditions as existing work, then the bill rates should be used.\",\n   \"– If it is of a similar character, but different quantity or conditions, the bill rates should be used as a basis but a fair allowance should be made to take account of the difference.\",\n   \"– If it is not of a similar character, fair rates and prices should be used.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 281,\n  \"level\": 1\n },\n {\n  \"question\": \"What about non-measurable work?\",\n  \"answer\": [\n   \"This would typically be valued by the dayworks procedure based on the cost of labour, plant and materials that have been incurred.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 282,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a star rate?\",\n  \"answer\": [\n   \"A rate that is based on the bill rates but includes a fair allowance.\",\n   \"To deviate away from the bill rates there must be a reason as to why the star rate is being adopted.\",\n   \"This may be because the conditions on site for installation are more complicated that first envisaged.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 283,\n  \"level\": 1\n },\n {\n  \"question\": \"What are ‘fair rates and prices’?\",\n  \"answer\": [\n   \"A market rate.\",\n   \"A rate based on actual costs.\",\n   \"A rate in line with current cost data.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 284,\n  \"level\": 1\n },\n {\n  \"question\": \"What are dayworks?\",\n  \"answer\": [\n   \"The prime (actual) cost of all the materials, labour and plant used in carrying out the work, along with a percentage additions to each category as set out in the contract.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 285,\n  \"level\": 1\n },\n {\n  \"question\": \"What document should the prime cost be calculated in accordance with?\",\n  \"answer\": [\n   \"This should be calculated in accordance with the ‘Definition of the Prime Cost of daywork carried out under Building Contracts’ published by the RICS.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 286,\n  \"level\": 2\n },\n {\n  \"question\": \"What information is necessary to be able to assess dayworks?\",\n  \"answer\": [\n   \"Vouchers showing the amount of time spent on each activity (dayworks sheets).\",\n   \"Names of the workmen.\",\n   \"Plant and materials used.\",\n   \"This information should be given to the architect or authorised person at the end of the week for verification. Can the QS alter hours which he considers to be excessive on a dayworks sheet that is authorised by the architect?\",\n   \"No the hours recorded and signed off should be maintained within the variation.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 287,\n  \"level\": 2\n },\n {\n  \"question\": \"What would you do if the contractor submitted 10 dayworks sheets to you for payment?\",\n  \"answer\": [\n   \"I would verify with the architect that a relevant variation has occurred and is recorded on an Architects Instruction.\",\n   \"I would check to ensure there is no other contractual method of valuing the variation.\",\n   \"Providing the Architects Instruction is in place and no other mechanism for valuation is available I would seek verification of the hours and materials.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 288,\n  \"level\": 3\n },\n {\n  \"question\": \"If you and the contractor’s QS could not agree on something how would you resolve it?\",\n  \"answer\": [\n   \"I would discuss with the partner and client to try and seek a resolution with the contractor.\",\n   \"The contractor could take the dispute to adjudication if necessary but all parties should try and resolve the matter by negotiation in the first instance.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 289,\n  \"level\": 3\n },\n {\n  \"question\": \"What is quantum meruit?\",\n  \"answer\": [\n   \"This translates to ‘what he deserves’ for example fair and reasonable costs that have been incurred.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 290,\n  \"level\": 1\n },\n {\n  \"question\": \"Give an example of where it might be used\",\n  \"answer\": [\n   \"If the employer and contractor reach a separate agreement on acceleration, the costs of this may be based on a ‘fair and reasonable’ basis.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 291,\n  \"level\": 2\n },\n {\n  \"question\": \"What is loss and or expense under JCT Forms of Contract?\",\n  \"answer\": [\n   \"L&E reimburses the contractor for direct loss and/or expense incurred in carrying out additional work or from an employer’s breach of contract.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 292,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the procedures for claiming loss and expense under JCT Forms of Contract?\",\n  \"answer\": [\n   \"As soon as the regular progress of the work is affected, or is likely to be affected, or the contractor becomes aware of any other matter that would cause them to incur loss and expense, they should notify the architect in writing.\",\n   \"The contractor should submit any further information as requested by the architect.\",\n   \"The contractor should also submit any further information as requested by the Architect or QS to enable the amount of loss and expense to be ascertained.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 293,\n  \"level\": 1\n },\n {\n  \"question\": \"What are Relevant Matters under JCT Forms of Contract?\",\n  \"answer\": [\n   \"Events listed in the Contract that entitle the contractor to loss and/or expense.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 294,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the relevant matters?\",\n  \"answer\": [\n   \"There are 5 relevant matters:-\",\n   \"– Variations.\",\n   \"– Instructions.\",\n   \"– Execution of an approximate quantity that was not a reasonably accurate forecast of quantity.\",\n   \"– Suspension by the contractor for non-payment.\",\n   \"– Any impediment, prevention or default by the employer.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 295,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the key thing to remember when assessing loss and expense claims?\",\n  \"answer\": [\n   \"It should be the actual loss incurred by the contractor.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 296,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the common heads of claim in loss and expense applications?\",\n  \"answer\": [\n   \"Prolongation.\",\n   \"Thickening of preliminaries for example extra supervision required due to variations.\",\n   \"Disruption causing plant or labour to be underemployed.\",\n   \"Increases in labour or material costs during the period of delay.\",\n   \"Head office overheads.\",\n   \"Loss of profit.\",\n   \"Finance charges.\",\n   \"Acceleration costs.\",\n   \"Claim preparation costs.\"\n  ],\n  \"category\": \"Project Financial Control & Cost Reporting\",\n  \"id\": 297,\n  \"level\": 1\n },\n {\n  \"question\": \"When were the New Rules of Measurement published?\",\n  \"answer\": [\n   \"1st May 2009.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 298,\n  \"level\": 1\n },\n {\n  \"question\": \"Why were the New Rules of Measurement introduced?\",\n  \"answer\": [\n   \"The previous Standard Method of Measurement (SMM7) was purely designed for the production of bill of quantities for tender purposes.\",\n   \"This resulted in a lack of guidance and uniformity around preparing cost estimates and cost plans when using SMM7.\",\n   \"The NRM was introduced to provide a common and consistent basis for the production of order of cost estimates and cost plans and to give Employers more confidence around their inclusions.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 299,\n  \"level\": 2\n },\n {\n  \"question\": \"Why should you use the New Rules of Measurement?\",\n  \"answer\": [\n   \"The NRM provides a common and consistent basis for the production of order of cost estimates and cost plans.\",\n   \"This provides added confidence to Employers.\",\n   \"In the event that a QS or firm is pursued for negligence, the use of NRM would provide a means of defense as it represents best practice.\",\n   \"QS’s are not required to follow the NRM if they judge it as unsuitable for their specific project but they must have a good reason as to why this approach has been taken.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 300,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the NRM 1?\",\n  \"answer\": [\n   \"The RICS New Rules of Measurement 1 is the Order of Cost Estimating and Elemental Cost Planning.\",\n   \"This provides a structured basis for measuring building works and for the production of Cost Estimates and Cost Plans.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 301,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the structure of the NRM 1?\",\n  \"answer\": [\n   \"The key sections of NRM1 are:\",\n   \"– Part 1: General introduction explaining the purpose of the document and how it should be used.\",\n   \"– Part 2: Measurement rules for the production of order of cost estimates.\",\n   \"– Part 3: Measurement rules for the production of elemental cost plans.\",\n   \"– Part 4: Tabulated rules of measurement for elemental cost planning.\",\n   \"– Appendices: With references to the definitions for GIA, functional units, NIA, elemental breakdowns, templates and general information required for cost plan production.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 302,\n  \"level\": 1\n },\n {\n  \"question\": \"What is meant by the abbreviation GEA?\",\n  \"answer\": [\n   \"Gross External Area.\",\n   \"This is the area of the building measured externally at each floor level.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 303,\n  \"level\": 1\n },\n {\n  \"question\": \"What is meant by the abbreviation GIA?\",\n  \"answer\": [\n   \"Gross Internal Area.\",\n   \"This is the area of the building measured to the internal face of the perimeter wall at each floor level.\",\n   \"The GIA excludes external open sided balconies, fire escapes, canopies, external walls and fuel stores.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 304,\n  \"level\": 1\n },\n {\n  \"question\": \"What is meant by the abbreviation NIA?\",\n  \"answer\": [\n   \"Net Internal Area.\",\n   \"This is the area of usable space measured to the internal face of the perimeter wall at each floor level.\",\n   \"The NIA excludes internal structural walls and columns, spaces with headroom less than 1.5m, permanent lift lobbies, toilets, cleaners’ cupboards and plant rooms.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 305,\n  \"level\": 1\n },\n {\n  \"question\": \"Where are all of these abbreviations defined?\",\n  \"answer\": [\n   \"The Code of Measuring Practice published by the RICS.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 306,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of the Code of Measuring Practice?\",\n  \"answer\": [\n   \"The Code of Measuring Practice provides precise definitions to permit the accurate and consistent measurement of buildings.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 307,\n  \"level\": 1\n },\n {\n  \"question\": \"What would you expect the percentage of NIA to GIA to be?\",\n  \"answer\": [\n   \"The percentage would depends on the type of project being undertaken for example whether this was a school, hospital or office.\",\n   \"In the case of an office building, I would expect the NIA to GIA percentage to be in the region of 70- 85%.\",\n   \"Where 70% is considered as relatively inefficient, a percentage of 85% is extremely efficient.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 308,\n  \"level\": 2\n },\n {\n  \"question\": \"What do you measure in accordance with?\",\n  \"answer\": [\n   \"The method of measurement to be adopted depends on the region, project and client that I am working with, for example in the United Kingdom in the Building sector, typically the New Rules of Measurement would apply.\",\n   \"However if working on Rail or Civils projects it is more common practice for the Civil Engineering Standard Method of Measurement to be adopted.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 309,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you measure structural steelwork under NRM 2 and what other items would you measure in association?\",\n  \"answer\": [\n   \"The measurement rules for Structural Steelwork are contained within section 15.\",\n   \"Steelwork members are to be measured in tonnes and itemised according to their respective lengths, weight and type for example:-\",\n   \"– Lengths ▪ Lengths not exceeding 1.00m. ▪ Lengths over 1.00m but not exceeding 9.00m. ▪ Lengths exceeding 9.00m.\",\n   \"– Weights ▪ Weight not exceed 25kg/m. ▪ Weight between 25-50kg/m. ▪ Weight between 50-100kg/m.\",\n   \"– Type ▪ Columns. ▪ Beams. ▪ Rafters. ▪ Bracing. ▪ Purlins and cladding rails.\",\n   \"Other items to measure in association with steelwork include framing erection, permanent formwork, cold rolled purlins and cladding rails, isolated structural member, filing hollow sections, surface preparation, surface treatment and localised protective coatings.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 310,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you measure brickwork walls under NRM and what other items would you measure in association?\",\n  \"answer\": [\n   \"The measurement rules for Masonry are contained within section 14.\",\n   \"Masonry walls are to be measured in m2 with them being itemised according to wall thickness, type of construction and method of formation for example:-\",\n   \"Other items to measure in association with masonry include\",\n   \"– Chimney stacks.\",\n   \"– Arches.\",\n   \"– Brick reinforcement.\",\n   \"– Forming cavities.\",\n   \"– Closing cavities.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 311,\n  \"level\": 2\n },\n {\n  \"question\": \"What is the purpose of a BoQ?\",\n  \"answer\": [\n   \"The purpose of the BoQ is to provide the estimator with an accurate picture of the scope of works and to provide a common and consistent basis for pricing.\",\n   \"Following receipt of Tender submissions, the BoQ also forms the basis of the Tender Analysis allowing an accurate like for like comparison to be undertaken.\",\n   \"Throughout the post contract stages it also provides the basis for the valuation rules of the contract for valuing variation items.\",\n   \"It also enables the contract works to be assessed and valued for the purposes of interim payment.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 312,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you prepare a BoQ?\",\n  \"answer\": [\n   \"I would meet with the design team to establish when the necessary information will be available, it is important to ensure the information provided is full and final to avoid abortive works.\",\n   \"Following this I would look to compile all information necessary from the Design Team including:-\",\n   \"– Drawings.\",\n   \"– Specifications.\",\n   \"– Schedules.\",\n   \"– Document Registers.\",\n   \"Following receipt of the information I would check to see if the information is sufficient to allow the BoQ to be complied. This largely depends on the form of contract for example under remeasurement forms the information does not have to be complete but must be substantially complete.\",\n   \"I would discuss and agree with the client and design the method of measurement to be adopted.\",\n   \"Prior to commencement of measurement and taking off quantities, I would consider the size of the Project and break the works down into sections and areas for example:-\",\n   \"– Substructure.\",\n   \"– Superstructure.\",\n   \"– External Works.\",\n   \"I would then commence Take-off & work from the Substructure upwards.\",\n   \"When measuring is complete I would look to address the general items section & any preambles.\",\n   \"Following BoQ production I would carry out regular meetings and review any updated drawings to ensure that no works items had been missed or overlooked between packages.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 313,\n  \"level\": 3\n },\n {\n  \"question\": \"How would you structure a BoQ?\",\n  \"answer\": [\n   \"In accordance with an elemental breakdown structure under NRM 2, I would include the following sections:-\",\n   \"– Preliminaries (Main Contract).\",\n   \"– Facilitating Works.\",\n   \"– Substructure.\",\n   \"– Superstructure.\",\n   \"– Internal Finishes.\",\n   \"– Fittings, Furnishings and Equipment.\",\n   \"– Services.\",\n   \"– External Works.\",\n   \"– Provisional Sums.\",\n   \"– Dayworks.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 314,\n  \"level\": 3\n },\n {\n  \"question\": \"How would you describe the preliminaries section in a Bill of Quantities?\",\n  \"answer\": [\n   \"The preliminaries detail items of work that are required to enable the construction but are not associated within the permanent measured works items.\",\n   \"This could include items such as:-\",\n   \"– Site setup.\",\n   \"– Management & supervision.\",\n   \"– Insurances for the project.\",\n   \"– Task Lighting.\",\n   \"– Protections and temporary barriers.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 315,\n  \"level\": 3\n },\n {\n  \"question\": \"What information is required to measure preliminaries?\",\n  \"answer\": [\n   \"Contract duration.\",\n   \"Location.\",\n   \"Type of project (New Build vs. Refurb).\",\n   \"The size of the project.\",\n   \"Temporary works.\",\n   \"Security.\",\n   \"Methodology.\",\n   \"Programme.\",\n   \"Services.\",\n   \"Employers accommodation.\",\n   \"Contractor designed work.\",\n   \"Sectional completion.\",\n   \"Insurances / Bonds. If it was found that a Bill rate was blatantly wrong for example £100 was included as a rate instead of £1, how would this be resolved?\",\n   \"The works would be valued in accordance with the agreed rate contained within the contract.\",\n   \"If identified within the tender documents prior to the contract being agreed then the rate could be amended in accordance with the Tendering rules in place, but otherwise both parties would have to stand by the rate.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 316,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you evaluate a variation which is based on a BQ item which contains an error?\",\n  \"answer\": [\n   \"Assuming the same nature & conditions are applicable, the variation would be based on the BoQ rate within the contract.\",\n   \"Unless both parties agreed to amend the rate to one that is fair and reasonable.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 317,\n  \"level\": 2\n },\n {\n  \"question\": \"Who owns the copyright to a BQ?\",\n  \"answer\": [\n   \"The originator owns the copyright.\",\n   \"This is the QS generally who provides the client permission to use the document for its intended purpose.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 318,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you deal with a situation where it was discovered a part of a BQ was missing after the Main Contractor was on site?\",\n  \"answer\": [\n   \"If part of the BQ was missing then I would check to see if it were included as part of the tender documents & ultimately the contract sum.\",\n   \"If not then the ultimate responsibility would lie with the Employer.\",\n   \"Providing the works were still required by the Employer they would be treated as a variation to the contract.\",\n   \"I would request that the contractor price the works & advise the Employer on the level of costs involved before the instruction is issued.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 319,\n  \"level\": 3\n },\n {\n  \"question\": \"What would you include within the BoQ where works are to be carried out by Nominated Subcontractor?\",\n  \"answer\": [\n   \"A prime cost sum would be incorporated including:-\",\n   \"– An allowance for the cost of the Nominated Subcontractors work (based on the quotation).\",\n   \"– An allowance for the contractor to price for attendances such as accommodation, welfare, storage, handling, materials & cleaning.\",\n   \"– An allowance for a percentage addition for any other charges & profit.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 320,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Provisional Sum?\",\n  \"answer\": [\n   \"A Provisional Sum is an allowance included within the BoQ for works to be carried out where the extent and design of the work is not yet know meaning the cost cannot be established at the time of agreeing the contract sum.\",\n   \"This could include works by a nominated subcontractor or supplier, or a statutory authority.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 321,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between defined and undefined provisional sums?\",\n  \"answer\": [\n   \"A defined provisional sum is one that relates to works that cannot be accurately measured, but there is sufficient information about the works including their nature, method, location, quantity, limitations to allow planning, programming & pricing of preliminaries to take place. The contractor would therefore only be entitled to claim for any increase in the cost of the physical works.\",\n   \"Where there is insufficient information, the works are classed under an undefined provisional sum entitling the contractor to costs for prelims and an extension to the programme.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 322,\n  \"level\": 1\n },\n {\n  \"question\": \"How would you undertake an audit on a cost reimbursable contract?\",\n  \"answer\": [\n   \"Upon submission of the application by the contractor I would ensure this is provided in the agreed format & detail.\",\n   \"I would review all the costs incurred to date in respect of Labour Plant & Materials, Staff & OH&P.\",\n   \"I would carry out an audit of the information & reconcile this against the fee schedules & rates within the contract.\",\n   \"I would check timesheets, staff grades & rates, project codes, payroll burden, invoices, subcontract accounts, applications & payments, materials invoices, dates, rates, quants, delivery tickets etc.\",\n   \"This would be compared against the contract rates to enable any adjustments that may be needed.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 323,\n  \"level\": 3\n },\n {\n  \"question\": \"What is Simpsons Rule?\",\n  \"answer\": [\n   \"Simpsons is a mathematical formula for approximating the area under a curve over a given interval.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 324,\n  \"level\": 1\n },\n {\n  \"question\": \"How did you check that the items measured for the BoQ were accurate?\",\n  \"answer\": [\n   \"We have an internal peer review system where upon completion, a joint review of the drawings is carried out by my senior colleagues to ensure all scope of work items are captured.\",\n   \"Junior colleagues assist with undertaking spot checks on the quantities to ensure these are accurate.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 325,\n  \"level\": 2\n },\n {\n  \"question\": \"What items would you include for when measuring for example a basement?\",\n  \"answer\": [\n   \"It would depend on how the basement would be constructed.\",\n   \"When measuring a basement with piled walls and assuming the site was clear I would measure:-\",\n   \"– Excavation & dispose of topsoil.\",\n   \"– Continuous piles to walls including the piling rig, hard standing piling mat, testing, cutting & prep heads.\",\n   \"– Excavation & disposal of arisings.\",\n   \"– Preparation of the excavated surface.\",\n   \"– Waterproofing.\",\n   \"– Blinding.\",\n   \"– Concrete to the basement slab & walls.\",\n   \"– Reinforcement.\",\n   \"– Formwork to walls.\",\n   \"– Finishes to concrete.\",\n   \"– Internal finishes.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 326,\n  \"level\": 2\n },\n {\n  \"question\": \"What would you do if you produced a bill and you measured a staircase that did not exist?\",\n  \"answer\": [\n   \"I would check the drawings and bills of quantities to see if the contractor was correct.\",\n   \"I would refer back to the Tender Drawings to see if there had been a design change.\",\n   \"Depending on the form of contract, I would remeasure the section and notify the Contractor of the remeasurement of actual quantities.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 327,\n  \"level\": 3\n },\n {\n  \"question\": \"How are obstructions dealt with on site? And in which package do you see them included?\",\n  \"answer\": [\n   \"Obstructions are normally dealt with by a Provisional Sum within the BoQ, due to the undetermined nature of the works.\",\n   \"They would usually be included in the earthwork’s contractors’ package, responsible for excavating the foundations.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 328,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you measure cut and fill?\",\n  \"answer\": [\n   \"I would obtain drawings with existing levels & proposed levels.\",\n   \"I would divide the area of excavation into a grid & interpolate the levels on the grid to establish an average existing & proposed level.\",\n   \"This would determine which area was in cut and which area was in fill.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 329,\n  \"level\": 2\n },\n {\n  \"question\": \"Is the quantity for excavation similar as disposal?\",\n  \"answer\": [\n   \"Yes providing there is no backfilling required and assuming the form of contract and method of measurement does not allow for bulking, shrinkage or waste of earthworks.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 330,\n  \"level\": 2\n },\n {\n  \"question\": \"How would your approach to measurement change if you worked in Dubai?\",\n  \"answer\": [\n   \"I would need to measure in accordance with the method of measurement appropriate for that country.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 331,\n  \"level\": 3\n },\n {\n  \"question\": \"How do you measure something unique for example a statue of the client?\",\n  \"answer\": [\n   \"If it could be broken down easily into the parts that are in accordance with the method of measurement, I would use this as the basis for measurement.\",\n   \"Otherwise I would have to insert an item with a detailed description of the works with a section to include a Provisional Sum.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 332,\n  \"level\": 2\n },\n {\n  \"question\": \"How do you deal with ground water under NRM2?\",\n  \"answer\": [\n   \"Ground water is measured under Section 5 for Excavating and Filling.\",\n   \"It is measured on an itemised basis with the original below ground level being stated and a reference to whether the water is polluted.\",\n   \"If the post contract water level differs from the pre-contract level, the measurements must be taken and revised accordingly.\",\n   \"The method and place of discharge is left to the discretion of the contractor unless stated otherwise.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 333,\n  \"level\": 2\n },\n {\n  \"question\": \"What is a Preamble?\",\n  \"answer\": [\n   \"A preamble is an explanation of a document that is commonly found in contracts, specifications and bills of quantities.\",\n   \"It can help with the interpretation of the document.\",\n   \"It includes a description of the parties to the contract.\",\n   \"The background to the document.\",\n   \"Measurement procedures that have been adopted.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 334,\n  \"level\": 1\n },\n {\n  \"question\": \"What are method related charges?\",\n  \"answer\": [\n   \"A method related charge is a one-off item related to the method of carrying out the work and does not form part of the permanent works.\",\n   \"They are not considered proportional to the item of works to be carried out.\",\n   \"For example provision of temporary propping required for a weakened elevation of an existing building.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 335,\n  \"level\": 1\n },\n {\n  \"question\": \"What are time related charges?\",\n  \"answer\": [\n   \"Time related charges are method related charges that are considered proportional to the time taken to carry out the works for example plant hire.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 336,\n  \"level\": 1\n },\n {\n  \"question\": \"What are fixed charges?\",\n  \"answer\": [\n   \"Fixed charges are method related charges that do not vary with time for example Service Connection Charges.\"\n  ],\n  \"category\": \"Quantification & Costing of Works\",\n  \"id\": 337,\n  \"level\": 1\n },\n {\n  \"question\": \"What is substructure?\",\n  \"answer\": [\n   \"All elements of work that are undertaken below the damp proof course that provides the basis for the superstructure to be constructed upon.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 338,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the external envelope?\",\n  \"answer\": [\n   \"The materials and components that form the external shell or enclosure of a building.\",\n   \"These may be load or non-load bearing.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 339,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the Building Regulations?\",\n  \"answer\": [\n   \"Statutory instruments that set out the minimum performance standards for the design and construction of buildings.\",\n   \"Supported by the Approved Documents and other codes of practice.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 340,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the approved documents? A. Structure. B. Fire safety. C. Site preparation and damp proofing. D. Toxic substances. E. Sound proofing. F. Ventilation. G. Hygiene. H. Drainage and waste disposal. I. Not in use. J. Heating appliances. K. Protection from falling, collision and impact. L. Conservation of fuel and power. M. Disabled access and facilities. N. Glazing. O. Not in use. P. Electrical safety. What are British Standards?\",\n  \"answer\": [\n   \"Publications issued by the British Standards Institution prefixed BS.\",\n   \"They give recommended minimum standards for materials, components, design and construction practices.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 341,\n  \"level\": 1\n },\n {\n  \"question\": \"What are international standards?\",\n  \"answer\": [\n   \"Publications issued by the International Organisation for Standardisation – prefixed ISO.\",\n   \"They are compatible with and complement the British Standards.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 342,\n  \"level\": 1\n },\n {\n  \"question\": \"What is superstructure?\",\n  \"answer\": [\n   \"All internal and external works items above the damp proof course.\",\n   \"This is made up of:\",\n   \"– External walls.\",\n   \"– Stairs.\",\n   \"– Roof.\",\n   \"– Structural walls.\",\n   \"– Suspended ceilings.\",\n   \"– Raised floors.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 343,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the typical components of site investigations?\",\n  \"answer\": [\n   \"Their objective is to collect and record data to help with the design and construction process. This should include matters in relation to the site that may impact the development for example:-\",\n   \"– Boundary hedges & fencing.\",\n   \"– Existing trees.\",\n   \"– Size, depth and location of services including gas, telephone, electricity, water & drains.\",\n   \"– Existing buildings.\",\n   \"– Ground water conditions.\",\n   \"– Soil investigations.\",\n   \"– Trial pit information.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 344,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of soil investigations?\",\n  \"answer\": [\n   \"Their purpose is to determine the suitability of the site for the proposed works and determine adequate and economic foundation design.\",\n   \"The investigation should determine the potential difficulties associated with the ground conditions and assist with identifying a suitable foundation solution.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 345,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main site considerations?\",\n  \"answer\": [\n   \"Access considerations.\",\n   \"Storage considerations.\",\n   \"Accommodation.\",\n   \"Temporary services.\",\n   \"Plant.\",\n   \"Fencing & hoarding.\",\n   \"Health & Safety risks.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 346,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a retained façade?\",\n  \"answer\": [\n   \"The facade of the building is retained whilst everything behind the front wall is demolished.\",\n   \"Allowances needs to be made for a temporary support structure and also cleaning & restoration works to the retained façade.\",\n   \"Retained facades are often required as a result of listed building requirements.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 347,\n  \"level\": 1\n },\n {\n  \"question\": \"What are temporary works?\",\n  \"answer\": [\n   \"Temporary works do not normally appear on construction drawings but may be required depending on the construction methodology being used.\",\n   \"Temporary works may also be required as a result of health and safety requirements to ensure a safe method of construction for example temporary propping.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 348,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a tower crane and what are some considerations during its erection and operation?\",\n  \"answer\": [\n   \"A tower crane is a tall crane used for lifting objects into high places.\",\n   \"The boom allows a longer reach with 360 access.\",\n   \"A longer boom reduces the payload capability.\",\n   \"You would usually use a smaller crane to erect a tower crane.\",\n   \"Weather conditions could prevent it from working, in particular high, strong winds.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 349,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a scaffold?\",\n  \"answer\": [\n   \"Scaffold is a temporary working platform erected around the perimeter of a building or structure to provide a safe working place at a convenient height.\",\n   \"Scaffold is usually required for work 1.5m above ground level.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 350,\n  \"level\": 1\n },\n {\n  \"question\": \"What is shoring?\",\n  \"answer\": [\n   \"Shoring is a form of temporary support given to existing buildings.\",\n   \"Its purpose is to provide a precaution against damage or injury due to collapse of the structure.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 351,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main components of concrete?\",\n  \"answer\": [\n   \"Cement.\",\n   \"Aggregate (natural rock, crushed stone, gravel).\",\n   \"Water.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 352,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a borehole?\",\n  \"answer\": [\n   \"A borehole can be used for soil investigation or for geothermal heating solutions.\",\n   \"Boreholes are the most suitable method of soil investigation when foundations are over 3m deep.\",\n   \"Geothermal boreholes are permanent boreholes that use the Earth’s natural heat to raise the temperature of circulated water.\",\n   \"This is a closed system and can be used to heat the building above which is adopted as a sustainable technology.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 353,\n  \"level\": 1\n },\n {\n  \"question\": \"What are piles?\",\n  \"answer\": [\n   \"A series of columns constructed or inserted into the ground to transmit the load of a structure to a lower level of subsoil.\",\n   \"They are used where no suitable foundations conditions are present near ground level or if there is a high water table.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 354,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different types of piles?\",\n  \"answer\": [\n   \"Sheet piles.\",\n   \"– A deep trench is excavated and concrete is poured in situ.\",\n   \"– The piles can be used to form basement walls or act as retaining walls.\",\n   \"Secant piles.\",\n   \"– Interlocking piles (male and female, often different diameters and hardness) are bored to provide a combination of foundations and basement walls.\",\n   \"– They support in providing a waterproof structure and are often seen when a top down construction method is used.\",\n   \"Bored Piles.\",\n   \"– An auger is used to excavate the soil and then concrete is poured in once complete.\",\n   \"Pre-cast piles.\",\n   \"– Piles are and hammered into the ground. This is not often favoured due to the high noise levels associated with installation and the lack of flexibility in terms of depth required.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 355,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different ways that the piles transfer their load to the surrounding ground?\",\n  \"answer\": [\n   \"End bearing piles - transfer load through low bearing capacity soil to a strong stratum such as rock or very dense sand.\",\n   \"Friction piles - bear on frictional resistance between their outer surface and the soil in contact.\",\n   \"Settlement reducing piles - usually incorporated beneath the central part of a raft foundation in order to reduce differential settlement to an acceptable level.\",\n   \"Tension piles - resist uplifting forces that might otherwise cause the structure to be extracted from the ground due to uplifting forces such as hydrostatic pressure, seismic activity or overturning movement.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 356,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the difference between bored vs. pre-cast piles?\",\n  \"answer\": [\n   \"Bored piles are defined when the process for removing the spoil to form the hole for the pile is carried out by a boring technique.\",\n   \"They are used primarily in cohesive subsoils for the formation of friction piles and when forming pile foundations close to existing buildings where the allowable amount of noise and/or vibration is limited.\",\n   \"Pre-cast Concrete piles are generally used where soft soil deposits overlie firmer strata. These piles are usually driven using a drop or single action hammer.\",\n   \"Issues can arise due to the noise levels associated with the installation method of pre-cast piles.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 357,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the problems to the PQS regarding cost control with piling and who owns the risk?\",\n  \"answer\": [\n   \"The end depth of the piles are never certain and the procurement route used determines who takes the risk.\",\n   \"For example under a traditional or design & build procurement the main contractor would normally take risk ownership whereas under management contracting the risk would remain with the employer.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 358,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a raft foundation?\",\n  \"answer\": [\n   \"Raft foundations spread the load of the superstructure over a large base and reduce the load per m2 of the area.\",\n   \"Raft foundation solutions are useful in low bearing capacity soils.\",\n   \"They can be a solid raft slab or beam and slab raft such as a ground beam system and suspended PC concrete ground floor. Under what conditions would you expect a raft foundation to be used for a substructure?\",\n   \"A raft can be used for lightly loaded buildings on sites with poor soils.\",\n   \"Heavy loads to the raft have the potential to cause the raft to move sideways as a result of raft foundations not being very deep.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 359,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a strip foundation?\",\n  \"answer\": [\n   \"Strip foundations are formed by creating a shallow continuous excavation to support the perimeter and internal walls.\",\n   \"They are also referred to as strip footings and are suitable for most subsoils and a light structural design.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 360,\n  \"level\": 1\n },\n {\n  \"question\": \"What are pad foundations?\",\n  \"answer\": [\n   \"Pad foundations provide a base for reinforced concrete or steel columns.\",\n   \"They are usually formed by making an isolated excavation in the shape of a square or rectangle.\",\n   \"They often have reinforcement mesh as part of the construction and spread the load to a layer of bearing soil or rock below.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 361,\n  \"level\": 1\n },\n {\n  \"question\": \"What are retaining walls?\",\n  \"answer\": [\n   \"They act as an earth retaining structure for the whole or part of their heights.\",\n   \"They are used to support and retain soils laterally so that it can be retained at different levels on the two sides.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 362,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main types of excavation for forming basements?\",\n  \"answer\": [\n   \"Open excavations that use battered excavation sides which are cut back to a safe angle. This eliminates the need for temporary earth work support and can be used to construct basement walls. This requires additional excavation costs and significant working space when compared to other methods.\",\n   \"Perimeter Trench Excavation can be used to form basement walls. This method requires earthwork support with the basement walls being constructed and then the inside of the basement is excavated.\",\n   \"Complete Excavation can be used in firm subsoils. The Centre of the basement is excavated first, then the basement slab cast while the sides of the excavation are supported by struts.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 363,\n  \"level\": 1\n },\n {\n  \"question\": \"What is a basement?\",\n  \"answer\": [\n   \"A storey constructed below ground level.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 364,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the 3 different types of basement construction?\",\n  \"answer\": [\n   \"Retaining wall and raft which consists of a slab raft foundation to serve as the basement floor that distributes the building load. The basement walls serve as the retaining walls.\",\n   \"Box and Cellular raft which is similar to above however the internal structural walls are used to transmit and spread loads over the raft and divides the basement into cells.\",\n   \"Piled solution where the main superstructure loads are carried to the basement floor by columns and transmitted to the ground via pile caps and bearing piles. In this example the basement has numerous columns passing through it.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 365,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the 3 main methods of waterproofing a basement?\",\n  \"answer\": [\n   \"Dense monolithic where the basement is designed and built to form a watertight space using high quality reinforced concrete. This requires good workmanship and strict control. Success depends on the water to cement ratio and the degree of compaction. Joints also need to be carefully designed\",\n   \"Tanking using materials such as asphalt, polythene sheeting, bitumen and epoxy resins. These can be applied internally or externally to provide a continuous membrane to the base slabs and walls. External application is better as it protects the structure in addition to the waterproofing.\",\n   \"Drained Cavity solutions can be used for new or refurbishment work. This allows a small amount of water infiltration to occur. The water is collected and then drains away to a sump or is directly discharged using a pump.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 366,\n  \"level\": 1\n },\n {\n  \"question\": \"What is scabbling?\",\n  \"answer\": [\n   \"Scabbling utilises piston driven carbide tipped heads which impact the surface material at a rapid rate.\",\n   \"This pulverises concrete or brittle coatings and can be very effective in the removal of slightly bonded coatings or where the coatings are impossible to be removed by the shot blasting process.\",\n   \"It can also remove level inconsistencies in concrete floors.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 367,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the technical advantages of steel frames?\",\n  \"answer\": [\n   \"Steel frames are often quicker to assemble in comparison to alternative methods.\",\n   \"They are 100% recyclable and inorganic meaning they will not warp, split, crack or creep.\",\n   \"They offer the highest strength to weight ratio of any building material.\",\n   \"Steel frames are not vulnerable to termites or any type of fungi or organism.\",\n   \"They are dimensionally stable and do not expand or contract with moisture or temperature changes.\",\n   \"Due to strict manufacturing controls, consistent material quality can be obtained due to production taking place in line with strict standards.\",\n   \"Steel is non-combustible so it will not contribute to the spread of a fire.\",\n   \"Steel frames are lighter in comparison to concrete frames and will often benefit from a cheaper foundation solution.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 368,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the technical disadvantages of steel frames?\",\n  \"answer\": [\n   \"Steel frames require fire protection to be retrospectively installed.\",\n   \"Fixing components may require replacement over time.\",\n   \"The price of steel often fluctuates and can result in a lack of cost certainty.\",\n   \"Installation of steel frames requires experienced builders at an additional cost. Resources can also be difficult to acquire depending on market conditions.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 369,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the technical advantages of concrete frames?\",\n  \"answer\": [\n   \"Fire protection is often provided inherently as part of the structure.\",\n   \"Due to offering a slower form of construction in comparison to alternative methods, this will likely result in reduced cash flow expenditure early on in the development.\",\n   \"Maintenance requirements associated with concrete frames are relatively low in comparison to alternative methods.\",\n   \"Concrete frames often provide good sound and heat insulation properties in comparison to steel frame constructions.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 370,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the technical disadvantages of concrete frames?\",\n  \"answer\": [\n   \"In comparison to steel frames, they are more time consuming to install.\",\n   \"There may also be complications during the install resulting from colder and inclement weather conditions.\",\n   \"The need for steel reinforcement can lead to issues around price fluctuations and cost uncertainty associated with steel frames.\",\n   \"Concrete frames are often heavier and require larger foundations.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 371,\n  \"level\": 1\n },\n {\n  \"question\": \"Describe a typical Cold Flat Roof Construction\",\n  \"answer\": [\n   \"The void or roof slab is insulated from heat loss from below and is therefore at a colder temperature than the room below during cold weather.\",\n   \"Insulation is located above ceiling level.\",\n   \"Ceiling Joists form the main horizontal members and are fixed to the wall plates.\",\n   \"Insulation is normally inserted between the roof joists with an air gap or void space being maintained to allow for cross ventilation.\",\n   \"There is a risk of condensation forming within the roof void or on the underside of the slab, so good cross-ventilation is essential.\",\n   \"Plywood decking is secured on to the joists and finished with the respective roof covering.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 372,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a typical Warm Flat Roof Construction\",\n  \"answer\": [\n   \"Insulation is placed on top of the roof deck but beneath the waterproof membrane.\",\n   \"The vapour control layer is usually placed under the insulation.\",\n   \"This reduces the risk of condensation as the ceiling or roof void is at a similar temperature to the roof.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 373,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a typical Inverted Flat Roof Construction\",\n  \"answer\": [\n   \"A roof in which the insulation is placed on top of the waterproof membrane.\",\n   \"No vapour control is needed.\",\n   \"The roof void and deck are maintained at similar temperature to the room.\",\n   \"The insulation protects the membrane from damage but must be anchored down.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 374,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a typical parapet wall – roof abutment detail\",\n  \"answer\": [\n   \"The parapet wall or dwarf wall is built along the perimeter edge of the roof.\",\n   \"The wall height extends above roof level.\",\n   \"Where the wall intersects with the roof, a flashing or water proofing detail will be required along with a DPC closer placed above the flashing and at the head of the wall under the coping detail.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 375,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a pitched roof detail\",\n  \"answer\": [\n   \"Pitched roofs typically are made up of rafters which span from the apex of the roof and are fixed to the top of the external wall by a wall plate.\",\n   \"At the apex of the roof are the ridge tiles which are supported by the ridge board.\",\n   \"The roof covering whether slate or concrete tiles are typically fixed to roof battens.\",\n   \"Supporting the rafters and roof coverings are the struts, purlins and roof beams.\",\n   \"A soffit and eaves board may be fixed to the end of the rafters along with the guttering and rain water goods.\",\n   \"Vent tiles may also be used to provide natural ventilation to the roof space.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 376,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a cladding rainscreen detail\",\n  \"answer\": [\n   \"Rainscreen cladding provides a screening function rather than an enclosure in its own right.\",\n   \"A rainscreen is used to shield a wall, whether this be of masonry, metal studwork or in some cases glass.\",\n   \"Usually a rainscreen is designed to permit some controlled leakage with the main functions of resistance to air and water being provided by the shielded wall behind\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 377,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a Cladding Stick System\",\n  \"answer\": [\n   \"In the stick system, the curtain wall frame (mullions) and glass or opaque panels are installed and connected together piece by piece.\",\n   \"Stick curtain walling systems are versatile and allow for the integration of other systems, such as sliding doors and windows. They tend to be less specialised and can be built by all types of fabricators as they are not dependent on having a large factory.\",\n   \"However, stick systems do require multiple steps to erect and seal the wall, which means more time is spent on site – an approximate rule of thumb would be that 70% of the work is carried out on site, with 30% in the factory. This incurs further costs due to additional labour time.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 378,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a Unitised cladding system\",\n  \"answer\": [\n   \"Unitised systems comprise narrow-width, storey-height units of aluminum framework containing glazed and/or opaque insulated panels. The entire system is pre-assembled under factory-controlled conditions.\",\n   \"The unitised panels are usually craned into position, with pre-positioned brackets attached to the floor slab or the structural frame. Modern installation techniques increase the speed of erection and often minimise the requirement for scaffolding.\",\n   \"Unitised systems do have higher direct costs despite their reduced labour time for the install.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 379,\n  \"level\": 2\n },\n {\n  \"question\": \"Describe a Panellised systems\",\n  \"answer\": [\n   \"Like unitised systems, panellised curtain walling is constructed in the factory to improve quality control and speed of erection. However, the systems comprise large prefabricated panels of bay width and storey height, which are connected back to the primary structural columns or to the floor slabs. Panels may be of precast concrete or comprise a structural steel framework and are often clad with a variety of stone, metal and masonry cladding materials.\",\n   \"The advantage of these systems is improved adherence to specification as a consequence of factory prefabrication, allowing improved control of quality and rapid installation with the minimum number of site sealed joints. Panellised systems are less common and more expensive than unitised construction.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 380,\n  \"level\": 2\n },\n {\n  \"question\": \"What are the common components you would expect to see within a steel frame construction?\",\n  \"answer\": [\n   \"Beams.\",\n   \"Columns.\",\n   \"Purlins.\",\n   \"Rafters. Eaves.\",\n   \"Eaves Haunch.\",\n   \"Base Plate.\",\n   \"Apex Haunch.\",\n   \"Cladding Rails.\",\n   \"Cross bracings.\",\n   \"Fixings.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 381,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the common components you would expect to see within an external wall / foundation detail?\",\n  \"answer\": [\n   \"Strip foundation.\",\n   \"Concrete block foundation wall.\",\n   \"Rebar reinforcement.\",\n   \"Damp Proof Course.\",\n   \"Air bricks.\",\n   \"Suspended floor slab or ground floor slab.\",\n   \"Backfilling.\",\n   \"Drainage.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 382,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different parts of a steel beam?\",\n  \"answer\": [\n   \"A simple I Beam is made up:\",\n   \"– Flange - top and bottom of the vertical steel.\",\n   \"– Web - which is the vertical steel part of the I beam.\",\n   \"– Root - where the flange and the web join.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 383,\n  \"level\": 1\n },\n {\n  \"question\": \"What is powder coating?\",\n  \"answer\": [\n   \"A durable factory applied coating on metals, such as aluminum or galvanized steel which is available in many colours.\",\n   \"This application is sprayed on and is followed by heat curing to give a film thickness of 50 to 100 microns.\",\n   \"Any holes and cutting should be carried out before the coating is applied.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 384,\n  \"level\": 1\n },\n {\n  \"question\": \"What is an RHS vs. SHS?\",\n  \"answer\": [\n   \"RHS - Rectangular Hollow Section.\",\n   \"SHS - Square Hollow Section.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 385,\n  \"level\": 1\n },\n {\n  \"question\": \"What is intumescent paint?\",\n  \"answer\": [\n   \"Fire Resistant paint that is sprayed on in the factory and touched up by hand on site.\",\n   \"It works by stopping oxygen from reaching the surface of the material it is protecting.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 386,\n  \"level\": 1\n },\n {\n  \"question\": \"What is an upstand?\",\n  \"answer\": [\n   \"A vertical strip or skirting, such as the weatherproofing where roofing meets an abutment wall.\",\n   \"It can be the roofing itself, particularly for mastic asphalt, the top part of a one-piece apron flashing, a mortar skirting or an upstand flashing, and either stepped, raking or level.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 387,\n  \"level\": 1\n },\n {\n  \"question\": \"What is post tensioned concrete?\",\n  \"answer\": [\n   \"This method is usually employed where stressing is to be carried out on site after casting an insitu component or where a series of pre-cast concrete units are to be joined together to form the required member.\",\n   \"In post-tensioning, concrete is cast around ducts or sheathing in which the tendons are to be housed.\",\n   \"Stressing is carried out after the concrete has cured by means of hydraulic jacks operating from one of both ends of the member.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 388,\n  \"level\": 1\n },\n {\n  \"question\": \"What is formwork?\",\n  \"answer\": [\n   \"Anything that holds fresh in-situ concrete in place until it hardens, such as plywood shutters, steel pan forms, fibreglass moulds or profiled decking.\",\n   \"Falsework holds the formwork in place and includes items such as accessories like wedges and clips for tightening joints and to make stripping easy.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 389,\n  \"level\": 1\n },\n {\n  \"question\": \"What is slip forming?\",\n  \"answer\": [\n   \"A method for constructing a repetitive structure such as a core, lift shaft or stairwell.\",\n   \"The formwork is constantly moving upwards during the installation.\",\n   \"The concrete that becomes exposed must be cured enough to support the structure above.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 390,\n  \"level\": 1\n },\n {\n  \"question\": \"What is jump forming?\",\n  \"answer\": [\n   \"Jump forming is where a significant height of concrete is cast and left to cure.\",\n   \"The whole formwork module is then moved up and repeated.\",\n   \"It works in a similar principle to slip forming but is slower and cheaper in process terms. In a brick block cavity wall, how are window openings dealt with in terms of preventing water penetration and structurally?\",\n   \"Preventing Water Penetration\",\n   \"– Cavity Trays are used which cross the 50mm wide cavity of a cavity wall, stepping up at least 150mm between the outer and inner leaves, to form a gutter that leads to a weephole in the outer leaf.\",\n   \"– DPC (Damp Proof Course) – Is a strip of impervious material the same width as brickwork or blockwork wall to stop moisture rising from the ground up the external leaf of the wall.\",\n   \"Structurally\",\n   \"– Lintels are used which are a small beam installed over a window or door head which carry the wall load above.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 391,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the size of a brick?\",\n  \"answer\": [\n   \"Standard bricks are 215mm x 102.5mm x 65mm.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 392,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the frog and which side does it go on?\",\n  \"answer\": [\n   \"The frog is an indentation in one of the bed faces of a brick, usually the top.\",\n   \"Bricks with two frogs are known as ‘double-frogged’, though these are less common.\",\n   \"Unless specifically stated, bricks should be laid frog (or larger frog) facing up, and with mortar filling the frog.\",\n   \"This gives a stronger wall and superior sound insulation.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 393,\n  \"level\": 1\n },\n {\n  \"question\": \"How many bricks are in a m2?\",\n  \"answer\": [\n   \"There are about 60 bricks per m2.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 394,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different types of brick bond?\",\n  \"answer\": [\n   \"Stretcher – most commonly used with walls just a half brick wide.\",\n   \"English – with alternating courses of headers and stretchers.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 395,\n  \"level\": 1\n },\n {\n  \"question\": \"What other elements will be affected by the type of cladding systems used?\",\n  \"answer\": [\n   \"Frame.\",\n   \"Roof.\",\n   \"M&E.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 396,\n  \"level\": 2\n },\n {\n  \"question\": \"What is an air brick?\",\n  \"answer\": [\n   \"A perforated brick to allow for ventilation into a room or an underfloor space.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 397,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the factors that might affect the choice materials for internal partitions?\",\n  \"answer\": [\n   \"Fire rating requirements.\",\n   \"Restriction for noise (Db ratings).\",\n   \"Visuals – Opacity vs. transparency.\",\n   \"Fixed or movable.\",\n   \"Strength requirements.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 398,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the different types of screed?\",\n  \"answer\": [\n   \"Bonded Screeds which are laid on to a ready prepared rough, cleaned concrete base.\",\n   \"Unbonded Screeds which are laid on to a sound clean bitumen damp proof membrane.\",\n   \"Floating Screed which is laid with steel or fibre reinforcements on to the insulating board, which in turn can be laid on to a suitable damp proof membrane.\",\n   \"Resin Bonded Screed which is laid on to a clean, rough pre-prepared concrete base. The resin acts as a ready installed damp proof membrane to the top screed.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 399,\n  \"level\": 1\n },\n {\n  \"question\": \"What is the purpose of a threshold strip?\",\n  \"answer\": [\n   \"A lightly rounded metal strip over the joint between the floor finishes or coverings that meet under the door leaf.\",\n   \"They prevent fraying and provide an aesthetic finish which also interrupt combustible flooring under fire doors.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 400,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the main components of a hipped end pitched timber roof structure?\",\n  \"answer\": [\n   \"Principle Rafters to provides support to the roof covering which span from eaves to ridge.\",\n   \"Jack Rafters are shorter rafters that run from hip to eaves or ridge to valley.\",\n   \"Ridge boards which provide support and run underneath the ridge.\",\n   \"Wall plates receive the feet of rafters at the top of the external wall.\",\n   \"Hip rafters where two roof surfaces meet to form an external angle.\",\n   \"Valley rafter where two roof surfaces meet to form an internal angle.\",\n   \"Purlins are intermediate horizontal members to support the rafters.\",\n   \"Battens are small pieces of wood to which the roof covering is affixed.\",\n   \"Coverings are either laid or fixed on to a roof to protect from the elements including clay, slate or concrete roof tiles.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 401,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the elements of a flat roof?\",\n  \"answer\": [\n   \"Joists which are fixed to wall plates to act as the main support.\",\n   \"Furrings which are fixed to the top of joists to provide the required gradient of incline.\",\n   \"Particle board is fixed to top of the furrings to provide a flat surface.\",\n   \"Felt is applied usually made up of 3 layers and bonded with bitumen to provide a waterproof covering.\",\n   \"Stone chippings provide protection to the felt and also reflect sunlight.\"\n  ],\n  \"category\": \"Construction Technology & Environmental Services\",\n  \"id\": 402,\n  \"level\": 1\n },\n {\n  \"question\": \"What are the following flat roof coverings and name some of their Pro’s and Cons’: Single layer membrane, Built-up membrane system and Asphalt?\",\n  \"answer\": [\n   \"Single layer membranes\",\n   \"– Consists of one layer of felt with a base sheet of glass fibre or polyester reinforcement impregnated with hot bitumen during manufacture.\",\n   \"– It is then coated both sides with a weatherproof bitumen compound and dusted with sand on one layer and a thin layer of polythene on the other and left to cool.\",\n   \"– After cooling it is cut into strips ready for use.\",\n   \"– Single layer membranes are thin and easily punctured.\",\n   \"– Because of this they are rarely used commercially but form the cheapest option.\",\n   \"Built up felt\",\n   \"– Is constructed using three layers of felt.\",\n   \"– The first is laid at right angles to the fall commencing at the eaves.\",\n   \"– The next is laid parallel to the fall and the final layer at right angles.\",\n   \"– It is then covered with stone chippings.\",\n   \"– Built up felt is more common but can be easily punctured if proper care is not taken.\",\n   \"Asphalt roofing\",\n   \"– Mastic asphalt consists of an aggregate with a bituminous binder which is cast into block ready for reheating at site. They are heated into cauldrons to a temp of 200 degrees C and are transported in liquid form to the roof. Two coats are usually required.\",\n   \"– Asphalt roofs reduce risks of defects as it is poured on site rather than coming to site in rolls which can be damaged in transport.\",\n   \"– Asphalt cools quickly and will need t
